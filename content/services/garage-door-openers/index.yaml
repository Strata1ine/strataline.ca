sections:
  - type: Benefits
    title: Opener work that protects the door
    content:
      - title: Door balance first
        desc: |-
          An opener should not fight a heavy or unbalanced door. Springs, rollers, tracks, and cables need to be checked before opener setup.
      - title: Quiet drive options
        desc: |-
          Belt-drive openers are popular for attached garages, bedrooms over garages, and homes where vibration matters.
      - title: Smart controls and keypads
        desc: |-
          WiFi openers, phone control, keypad entry, wall consoles, remotes, and safety sensors can be included or replaced.
      - title: Correct force and travel settings
        desc: |-
          Opener limits, safety reversal, force settings, rail length, and sensor alignment affect safety and reliability.

  - type: ZigZag
    title: Related garage door services
    content:
      - title: Garage door installation and repair
        desc: |-
          Openers work best when the door itself is balanced, aligned, sealed, and moving cleanly on the tracks.
        image:
          src: ../garage-doors/photos/02.jpg
          alt: Garage door installation with a matched opener system.
        link: /services/garage-doors
      - title: Garage door spring repair
        desc: |-
          If the opener strains, hums, or will not lift the door, the real issue may be broken springs or an unbalanced door.
        image:
          src: ../garage-doors/photos/07.jpg
          alt: Garage door spring and hardware repair before opener use.
        link: /services/garage-door-spring-repair

