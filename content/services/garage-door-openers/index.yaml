  - type: Faq
    title: Garage door opener FAQ
    content:
      - title: Should I replace the opener when replacing the garage door?
        desc: |-
          Often yes if the opener is noisy, underpowered, missing safety features, or poorly matched to the new door weight.
      - title: Why does my opener run but the door does not move?
        desc: |-
          Possible causes include broken springs, disconnected trolley, stripped gear, cable issues, or a door that is too heavy for the opener.
      - title: Can you add a smart garage door opener?
        desc: |-
          Yes. Smart opener options can include app control, alerts, scheduling, keypads, and remote access depending on the model.
      - title: Why does my garage door reverse when closing?
        desc: |-
          Common causes include blocked or misaligned safety sensors, travel limit issues, track resistance, damaged rollers, or incorrect opener force settings.

