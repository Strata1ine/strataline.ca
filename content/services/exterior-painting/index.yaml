  - type: Faq
    title: Have questions about exterior painting?
    showMoreLabel: View more exterior painting questions
    content:
      - title: Do you paint exterior surfaces?
        desc: |-
          Yes. We paint exterior doors, trim, siding, stucco, masonry, railings, garage doors, fascia, storefront details, and small commercial exteriors.

      - title: Do you paint commercial exteriors?
        desc: |-
          Yes. We paint commercial interiors and exteriors, including offices, retail spaces, storefront details, entry doors, trim, common areas, and small commercial buildings.

      - title: Are you insured for exterior painting?
        desc: |-
          Yes. Strataline carries WSIB coverage and 5M liability insurance for painting and renovation projects. Insurance details can be provided when required.

      - title: What exterior surfaces can be painted?
        desc: |-
          Exterior paint can be used on properly prepared wood, metal, fiberglass, masonry, stucco, siding, garage doors, trim, doors, railings, and some composite materials.

      - title: What affects the cost of exterior painting?
        desc: |-
          Exterior painting cost depends on surface condition, access, height, prep, repairs, primer, paint system, number of coats, weather windows, and how much masking is needed.

      - title: Do you scrape and sand before exterior painting?
        desc: |-
          Yes. Loose paint is scraped, rough edges are sanded, dirty surfaces are cleaned, gaps are caulked where appropriate, and bare areas are primed before finish paint.

      - title: Do exterior surfaces need primer?
        desc: |-
          Bare wood, metal, masonry repairs, stained areas, old glossy paint, and problem surfaces often need primer. Primer helps adhesion, coverage, and durability.

      - title: Can you paint exterior doors?
        desc: |-
          Yes. Exterior doors are cleaned, sanded, masked, primed where needed, and painted with exterior products suited to sun, moisture, and daily use.

      - title: Can you paint garage doors?
        desc: |-
          Yes. Garage doors can be painted after cleaning, sanding, masking, and primer where needed. Product choice depends on whether the door is steel, aluminum, fiberglass, or wood.

      - title: Can you paint stucco or masonry?
        desc: |-
          Yes, when the surface is sound, dry, clean, and compatible with the coating. Cracks, moisture issues, and loose material should be addressed before paint.

      - title: When is the best season for exterior painting in Ontario?
        desc: |-
          Exterior painting is usually best in dry, mild weather. Temperature, humidity, rain, direct sun, and overnight conditions all affect scheduling and cure time.

      - title: Do you also paint interiors?
        desc: |-
          Yes. See our [interior painting and wall finishing](/services/painting) page for walls, ceilings, trim, drywall repair, skim coating, and interior repainting.

