  - type: Benefits
    title: Exterior painting scope
    content:
      - title: Full exterior repaints
        desc: |-
          We paint full home exteriors, front elevations, stucco, brick, siding, garage doors, exterior trim, fascia, soffits, railings, columns, porches, and exterior doors.

      - title: Targeted curb appeal updates
        desc: |-
          If the whole house does not need paint, we can focus on the highest-impact areas: front doors, garage doors, black trim, fascia, shutters, window frames, and front elevations.

      - title: Commercial exteriors
        desc: |-
          Offices, storefronts, retail entries, plazas, loading doors, common areas, railings, exterior doors, metal frames, and light industrial surfaces can be painted with phased scheduling.

      - title: Written scope and insurance
        desc: |-
          Exterior painting estimates can include WSIB, 5M liability insurance details, surface prep, access notes, coating system, number of coats, exclusions, and timing.

  - type: ZigZag
    title: Built for Toronto weather
    content:
      - title: Freeze-thaw and moisture control
        desc: |-
          Toronto exteriors move through rain, humidity, snow, ice, and freeze-thaw cycles. We review surface dryness, failed caulking, cracks, peeling paint, moisture stains, and drainage issues before coating.
        image:
          src: ./photos/exterior-house-painting-woodbridge-after.webp
          alt: Exterior painting in Woodbridge with painted brick, black windows, black garage doors, and weather-ready coatings.

      - title: UV, colour fade and dark trim
        desc: |-
          Dark exterior colours, black trim, black garage doors, and modern white stucco palettes need the right products because sun exposure affects fading, heat, adhesion, and long-term appearance.
        image:
          src: ./photos/exterior-house-painting-toronto-after.webp
          alt: Toronto exterior painting with black trim, white stucco, and black garage doors designed for curb appeal.

  - type: Benefits
    title: Surface-specific prep
    content:
      - title: Stucco and EIFS
        desc: |-
          Stucco painting needs crack review, stain cleaning, compatible primer, breathable coatings, and careful attention to water paths around windows, rooflines, and eavestroughs.

      - title: Brick and masonry
        desc: |-
          Brick, concrete block, parging, and masonry surfaces need cleaning, mortar review, moisture checks, primer or mineral-compatible coatings, and the right choice between paint and stain.

      - title: Aluminum and vinyl siding
        desc: |-
          Aluminum siding often has chalking and oxidation. Vinyl siding needs vinyl-safe colours and products. Both require cleaning and coating choices that respect heat movement.

      - title: Wood, trim and fascia
        desc: |-
          Wood siding, fascia, soffits, doors, porch columns, and trim need scraping, sanding, caulking, rot review, primer on bare areas, and durable exterior finish coats.

      - title: Metal and railings
        desc: |-
          Railings, doors, frames, bollards, gates, and commercial metal surfaces need rust treatment, sanding, primer, and coatings suited to weather and hand contact.

      - title: Garage doors and entries
        desc: |-
          Garage doors, front doors, side doors, service doors, sidelights, and frames are high-impact curb appeal surfaces that need careful masking, drying, and product selection.

  - type: ImagePanel
    title: Better than a basic repaint
    content:
      - title: Quote clarity
        desc: |-
          Exterior quotes should explain prep, primer, repairs, coats, surfaces, access equipment, warranty limits, cleanup, and what is not included.
        image:
          src: ./photos/exterior-house-painting-vaughan-after.webp
          alt: Vaughan exterior painting with clean stucco, dark trim, black windows, and professional finish.

      - title: Paint or stain decisions
        desc: |-
          Brick, cedar, fences, decks, and some masonry surfaces may need stain instead of paint. The right choice depends on porosity, moisture, appearance, and maintenance goals.
        image:
          src: ./photos/exterior-house-painting-woodbridge-after.webp
          alt: Woodbridge exterior painting with painted brick, black trim, and refreshed curb appeal.

      - title: Commercial scheduling
        desc: |-
          Commercial painting can be phased around customers, tenants, staff, deliveries, signs, entries, parking, and property management rules.
        image:
          src: ./photos/exterior-gate-fence-painting-toronto-after.webp
          alt: Exterior gate and fence painting in Toronto for commercial or residential exterior details.

  - type: Faq
    title: Have questions about exterior painting?
    showMoreLabel: View more exterior painting questions
    content:
      - title: Do you paint exterior surfaces?
        desc: |-
          Yes. We paint exterior doors, trim, siding, stucco, masonry, railings, garage doors, fascia, soffits, storefront details, and small commercial exteriors.

      - title: Do you paint commercial exteriors?
        desc: |-
          Yes. We paint commercial interiors and exteriors, including offices, retail spaces, storefront details, entry doors, trim, common areas, light industrial areas, and small commercial buildings.

      - title: Are you insured for exterior painting?
        desc: |-
          Yes. Strataline carries WSIB coverage and 5M liability insurance for painting and renovation projects. Insurance details can be provided when condos, commercial spaces, property managers, or larger scopes require them.

      - title: How much does exterior painting cost in Toronto?
        desc: |-
          Exterior painting cost in Toronto depends on house size, height, access, surface material, prep, repairs, primer, number of colours, paint system, and weather windows. Photos are enough to start a realistic scope.

      - title: How much does it cost to paint a two-storey house exterior?
        desc: |-
          A two-storey exterior repaint usually costs more than a bungalow because ladders, staging, fascia, soffits, trim, dormers, and upper windows add setup and labour time.

      - title: How much does it cost to paint a bungalow exterior?
        desc: |-
          Bungalow exterior painting is usually simpler than taller homes, but pricing still depends on siding, brick, stucco, trim, peeling paint, repairs, colour change, and access around the property.

      - title: How much does it cost to paint a large detached house exterior?
        desc: |-
          Large detached homes cost more because of paintable area, rooflines, trim detail, garage doors, elevation changes, landscaping protection, access equipment, and the time needed for prep.

      - title: How much does it cost to paint exterior trim only?
        desc: |-
          Exterior trim painting depends on linear footage, height, window count, fascia, soffits, caulking, peeling paint, wood condition, primer, and whether multiple trim colours are used.

      - title: How much does garage door painting cost?
        desc: |-
          Garage door painting cost depends on the number of doors, door material, texture, existing finish, colour change, masking, primer, and whether the doors are sprayed or brushed and rolled.

      - title: How much does exterior door painting cost?
        desc: |-
          Exterior door painting depends on door material, panels, glass, hardware, sidelights, weather stripping, colour, primer, and whether the door can stay in place while painted.

      - title: How much does stucco painting cost?
        desc: |-
          Stucco painting cost depends on texture, cracks, staining, height, coating system, repairs, porosity, primer, and whether the surface needs elastomeric or masonry-compatible products.

      - title: How much does brick painting cost?
        desc: |-
          Brick painting cost depends on brick condition, porosity, mortar, cleaning, repairs, primer, coating choice, and whether the project is full brick, accents, or a front elevation only.

      - title: How much does siding painting cost?
        desc: |-
          Siding painting cost depends on vinyl, aluminum, wood, fibre cement, or composite material, plus chalking, fading, repairs, height, primer, and colour change.

      - title: How much does commercial exterior painting cost?
        desc: |-
          Commercial exterior painting depends on building size, surface type, access, business hours, lifts, safety planning, coatings, phasing, signage protection, and whether work is interior, exterior, or both.

      - title: Why do exterior painting quotes vary so much?
        desc: |-
          Quotes vary because contractors include different levels of prep, repairs, primer, paint quality, access equipment, insurance, warranty, cleanup, crew size, and number of coats.

      - title: What should an exterior painting estimate include?
        desc: |-
          A good estimate should list surfaces, prep, repairs, primer, paint system, number of coats, access needs, exclusions, schedule, cleanup, warranty, WSIB, liability insurance, and price.

      - title: Can I get an exterior painting quote from photos?
        desc: |-
          Yes. Wide exterior photos, close-ups of damage, surface material, access conditions, and rough dimensions are enough to start a quote before an on-site visit is needed.

      - title: What photos should I send for an exterior painting quote?
        desc: |-
          Send each elevation, garage doors, trim, fascia, soffits, peeling areas, cracks, stains, rot, siding, stucco, masonry, railings, decks, fences, and access around the home.

      - title: Do you provide written exterior painting estimates?
        desc: |-
          Yes. We provide written estimates that explain surfaces, prep, repairs, paint, coating system, timing, exclusions, and pricing so the scope is clear before work starts.

      - title: Can you quote exterior painting without visiting?
        desc: |-
          Often, yes. Straightforward projects can start with photos. Complex stucco, masonry, high access, commercial spaces, or major repairs may need a site visit.

      - title: Do you offer same-day exterior painting quotes?
        desc: |-
          Many exterior painting quote requests can be reviewed the same day from photos and scope details. Larger projects may need more time for access, repairs, or coating decisions.

      - title: Should I choose the cheapest exterior painting quote?
        desc: |-
          The cheapest quote may skip washing, scraping, primer, caulking, repairs, safety, enough coats, or proper paint. Compare scope first, then price.

      - title: How do I compare exterior painting contractors?
        desc: |-
          Compare prep details, substrate knowledge, paint system, warranty, WSIB, liability insurance, reviews, communication, access planning, cleanup, and whether the estimate is specific.

      - title: What makes exterior painting last longer?
        desc: |-
          Exterior paint lasts longer when surfaces are dry, clean, sound, properly scraped, sanded, caulked, primed, coated with the right product, and maintained after the job.

      - title: How long does exterior painting last in Toronto?
        desc: |-
          Exterior paint can last many years when prep and products are right, but lifespan depends on surface material, exposure, moisture, colour, sun, maintenance, and previous coating condition.

      - title: When is the best time of year for exterior painting in Toronto?
        desc: |-
          Late spring through fall is usually best. Exterior paint needs suitable temperature, dry surfaces, low rain risk, and enough curing time before cold or wet weather.

      - title: Can exterior painting be done in spring?
        desc: |-
          Yes, if surfaces are dry and temperatures stay within product requirements. Spring work needs close attention to rain, overnight lows, pollen, and damp shaded areas.

      - title: Can exterior painting be done in summer?
        desc: |-
          Yes. Summer is common, but direct sun, heat, humidity, and fast drying can affect application. Work is planned around shade, exposure, and product limits.

      - title: Can exterior painting be done in fall?
        desc: |-
          Yes. Fall can be excellent for exterior painting when temperatures are mild and surfaces stay dry, but shorter days and overnight lows affect scheduling.

      - title: Can you paint exterior surfaces in winter?
        desc: |-
          Most exterior painting should wait until temperatures and surface conditions meet product requirements. Some protected commercial or specialty coating work may be reviewed separately.

      - title: How long does exterior painting take?
        desc: |-
          Exterior painting can take a few days to several weeks depending on house size, prep, repairs, weather, access, number of colours, surface type, and drying time.

      - title: How long does paint take to cure outside?
        desc: |-
          Dry time and cure time depend on product, temperature, humidity, sun, airflow, and surface type. Paint may feel dry before it reaches full durability.

      - title: Can rain ruin fresh exterior paint?
        desc: |-
          Rain can damage fresh paint if it arrives before the coating has dried or cured enough. We schedule around forecasts and product dry-time requirements.

      - title: How do you handle weather delays?
        desc: |-
          We monitor weather and adjust exterior schedules when rain, damp surfaces, high humidity, wind, or temperature swings could affect adhesion or finish quality.

      - title: Do you paint in direct sunlight?
        desc: |-
          We avoid painting surfaces when direct sun or heat could cause poor flow, lap marks, flashing, fast drying, or adhesion problems. Work is staged by exposure when needed.

      - title: What temperature is best for exterior painting?
        desc: |-
          The right temperature depends on the coating, but mild, dry conditions are usually best. Surface temperature matters as much as air temperature.

      - title: Does humidity affect exterior painting?
        desc: |-
          Yes. High humidity slows drying, can trap moisture, and may affect adhesion or curing. We plan exterior painting around humidity and dew point.

      - title: Does dew affect exterior painting?
        desc: |-
          Yes. Morning dew or overnight moisture can leave surfaces too damp for paint. We wait until surfaces are dry before priming or painting.

      - title: Does wind affect exterior painting?
        desc: |-
          Yes. Wind can carry dust, overspray, leaves, and debris into wet paint. It also affects spraying, masking, ladder safety, and drying.

      - title: Do you power wash before exterior painting?
        desc: |-
          Surfaces are washed when needed to remove dirt, chalk, mildew, pollen, loose residue, and contaminants. Clean surfaces help primer and paint bond.

      - title: Do you scrape peeling paint before repainting?
        desc: |-
          Yes. Loose and peeling paint must be scraped back to a sound edge before sanding, primer, and finish paint. Painting over loose paint leads to early failure.

      - title: Do you sand exterior surfaces?
        desc: |-
          Yes. Sanding smooths rough edges, dulls glossy paint, improves adhesion, and helps repairs blend. The amount depends on the surface and existing coating.

      - title: Do you caulk before exterior painting?
        desc: |-
          Yes. Failed or missing caulking around trim, windows, doors, joints, and gaps is addressed where appropriate before painting. Proper caulking helps manage water entry.

      - title: Do you prime before exterior painting?
        desc: |-
          Primer is used on bare wood, metal, masonry repairs, stains, chalky surfaces, glossy surfaces, patches, and colour changes where needed for adhesion and coverage.

      - title: Do exterior surfaces need two coats?
        desc: |-
          Most exterior repaints need two finish coats for colour depth, film thickness, durability, and consistent coverage. Some spot repairs also need primer first.

      - title: Can one coat be enough outside?
        desc: |-
          One coat may be enough only for very limited maintenance touch-ups in the same colour and product. Full repaints usually perform better with two coats.

      - title: Do you spray or brush exterior paint?
        desc: |-
          We use the method that fits the surface. Spraying can be efficient for large areas, while brushing and rolling help work paint into trim, rough siding, brick, or detailed surfaces.

      - title: Is spray painting better for exteriors?
        desc: |-
          Spraying is useful on siding, stucco, brick, garage doors, and large surfaces when masking and conditions are right. Back-rolling or brushing may still be needed.

      - title: What is back-rolling?
        desc: |-
          Back-rolling means rolling over sprayed paint to push coating into the surface and improve adhesion, coverage, and texture consistency on porous or rough exteriors.

      - title: Do you protect landscaping before painting?
        desc: |-
          Yes. Plants, shrubs, walkways, patios, lighting, vehicles, windows, doors, stone, and nearby surfaces are protected before washing, scraping, spraying, or painting.

      - title: Do I need to trim shrubs before exterior painting?
        desc: |-
          It helps if shrubs and branches are trimmed away from walls, trim, and siding. Clear access improves prep, safety, masking, and finish quality.

      - title: Do I need to move patio furniture before painters arrive?
        desc: |-
          Move outdoor furniture, planters, grills, and decor away from paint areas if possible. We can help stage protection as part of the project setup.

      - title: Do I need to remove shutters before painting?
        desc: |-
          Shutters may be removed or masked depending on the scope, condition, and desired finish. Removal often gives cleaner prep and coating around edges.

      - title: Do I need to remove downspouts before painting?
        desc: |-
          Downspouts can be masked or temporarily removed depending on the surface behind them and the level of finish needed. We review this during scope.

      - title: Do you paint around exterior lights?
        desc: |-
          Yes. Exterior lights are protected or temporarily adjusted when appropriate. Painting around fixtures requires masking and careful edge work.

      - title: Do you paint around security cameras?
        desc: |-
          Yes. Cameras, wires, sensors, and doorbells are protected during exterior painting. We confirm what can be moved and what must stay active.

      - title: Do you protect windows during exterior painting?
        desc: |-
          Yes. Windows and glass are masked or protected before spraying, scraping, sanding, or painting nearby trim and siding.

      - title: Do you protect brick if only trim is painted?
        desc: |-
          Yes. Brick, stone, stucco, siding, windows, and roofing are protected when only trim, doors, fascia, or garage doors are painted.

      - title: Do you clean up after exterior painting?
        desc: |-
          Yes. Cleanup includes removing masking, collecting paint chips where practical, checking protection, cleaning work areas, and walking through the finished scope.

      - title: Can you paint while we live in the home?
        desc: |-
          Yes. Exterior painting is usually less disruptive than interior work, but we coordinate access, doors, windows, pets, vehicles, and noise expectations.

      - title: Can pets be outside during exterior painting?
        desc: |-
          Pets should be kept safely away from work areas, ladders, wet paint, masking, and open gates. We can plan work zones around pet access.

      - title: Can children be outside during exterior painting?
        desc: |-
          Children should stay away from ladders, tools, wet paint, masking, and active work areas. We keep the site organized, but clear boundaries help.

      - title: Do you need access to water or power?
        desc: |-
          Exterior projects may need water for washing and power for tools. We confirm access needs before the project starts.

      - title: Do you need driveway access?
        desc: |-
          Driveway access helps with ladders, materials, lifts, washing, masking, and cleanup. Vehicles may need to be moved away from work areas.

      - title: Do you use ladders, lifts, or scaffolding?
        desc: |-
          Access depends on height and site conditions. We may use ladders, planks, scaffolding, or lifts where appropriate for safety and reach.

      - title: Do tall homes cost more to paint?
        desc: |-
          Yes. Tall homes take more time because of access equipment, ladder work, safety planning, upper trim, dormers, soffits, fascia, and staging.

      - title: Can you paint three-storey homes?
        desc: |-
          Yes, if access and safety conditions allow. Three-storey exterior painting needs careful planning for ladders, lifts, protection, and weather.

      - title: Can you paint Victorian or heritage homes?
        desc: |-
          Yes. Older and heritage-style homes often need more scraping, sanding, carpentry review, detailed trim prep, colour planning, and careful application.

      - title: Do heritage homes take longer to paint?
        desc: |-
          Usually, yes. Detailed trim, old paint, wood repair, access, multi-colour schemes, and delicate surfaces can take much longer than standard exterior repainting.

      - title: Can you help with exterior colour selection?
        desc: |-
          Yes. We can help narrow exterior colours based on brick, stone, roof colour, windows, trim, garage doors, landscaping, neighbourhood context, and sunlight.

      - title: Can you match existing exterior colours?
        desc: |-
          Yes. Existing exterior colours can often be matched, but sun fading, chalking, sheen loss, and surface age may affect how the new paint looks.

      - title: Can you paint a modern black and white exterior?
        desc: |-
          Yes. Black and white exterior painting is common for stucco, brick, trim, garage doors, windows, and fascia. Deep colours need the right products and prep.

      - title: Do dark exterior colours fade faster?
        desc: |-
          Dark colours can show fading, heat absorption, and surface movement more than lighter colours. Product choice matters for colour retention and durability.

      - title: Can dark colours damage vinyl siding?
        desc: |-
          Dark colours can absorb heat and may warp vinyl if the wrong product or colour is used. Vinyl-safe colours and coatings are important.

      - title: Can you paint exterior brick white?
        desc: |-
          Yes, if the brick is suitable and properly prepared. Brick painting is a permanent-style change and should use breathable masonry-compatible products.

      - title: Can you paint red brick?
        desc: |-
          Yes. Red brick can be painted after cleaning, repairs, and primer where needed. The brick and mortar condition should be reviewed first.

      - title: Can you stain brick instead of painting it?
        desc: |-
          Brick staining may be a better option when you want a mineral look and breathable finish. Painting gives more opacity but changes maintenance expectations.

      - title: Is brick paint or brick stain better?
        desc: |-
          It depends on the brick, look, budget, and maintenance goals. Stain keeps more masonry texture; paint gives stronger colour coverage and a more uniform finish.

      - title: Can painted brick peel?
        desc: |-
          Painted brick can peel if moisture, wrong products, dirty surfaces, poor prep, or trapped water are present. Breathable systems and surface review matter.

      - title: Do you paint masonry?
        desc: |-
          Yes. Masonry can be painted when clean, dry, sound, and compatible with the coating. Mortar repairs and moisture issues should be addressed first.

      - title: Can you paint concrete block?
        desc: |-
          Yes. Concrete block can be painted with suitable masonry coatings after cleaning, repair, primer where needed, and moisture review.

      - title: Can you paint foundation walls?
        desc: |-
          Foundation painting depends on moisture, surface condition, coating compatibility, and whether the wall needs masonry paint, parging repair, or another solution.

      - title: Can you paint stucco?
        desc: |-
          Yes. Stucco can be painted with the right cleaning, crack repair, primer, and coating. Texture, staining, and moisture must be reviewed before painting.

      - title: Can you paint EIFS?
        desc: |-
          EIFS requires careful product selection and moisture review. The coating must be compatible and breathable, and damaged areas should be repaired first.

      - title: Can you repair stucco cracks before painting?
        desc: |-
          Small stucco cracks can often be repaired before coating. Larger cracks, delamination, or moisture problems may need stucco repair before painting.

      - title: Can you paint stained stucco?
        desc: |-
          Yes, but the cause of staining should be checked first. Water runoff, eavestrough issues, algae, dirt, or rust stains may need cleaning or primer.

      - title: Can you paint aluminum siding?
        desc: |-
          Yes. Aluminum siding can be painted after washing chalking residue, dulling glossy areas, priming where needed, and using exterior coatings suited to metal.

      - title: What is chalking on aluminum siding?
        desc: |-
          Chalking is a powdery residue from weathered paint. It must be washed and stabilized before repainting or new paint may not bond properly.

      - title: Can you paint faded aluminum siding?
        desc: |-
          Yes. Faded aluminum siding can often be repainted instead of replaced when the panels are sound and properly washed, primed where needed, and coated.

      - title: Can you paint vinyl siding?
        desc: |-
          Yes, with vinyl-safe colours and products. Vinyl siding must be clean, sound, and painted with colours that will not create damaging heat absorption.

      - title: Can you paint wood siding?
        desc: |-
          Yes. Wood siding needs washing, scraping, sanding, caulking, primer on bare areas, repairs where needed, and exterior paint or stain suited to exposure.

      - title: Can you paint cedar siding?
        desc: |-
          Yes. Cedar needs careful prep because tannins, weathering, and previous stains can affect adhesion and colour. Product choice is important.

      - title: Can you stain cedar instead of painting it?
        desc: |-
          Yes. Cedar can be stained when the surface condition and desired look support it. Stain often needs different prep and maintenance than paint.

      - title: Can you paint fibre cement siding?
        desc: |-
          Yes. Fibre cement siding can be painted with suitable exterior products after cleaning, repair, caulking, and primer where needed.

      - title: Can you paint composite siding?
        desc: |-
          Composite siding may be paintable depending on manufacturer guidance, condition, and coating compatibility. We review the material before recommending paint.

      - title: Can you paint metal siding?
        desc: |-
          Yes. Metal siding needs cleaning, rust treatment where needed, primer on bare or problem areas, and coatings suited to metal expansion and weather.

      - title: Can you paint steel doors?
        desc: |-
          Yes. Steel doors need cleaning, sanding, rust treatment if present, primer where needed, and durable exterior paint. Weather stripping and hardware are protected.

      - title: Can you paint fiberglass doors?
        desc: |-
          Yes. Fiberglass doors can be painted with proper cleaning, sanding, primer where required, and exterior-grade coatings suited to the existing finish.

      - title: Can you paint wood doors?
        desc: |-
          Yes. Wood doors need sanding, repair, primer or stain system, and protection from moisture and sun. The bottom edge and panel joints matter.

      - title: Can you paint front doors?
        desc: |-
          Yes. Front door painting can update curb appeal quickly. We prep panels, edges, sidelights, glass, hardware, and weather stripping for a clean finish.

      - title: Can you paint patio doors?
        desc: |-
          Yes. Patio doors and frames can be painted depending on material, condition, and coating compatibility. Glass and tracks are protected.

      - title: Can you paint garage doors black?
        desc: |-
          Yes, when the door material and exposure allow it. Black garage doors need careful product selection because dark colours absorb heat.

      - title: Can you paint metal garage doors?
        desc: |-
          Yes. Metal garage doors need cleaning, scuffing, spot primer where needed, and exterior paint suited to metal and movement.

      - title: Can you paint wood garage doors?
        desc: |-
          Yes. Wood garage doors need sanding, repairs, primer, and durable exterior paint or stain depending on the desired finish.

      - title: Can you spray garage doors?
        desc: |-
          Yes. Spraying can create a smooth garage door finish when masking, wind, and site conditions are right. Brushing or rolling may be used where better.

      - title: Can you paint exterior window frames?
        desc: |-
          Yes. Exterior window frames can be painted depending on material. Wood and some metal frames are common; vinyl needs product-specific review.

      - title: Can you paint vinyl windows?
        desc: |-
          Vinyl window painting may be possible with proper products and colours, but heat absorption, adhesion, and manufacturer warranty should be considered first.

      - title: Can you paint exterior shutters?
        desc: |-
          Yes. Shutters can be painted or sprayed after cleaning, sanding, primer where needed, and colour/product selection based on material.

      - title: Can you paint fascia?
        desc: |-
          Yes. Fascia boards are commonly painted. We check for peeling paint, wood rot, open joints, eavestrough stains, and primer needs before coating.

      - title: Can you paint soffits?
        desc: |-
          Yes. Soffits can be painted depending on material and ventilation. Aluminum, wood, and vented soffits each need different prep.

      - title: Can you paint eavestroughs?
        desc: |-
          Eavestrough painting depends on material, condition, oxidation, adhesion, and access. Some gutters can be painted after cleaning and proper primer.

      - title: Can you paint downspouts?
        desc: |-
          Yes. Downspouts can be painted or matched to trim when cleaned, scuffed, primed where needed, and coated with compatible paint.

      - title: Can you paint railings?
        desc: |-
          Yes. Exterior railings need cleaning, sanding, rust treatment for metal, primer where needed, and durable paint suited to hand contact and weather.

      - title: Can you paint wrought iron railings?
        desc: |-
          Yes. Wrought iron railings need rust removal, sanding, metal primer, and exterior metal paint. Heavy rust may require more preparation.

      - title: Can you paint aluminum railings?
        desc: |-
          Aluminum railings can often be painted after cleaning, dulling glossy surfaces, and using the right bonding primer and topcoat.

      - title: Can you paint fences?
        desc: |-
          Yes. Fences can be painted or stained depending on material, age, moisture, and desired look. New pressure-treated wood usually needs time before coating.

      - title: Can you stain decks?
        desc: |-
          Deck staining depends on wood type, age, moisture, previous coating, cleaning, sanding, and product choice. We review deck condition before recommending.

      - title: Can you paint decks?
        desc: |-
          Decks can be painted, but stain is often better for horizontal wood because it handles wear differently. The right choice depends on condition and expectations.

      - title: Can you paint pergolas?
        desc: |-
          Yes. Pergolas can be painted or stained after cleaning, sanding, repairs, primer, and protection for nearby surfaces and landscaping.

      - title: Can you paint exterior ceilings?
        desc: |-
          Yes. Porch ceilings, covered entry ceilings, exterior soffit ceilings, and commercial exterior ceilings can be painted with products suited to exposure.

      - title: Can you paint porch columns?
        desc: |-
          Yes. Porch columns can be painted after cleaning, sanding, caulking, primer, and repairs. Wood, fiberglass, metal, and PVC columns need different prep.

      - title: Can you paint PVC trim?
        desc: |-
          PVC trim can often be painted with compatible products. Colour choice matters because dark colours can create heat movement.

      - title: Can you paint exterior wood trim white?
        desc: |-
          Yes. Exterior wood trim can be painted white after scraping, sanding, caulking, primer, and repair of any rot or failing joints.

      - title: Can you paint exterior trim black?
        desc: |-
          Yes. Black exterior trim needs careful product choice because dark colours show defects and absorb heat. Prep and clean lines matter.

      - title: Can you paint exterior stone?
        desc: |-
          Some stone can be coated, but many stone surfaces are better left natural. We review moisture, porosity, and desired look before recommending paint.

      - title: Can you paint brick arches?
        desc: |-
          Yes. Brick arches can be painted or stained when the masonry is sound and the coating is suitable. Masking and edge detail are important.

      - title: Can you paint chimney exteriors?
        desc: |-
          Chimney painting depends on masonry condition, moisture, height, flashing, and coating compatibility. Repairs may be needed before paint.

      - title: Can you paint exterior stairs?
        desc: |-
          Exterior stairs can be painted or stained depending on material and foot traffic. Slip resistance and durability should be considered.

      - title: Can you paint concrete porches?
        desc: |-
          Concrete porches need cleaning, repair, moisture review, and suitable coatings. Horizontal concrete requires products made for foot traffic.

      - title: Can you paint commercial storefronts?
        desc: |-
          Yes. Storefront trim, doors, frames, exterior panels, signage surrounds, and entries can be painted with scheduling that limits disruption.

      - title: Can you paint office building exteriors?
        desc: |-
          Yes. Office building exterior painting can include doors, trim, masonry, metal panels, railings, common entries, and exterior details.

      - title: Can you paint retail plazas?
        desc: |-
          Yes. Retail plaza painting needs phasing, signage protection, customer access planning, safety, and after-hours or off-hours scheduling when required.

      - title: Can you paint restaurants or cafes?
        desc: |-
          Yes. Restaurants and cafes may need off-hours scheduling, entry protection, patio coordination, odour planning, and quick turnaround exterior touch-ups.

      - title: Can you paint warehouse exteriors?
        desc: |-
          Small warehouse and light industrial exterior painting can be reviewed based on access, surface type, safety needs, metal siding, doors, and coatings.

      - title: Can you paint loading doors?
        desc: |-
          Yes. Loading doors, overhead doors, frames, bollards, and nearby metal details can be painted with proper prep and access planning.

      - title: Can you paint exterior metal frames?
        desc: |-
          Yes. Exterior metal frames need cleaning, sanding, rust treatment, primer, and durable coating suited to weather and use.

      - title: Can you paint commercial railings?
        desc: |-
          Yes. Commercial railings need safe access, rust review, primer, durable coatings, and scheduling to keep entrances or walkways usable.

      - title: Can you paint concrete block commercial buildings?
        desc: |-
          Yes. Concrete block can be painted with masonry coatings after cleaning, repairs, moisture review, and primer where needed.

      - title: Can you paint tilt-up concrete?
        desc: |-
          Tilt-up concrete can be painted with compatible commercial coatings after cleaning, crack repair, moisture review, and access planning.

      - title: Do commercial exterior projects need lifts?
        desc: |-
          Some commercial exterior projects need lifts, scaffolding, or staging for safe access. We review height, ground conditions, traffic, and business operations.

      - title: Can you work after hours for commercial painting?
        desc: |-
          Commercial painting can often be phased around business hours, weekends, tenant access, customer traffic, or property management requirements.

      - title: Can you provide insurance for property managers?
        desc: |-
          Yes. We can provide WSIB and liability insurance details when property managers, condo boards, or commercial clients need documentation.

      - title: Do you coordinate with property managers?
        desc: |-
          Yes. We can coordinate exterior painting scope, access, insurance, timing, tenant notices, and walkthroughs with property managers or building representatives.

      - title: Do you paint condo townhouse exteriors?
        desc: |-
          Yes. Condo townhouse exterior painting may require property manager approval, colour rules, insurance, work-hour limits, and common area protection.

      - title: Do you paint strata or condo common areas?
        desc: |-
          We can review exterior common area painting such as doors, trim, railings, entries, garage doors, and small building details depending on scope.

      - title: Can you paint rental property exteriors?
        desc: |-
          Yes. Rental property exterior painting often focuses on curb appeal, durability, fast scheduling, safety, and clear scope before tenant turnover or listing.

      - title: Can you paint before selling a house?
        desc: |-
          Yes. Exterior painting before listing can improve curb appeal, listing photos, buyer confidence, and perceived maintenance. Focus areas often include trim, doors, garage doors, and front elevations.

      - title: Does exterior painting increase home value?
        desc: |-
          Exterior painting can improve curb appeal and buyer perception, especially when dated brick, faded siding, peeling trim, or old garage doors make the home look neglected.

      - title: Can exterior painting help with curb appeal?
        desc: |-
          Yes. A coordinated exterior colour plan for stucco, brick, trim, doors, garage doors, railings, and lighting can make the whole property feel newer.

      - title: Do you help choose black trim colours?
        desc: |-
          Yes. Black trim choices should be matched to window colour, roof, brick, stone, stucco, garage doors, and sunlight exposure.

      - title: Do you paint exterior accents?
        desc: |-
          Yes. Exterior accents such as doors, shutters, trim, garage doors, fascia, railings, porch ceilings, and columns can change curb appeal without repainting everything.

      - title: Can you paint only the front elevation?
        desc: |-
          Yes. Some homeowners paint only the front elevation, entry, garage doors, trim, or visible exterior surfaces. We can scope targeted exterior upgrades.

      - title: Can you paint only garage doors and trim?
        desc: |-
          Yes. Garage doors and trim are common targeted projects when the main exterior is still in good condition but curb appeal needs a refresh.

      - title: Can you paint only exterior doors?
        desc: |-
          Yes. Front doors, side doors, service doors, patio doors, and garage man doors can be painted as smaller exterior projects.

      - title: Can you touch up exterior paint?
        desc: |-
          Touch-ups are possible, but exterior fading and weathering can make colour matching difficult. Larger blended areas may look better than small spot touch-ups.

      - title: Why do exterior touch-ups show?
        desc: |-
          Exterior touch-ups can show because of UV fading, dirt, sheen change, weathering, different paint batches, and texture differences.

      - title: Can you fix peeling exterior paint?
        desc: |-
          Yes. Peeling paint must be scraped, sanded, primed, and repainted. The underlying cause, such as moisture or poor adhesion, should be addressed first.

      - title: What causes exterior paint peeling?
        desc: |-
          Peeling can come from moisture, dirty surfaces, old failing paint, wrong primer, trapped water, painting damp surfaces, poor prep, or incompatible coatings.

      - title: What causes exterior paint bubbling?
        desc: |-
          Bubbling can come from moisture, heat, direct sun, trapped vapour, painting over contamination, or applying paint before the surface is ready.

      - title: What causes exterior paint cracking?
        desc: |-
          Cracking can come from age, low-quality paint, thick old paint layers, movement, UV exposure, moisture, or applying rigid coatings on moving surfaces.

      - title: What causes exterior paint fading?
        desc: |-
          Fading is caused by UV exposure, colour choice, product quality, weather, and surface exposure. Dark and bright colours can fade more noticeably.

      - title: What causes exterior paint chalking?
        desc: |-
          Chalking is powdery paint breakdown from weather and UV exposure. It must be washed and stabilized before repainting.

      - title: What causes exterior paint mildew?
        desc: |-
          Mildew grows where moisture, shade, dirt, and organic residue remain. Cleaning, ventilation, drainage, and suitable coatings help reduce recurrence.

      - title: What causes rust stains on exterior paint?
        desc: |-
          Rust stains may come from exposed metal, fasteners, railings, fixtures, or runoff. Rust must be treated before repainting or it can bleed through.

      - title: Can you paint over rust?
        desc: |-
          Rust should be removed or treated before primer and paint. Painting directly over rust can lead to bleed-through and early failure.

      - title: Can you paint over mildew?
        desc: |-
          Mildew should be cleaned and the cause reviewed before painting. Painting over mildew can lead to staining, poor adhesion, and recurring marks.

      - title: Can you paint over dirt or pollen?
        desc: |-
          No. Dirt, pollen, chalk, and dust interfere with adhesion. Exterior surfaces should be cleaned and dry before primer or paint.

      - title: Can you paint over old oil-based exterior paint?
        desc: |-
          Old oil-based paint may need sanding, cleaning, bonding primer, and compatible topcoats. Surface testing helps determine the best prep.

      - title: Can you paint over glossy exterior paint?
        desc: |-
          Glossy paint should be cleaned, dulled by sanding or deglossing, and primed where needed for adhesion.

      - title: Can you paint over stain?
        desc: |-
          Some stained surfaces can be painted after cleaning, sanding, primer, and compatibility review. Transparent or oil stains may need special prep.

      - title: Can you paint pressure-treated wood?
        desc: |-
          Pressure-treated wood usually needs to dry before coating. Moisture content and age should be checked before paint or stain.

      - title: Can you paint new wood outside?
        desc: |-
          Yes, once dry and ready. New exterior wood needs primer on all exposed surfaces where possible, including edges, cuts, and end grain.

      - title: Can you paint rotted wood?
        desc: |-
          Rotted wood should be repaired or replaced before painting. Paint will not stabilize rotten trim, fascia, siding, or door frames.

      - title: Do you repair wood rot before painting?
        desc: |-
          Light repairs can be reviewed as part of prep. Significant rot may need carpentry before painting so the coating has a solid surface.

      - title: Do you replace caulking before painting?
        desc: |-
          Failed caulking is removed and replaced where appropriate. Not every joint should be sealed, so we follow the surface and drainage needs.

      - title: Do you seal gaps before painting?
        desc: |-
          Gaps around windows, doors, trim, and joints may be sealed with exterior caulking where appropriate. Drainage paths and material movement are considered.

      - title: Do you fill nail holes outside?
        desc: |-
          Yes. Nail holes and small defects in trim can be filled with suitable exterior filler, sanded, primed where needed, and painted.

      - title: Do you patch masonry before painting?
        desc: |-
          Small masonry repairs can be reviewed, but loose mortar, major cracks, spalling, or water issues may need masonry repair before coating.

      - title: Do you fix mortar before painting brick?
        desc: |-
          Mortar problems should be addressed before painting or staining brick. Loose or deteriorated mortar can let moisture behind coatings.

      - title: Can you paint spalling brick?
        desc: |-
          Spalling brick should be repaired or reviewed before painting. Paint can hide damage but does not solve moisture or masonry failure.

      - title: Can you paint wet brick?
        desc: |-
          No. Brick should be dry before coating. Moisture in masonry can cause adhesion issues, blistering, peeling, or trapped water problems.

      - title: Can you paint damp wood?
        desc: |-
          No. Damp wood should dry before primer and paint. Painting damp wood can trap moisture and lead to peeling or rot.

      - title: Do you check surface moisture?
        desc: |-
          We review surface dryness before painting. Moisture concerns are especially important for wood, stucco, masonry, shaded elevations, and recent washing.

      - title: Do you use elastomeric paint?
        desc: |-
          Elastomeric coatings may be considered for some stucco or masonry surfaces, but they are not right for every exterior. Compatibility and breathability matter.

      - title: Do you use acrylic exterior paint?
        desc: |-
          High-quality acrylic exterior paint is common for many surfaces because it offers flexibility, adhesion, and weather resistance when used correctly.

      - title: Do you use oil-based exterior paint?
        desc: |-
          Oil-based products are used only when appropriate. Many exterior projects use modern acrylic systems, but primer and surface needs guide the choice.

      - title: What paint brands do you use for exterior painting?
        desc: |-
          We commonly work with premium exterior paint systems from Benjamin Moore and Sherwin Williams. Product choice depends on surface, exposure, colour, and coating needs.

      - title: What sheen is best for exterior paint?
        desc: |-
          Exterior sheen depends on surface and desired look. Lower sheens can hide texture; satin or semi-gloss may be used for trim, doors, and details.

      - title: Should exterior trim be satin or semi-gloss?
        desc: |-
          Satin and semi-gloss are common for trim because they are durable and easier to clean. The best choice depends on surface condition and style.

      - title: Should stucco be flat or low sheen?
        desc: |-
          Stucco often looks best in lower sheens because texture and surface variation are less obvious. The coating system matters more than sheen alone.

      - title: Should brick be painted matte?
        desc: |-
          Painted brick often looks better in lower sheen masonry coatings. Sheen choice depends on product, desired look, and how much texture you want to show.

      - title: What exterior colours are popular in Toronto?
        desc: |-
          White, warm off-white, black trim, charcoal, greige, taupe, soft grey, deep green, and natural stone-inspired palettes are common for GTA homes.

      - title: Can you match paint to stone or roof colour?
        desc: |-
          Yes. Exterior colours should work with fixed elements like stone, brick, roof shingles, windows, driveway, landscaping, and neighbouring homes.

      - title: Can you paint soffits black?
        desc: |-
          Yes, if the material and conditions allow it. Black soffits can modernize a home but require careful product selection and clean edge work.

      - title: Can you paint fascia black?
        desc: |-
          Yes. Black fascia is common on modern exterior updates. It needs good prep because dark finishes show defects and absorb heat.

      - title: Can you paint gutters black?
        desc: |-
          Some gutters can be painted black with proper cleaning, scuffing, primer, and compatible coating. Heat and expansion are considered.

      - title: Can you paint exterior lights?
        desc: |-
          Exterior lights are usually protected rather than painted. Metal fixtures may be paintable as a separate specialty item if properly prepared.

      - title: Can you coordinate painting with exterior renovations?
        desc: |-
          Yes. Painting can be coordinated with windows, doors, roofing, eavestroughs, masonry, landscaping, lighting, and carpentry. Proper sequencing avoids damage.

      - title: Should exterior painting happen before new windows?
        desc: |-
          Usually new windows should be installed before final exterior painting and caulking, but the right order depends on trim, siding, and project scope.

      - title: Should exterior painting happen before landscaping?
        desc: |-
          Painting is often easier before delicate landscaping is installed. If landscaping is already finished, we plan protection and access carefully.

      - title: Should exterior painting happen before eavestrough replacement?
        desc: |-
          If eavestroughs are being replaced, painting fascia and trim may be easier after removal and before new gutters are installed.

      - title: Should exterior painting happen before new lighting?
        desc: |-
          Often, yes. Painting before final exterior lighting installation gives cleaner surfaces, but wiring and fixture placement should be coordinated.

      - title: Can you paint around new pot lights or soffit lights?
        desc: |-
          Yes. Soffit lights and exterior fixtures are protected or worked around carefully. Fresh lighting can reveal paint lines and surface defects.

      - title: Can you paint a house with solar panels?
        desc: |-
          Solar panels may affect access and safety. We review rooflines, wiring, mounting, and work areas before confirming exterior painting scope.

      - title: Can you paint near pools?
        desc: |-
          Yes, with protection and scheduling. Pool decks, water, equipment, and furniture need care during washing, masking, and painting.

      - title: Can you paint near cars in the driveway?
        desc: |-
