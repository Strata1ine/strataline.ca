  - type: Benefits
    title: Why exterior paint matters
    content:
      - title: Weather protection
        desc: |-
          Exterior paint protects wood, trim, doors, siding, stucco, masonry, and metal from sun, rain, freeze-thaw cycles, and daily wear.

      - title: Better curb appeal
        desc: |-
          Fresh exterior paint can change the look of a home or commercial space quickly, especially on doors, garage doors, window trim, railings, and storefront details.

      - title: Proper surface prep
        desc: |-
          We clean, scrape, sand, caulk, patch, prime, and mask before painting. Good prep is what helps exterior coatings adhere and last.

      - title: Residential and commercial
        desc: |-
          We paint homes, condos, offices, retail spaces, storefront details, common areas, and small commercial exteriors with WSIB coverage and 5M liability insurance.

