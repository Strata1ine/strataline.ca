sections:
  - type: Benefits
    title: Window replacement planning
    content:
      - title: Match the opening and room
        desc: |-
          Casement, awning, slider, hung, picture, fixed, bay, and specialty windows each solve different airflow, view, egress, and design needs.
      - title: Draft and condensation review
        desc: |-
          Window replacement can help with drafts, fogged glass, poor seals, cold rooms, water staining, and old frames that no longer close properly.
      - title: Energy-efficient glass
        desc: |-
          Low-E glass, argon fills, warm-edge spacers, frame design, and proper installation all affect comfort and efficiency.
      - title: Exterior and interior finishing
        desc: |-
          Trim, drywall, casing, capping, caulking, sill condition, and exterior colours should be reviewed with the window order.

