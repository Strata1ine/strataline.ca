  - type: Faq
    title: Window replacement FAQ
    content:
      - title: When should windows be replaced?
        desc: |-
          Replacement is worth considering when windows are drafty, fogged between panes, hard to operate, leaking, rotting, noisy, or visibly failing around the frame.
      - title: Which window style is best?
        desc: |-
          It depends on room use, airflow, view, size, egress, security, and exterior design. Casement and awning windows are common for tighter seals.
      - title: Can window replacement reduce drafts?
        desc: |-
          Yes, if the window and installation details address air leakage around the frame, sash, trim, and exterior seal.
      - title: Do you replace patio doors too?
        desc: |-
          Yes. Patio doors, sliding doors, garden doors, and entry doors can be planned with window replacement.

