  - type: Faq
    title: Smooth ceiling FAQ
    content:
      - title: Is popcorn removal enough for a smooth ceiling?
        desc: |-
          Not usually. Once texture is removed, the ceiling often needs drywall repair, skim coating, sanding, primer, and paint to look properly smooth.
      - title: Why do smooth ceilings show flaws?
        desc: |-
          Ceilings catch light across a wide flat plane. Tape joints, old patches, ridges, and uneven sanding can show unless the prep is handled carefully.
      - title: Can you fix cracked ceiling seams?
        desc: |-
          Yes. We repair cracked seams, loose tape, nail pops, water-damaged compound, and old patch lines before finishing.
      - title: Do smooth ceilings create a lot of dust?
        desc: |-
          Sanding can create dust, but protection, containment, dust extraction, and cleanup reduce disruption in finished homes.

