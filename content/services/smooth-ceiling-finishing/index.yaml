sections:
  - type: Benefits
    title: What makes a ceiling look finished
    content:
      - title: Flatness before paint
        desc: |-
          Ceiling paint does not hide waves, ridges, tape lines, or old texture. The surface needs proper repair, sanding, and priming first.
      - title: Careful skim coating
        desc: |-
          Skim coating helps correct uneven ceiling texture, old popcorn residue, drywall seams, patch marks, and shadowing under natural light.
      - title: Dust-controlled prep
        desc: |-
          Ceiling sanding can be messy, so we plan containment, protection, cleanup, and workflow for finished homes.
      - title: Paint matched to ceiling light
        desc: |-
          Smooth ceilings need the right flat paint, primer, roller technique, and drying conditions to reduce flashing and lap marks.

  - type: ZigZag
    title: Connected ceiling services
    content:
