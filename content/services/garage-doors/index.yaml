  - type: Benefits
    title: What a garage door replacement gets you
    content:
      - title: R-16 polyurethane insulation
        desc: |-
          Clopay Intellicore and Amarr polyurethane-injected cores hit R-16 or higher - critical for attached garages in Ontario winters.

      - title: LiftMaster belt-drive openers
        desc: |-
          LiftMaster 8550W with Chamberlain myQ smart control. Open, close, and monitor your door from your phone.

      - title: Steel, aluminum, or full-view glass
        desc: |-
          25-gauge steel for durability, aluminum frames for modern glass panels, or composite overlays for a wood-grain look without the upkeep.

      - title: Curb appeal with real ROI
        desc: |-
          A new garage door recoups roughly 100% of its cost at resale according to Remodeling Magazine's Cost vs. Value report.

      - title: Weatherstripping and threshold seals
        desc: |-
          Bottom rubber seals, side weatherstripping, and header seals block drafts, rain, and road salt from Ontario freeze-thaw cycles.

      - title: Torsion spring and track systems
        desc: |-
          Galvanized torsion springs rated for 10,000+ cycles. Nylon rollers on steel tracks for quiet, smooth travel.

