  - type: Faq
    title: Garage door FAQ
    content:
      - title: What garage door services do you provide?
        desc: |-
          We provide garage door installation, garage door replacement, garage door repair, opener installation, opener repair, spring replacement, cable repair, roller replacement, track repair, weatherstripping, bottom seal replacement, keypad setup, smart opener setup, panel replacement, insulated garage door upgrades, glass garage doors, and custom garage doors.

      - title: Do you repair garage doors or only install new ones?
        desc: |-
          We do both. If the door panels, tracks, and frame are still in good condition, repair may be enough. If the door is bent, rusted, poorly insulated, repeatedly failing, or too heavy for the opener and spring system, replacement is usually the better long-term choice.

      - title: How do I know if my garage door spring is broken?
        desc: |-
          Common signs of a broken spring include a loud bang from the garage, the opener lifting the door only an inch or two, a door that feels extremely heavy by hand, a visible gap in the torsion spring, a crooked door, or cables hanging loose. Stop using the opener until the spring system is inspected.

      - title: Should I replace both garage door springs if only one breaks?
        desc: |-
          Usually yes when the springs are the same age and work as a pair. A new spring beside an old tired spring can leave the door unbalanced, strain the opener, and cause uneven lifting. We check spring size, cycle life, door weight, and balance before recommending the right repair.

      - title: Are garage door springs dangerous?
        desc: |-
          Yes. Torsion springs and extension springs are under high tension and can cause serious injury if handled without the right tools and training. Do not loosen, wind, unwind, cut, or remove spring hardware yourself.

      - title: Can I open the garage door with a broken spring?
        desc: |-
          It is not recommended. The spring carries most of the door weight. Running the opener with a broken spring can strip gears, bend the top panel, pull the opener bracket loose, drop the door, or cause cables to slip off the drums.

      - title: Why does my garage door open a few inches and stop?
        desc: |-
          A door that lifts a few inches and stops often has a broken spring, weak spring, binding track, damaged roller, cable issue, or an opener force limit reacting to too much resistance. The door should be tested by hand after disconnecting the opener, but heavy or stuck doors should be left for a technician.

      - title: Why is my garage door stuck halfway?
        desc: |-
          A stuck halfway door may have a broken spring, slipped cable, bent track, damaged roller, broken hinge, obstruction, or opener travel issue. Do not force it. Forcing a stuck door can bend panels or pull the door out of the tracks.

      - title: Why did my garage door cable snap?
        desc: |-
          Cables can snap from age, rust, fraying, poor drum alignment, worn bearings, damaged bottom brackets, an unbalanced door, broken springs, or a door that has been forced while jammed. Cable problems should be repaired before the door is used again.

      - title: What does it mean if a garage door cable is hanging loose?
        desc: |-
          A loose or dangling cable often means the door is out of balance, the spring has failed, the cable came off the drum, or the door moved unevenly. Do not run the opener. The cable system should be reset with the door supported safely.

      - title: Can you repair garage door cables?
        desc: |-
          Yes. We repair and replace garage door lift cables, inspect drums, bearings, bottom brackets, pulleys, springs, and track alignment, then rebalance the door so the cable problem does not return immediately.

      - title: Can you fix a garage door that is off track?
        desc: |-
          Yes. An off-track garage door should not be forced open or closed. We inspect rollers, tracks, cables, hinges, brackets, bottom fixtures, spring balance, and panel damage before realigning the door.

      - title: Why does my garage door close and then open again?
        desc: |-
          The usual causes are blocked or misaligned photo-eye sensors, dirty sensor lenses, bad sensor wiring, tight weatherstripping, a binding track, wrong opener force settings, incorrect travel limits, or the door hitting the floor before the opener thinks it is closed.

      - title: Why will my garage door not close unless I hold the wall button?
        desc: |-
          That often points to a safety sensor issue. The opener may allow constant-pressure closing from the wall button but refuse remote closing when the photo eyes are blocked, misaligned, dirty, sun-affected, or disconnected.

      - title: Why does my garage door reverse in winter?
        desc: |-
          Winter reversal can come from stiff weatherstripping, ice at the bottom seal, frozen tracks, thick grease, weak opener settings, tight rollers, contracting framing, or a door that is already out of balance. The fix depends on whether the door is binding or the opener is misreading resistance.

      - title: Why is my garage door so noisy?
        desc: |-
          Noise can come from worn steel rollers, dry hinges, loose track bolts, tired springs, a chain-drive opener, poor opener mounting, bent tracks, damaged bearings, or panels flexing during travel. A quiet door starts with balance and hardware, not just a quiet opener.

      - title: What is included in a garage door tune-up?
        desc: |-
          A tune-up can include door balance testing, spring inspection, cable inspection, roller and hinge review, track alignment, bracket tightening, opener force and travel checks, sensor testing, weatherseal review, lubrication, and safety testing.

      - title: How often should a garage door be maintained?
        desc: |-
          A residential garage door should be inspected at least once a year, and more often if it is used as the main entry. Busy households, heavy insulated doors, older tracks, and cold garages benefit from regular maintenance.

      - title: What parts should be lubricated on a garage door?
        desc: |-
          Hinges, steel roller stems, bearings, torsion springs, and some opener chains may need light garage-door-safe lubricant. Do not pack tracks with heavy grease. Nylon rollers, belts, sensors, and electrical parts should not be coated.

      - title: Do you install garage door openers?
        desc: |-
          Yes. We install belt-drive openers, chain-drive openers, wall-mount openers, smart WiFi openers, battery backup openers, keypads, wall controls, remotes, and safety sensors.

      - title: Should I choose a belt-drive or chain-drive opener?
        desc: |-
          Belt-drive openers are quieter and are often better for attached garages or rooms above the garage. Chain-drive openers are durable and cost-effective but usually louder. The right choice depends on door weight, garage layout, budget, and noise sensitivity.

      - title: Are wall-mount garage door openers worth it?
        desc: |-
          Wall-mount openers can be useful for high ceilings, finished garages, storage lifts, or a cleaner ceiling. They need the right torsion setup, side clearance, outlet location, and cable tension monitoring.

      - title: Do I need a battery backup opener?
        desc: |-
          Battery backup is useful if the garage is a primary entry, if there is no easy pedestrian door, or if power outages would trap a vehicle. It lets the opener operate for limited cycles during an outage.

      - title: Can you program remotes, keypads, and car HomeLink?
        desc: |-
          Yes. We can program compatible remotes, keypad entry, wall controls, and vehicle HomeLink systems. Compatibility depends on opener brand, model, radio frequency, and security protocol.

      - title: Why does my garage door remote work sometimes but not always?
        desc: |-
          Intermittent remote problems can come from weak batteries, antenna position, radio interference, LED bulb interference, old remotes, receiver board issues, range limits, or opener logic board failure.

      - title: Why is my garage door opener humming but not moving the door?
        desc: |-
          A humming opener may have a failed capacitor, stripped gear, jammed trolley, locked door, broken spring, or motor problem. If the door is heavy by hand, repair the door first before blaming the opener.

      - title: Can a garage door opener damage the door?
        desc: |-
          Yes. An opener can bend the top panel, strip gears, pull the opener bracket, or force a door off track when the door is unbalanced, frozen, stuck, or set with excessive force. The opener should move a balanced door, not drag a failed one.

      - title: Do you install insulated garage doors?
        desc: |-
          Yes. We install insulated garage doors for attached garages, rooms over garages, workshops, gyms, storage areas, and homes where comfort, noise, strength, and curb appeal matter.

      - title: What R-value should a garage door have?
        desc: |-
          R-value depends on how the garage is used. A detached storage garage may not need the same insulation as an attached garage below a bedroom. For Toronto and GTA homes, insulated steel doors are often a practical choice for comfort, stiffness, and winter performance.

      - title: Is an insulated garage door worth it?
        desc: |-
          Often yes, especially for attached garages, garages with rooms above, garages used as workshops or gyms, and homes with cold drafts near the garage entry. Insulated doors are also usually quieter and more rigid than thin non-insulated doors.

      - title: Will an insulated garage door make my garage warm?
        desc: |-
          Not by itself. Insulation helps reduce heat loss, but garage temperature also depends on wall insulation, ceiling insulation, air leaks, weatherstripping, concrete slab temperature, door seals, and whether the garage is heated.

      - title: Do you replace garage door weatherstripping?
        desc: |-
          Yes. We replace bottom seals, perimeter weatherstripping, threshold seals, and stop moulding where needed to reduce drafts, water entry, light gaps, pests, and rattling.

      - title: Why is there water coming under my garage door?
        desc: |-
          Water can enter because of a worn bottom seal, uneven concrete, missing threshold, poor slope, gaps at the jambs, damaged weatherstripping, wind-driven rain, or snow melting against the door. We check the seal and the floor condition before recommending a fix.

      - title: Why can I see daylight around my garage door?
        desc: |-
          Daylight around the door usually means the perimeter weatherseal is worn, the door is not sitting square, the tracks are misaligned, the bottom seal is compressed, the floor is uneven, or the panels are warped.

      - title: Can you replace one damaged garage door panel?
        desc: |-
          Sometimes. Panel replacement depends on the door brand, model, colour, age, section size, panel profile, and whether matching parts are still available. If several panels are damaged or faded, full replacement may look better.

      - title: Can a bent garage door be repaired?
        desc: |-
          Minor bends may be corrected with reinforcement or hardware adjustment. Severe panel bends, cracked stiles, folded sections, or opener damage often require panel replacement or full door replacement.

      - title: What causes garage door panels to crack at the top?
        desc: |-
          Top panels can crack when the opener arm pulls against an unbalanced or stuck door, when the opener bracket is weak, when the spring is failing, or when the top section lacks proper reinforcement.

      - title: Do you install modern black garage doors?
        desc: |-
          Yes. Black garage doors are popular for modern and transitional homes. We review sun exposure, material, finish, panel profile, glass, exterior colours, and heat buildup before finalizing the choice.

      - title: Do you install glass garage doors?
        desc: |-
          Yes. Full-view glass garage doors can work well for modern homes, studios, gyms, show garages, and contemporary exteriors. We review privacy, insulation, glass type, door weight, opener compatibility, and orientation.

      - title: Do you install wood-look garage doors?
        desc: |-
          Yes. Wood-look steel or composite garage doors give a warm wood appearance with less maintenance than real wood. They are a good option when the home needs natural texture but the owner wants durable panels.

      - title: Do you install carriage-style garage doors?
        desc: |-
          Yes. Carriage-style garage doors suit traditional, stone, brick, and heritage-inspired homes. They can be built as overhead sectional doors with decorative hardware, windows, and insulated steel construction.

      - title: Do you install custom-sized garage doors?
        desc: |-
          Yes. We measure the opening, headroom, side room, backroom, track condition, floor slope, jambs, and opener requirements before ordering a custom-sized garage door.

      - title: What measurements are needed for a garage door quote?
        desc: |-
          Useful measurements include opening width and height, headroom above the opening, side room on each side, backroom depth, ceiling height, existing track type, opener location, and photos of the inside and outside.

      - title: Can you quote garage door repair from photos?
        desc: |-
          Often yes. Send photos of the inside and outside of the door, springs, cables, rollers, tracks, opener, wall button, sensors, bottom seal, and the problem area. A short video of the door trying to move is also helpful.

      - title: How long does garage door installation take?
        desc: |-
          Most standard residential garage door installations take a few hours once the door and parts are on site. Custom doors, opener replacement, capping, framing correction, and weatherseal work can add time.

      - title: How long does garage door repair take?
        desc: |-
          Many common repairs, such as springs, cables, rollers, weatherstripping, sensor alignment, or opener adjustments, can be completed in one visit if the right parts are available.

      - title: How much does garage door repair cost?
        desc: |-
          Cost depends on the failed part, door size, door weight, access, hardware condition, spring type, opener model, and whether multiple parts failed together. Spring, cable, roller, opener, seal, and track repairs are priced differently.

      - title: How much does a new garage door cost?
        desc: |-
          New garage door cost depends on single or double width, insulation, steel thickness, glass, colour, panel profile, custom sizing, opener needs, capping, trim, disposal, and site conditions.

      - title: Do you offer emergency garage door repair?
        desc: |-
          Scheduling depends on availability, but urgent repairs are prioritized when a vehicle is trapped, the door is stuck open, the door is unsafe, a spring has broken, a cable has snapped, or the home cannot be secured.

      - title: What should I do if my garage door is stuck open?
        desc: |-
          Keep people and vehicles clear of the opening, do not force the door, and call for service. A door stuck open may have cable, spring, track, roller, opener, or panel issues and can fall if handled incorrectly.

      - title: What should I do if my car is trapped in the garage?
        desc: |-
          If the door is heavy, crooked, stuck, or has loose cables, do not try to lift it. A technician can secure the door, release tension safely, repair the failed part, and help get the vehicle out.

      - title: Can I use the emergency release cord?
        desc: |-
          The emergency release can disconnect the opener from the door, but it does not fix a broken spring, snapped cable, or stuck door. Only use it when the door is closed or safely supported and you understand how the door will move.

      - title: Why is my garage door crooked?
        desc: |-
          A crooked garage door often means one cable has slipped or snapped, a roller came out, a track is bent, a spring is uneven, or one side is binding. Stop using the opener until it is repaired.

      - title: Why does my garage door slam shut?
        desc: |-
          A door that drops or slams is usually not properly counterbalanced. Broken springs, weak springs, slipped cables, or wrong spring sizing can make the door dangerous. The door should be serviced before further use.

      - title: Why does my garage door move too fast?
        desc: |-
          Fast or uncontrolled movement usually means spring or cable failure. The opener is not designed to control the full weight of a falling door. Stop using the door and schedule repair.

      - title: Why does my garage door shake while opening?
        desc: |-
          Shaking can come from worn rollers, loose hinges, bent tracks, unbalanced springs, damaged panels, opener rail movement, or dry hardware. A balance and hardware inspection will identify the cause.

      - title: Why does my garage door gap at one side?
        desc: |-
          One-sided gaps can come from uneven concrete, worn bottom seal, crooked tracks, loose jamb brackets, warped panels, cable imbalance, or a door not sitting square in the opening.

      - title: Why does my garage door opener light flash?
        desc: |-
          Flashing opener lights often signal sensor obstruction, sensor misalignment, force limit issues, travel limit problems, lock mode, or a fault code. The exact meaning depends on the opener brand and model.

      - title: Why does my garage door keypad stop working?
        desc: |-
          Keypad issues can come from dead batteries, worn buttons, lost programming, frequency mismatch, weather damage, lockout after wrong codes, or opener receiver problems.

      - title: Can you repair commercial garage doors?
        desc: |-
          This page focuses on residential garage doors. If you have a light commercial overhead door, opener, track, spring, or weatherseal issue, send photos and we can confirm whether it fits our scope.

      - title: Do you remove and dispose of the old garage door?
        desc: |-
          Yes. Garage door replacement can include removal and disposal of the old door, old tracks, old opener parts, packaging, and jobsite cleanup.

      - title: Do you install exterior capping or trim around garage doors?
        desc: |-
          Yes, when the project calls for it. Aluminum capping, exterior trim, perimeter seals, and colour coordination help the new garage door look finished from the street.

      - title: Can you match the garage door to my front door or windows?
        desc: |-
          Yes. We can coordinate colour, panel profile, glass style, hardware, and trim with existing front doors, windows, stone, brick, siding, soffits, and exterior paint.

      - title: What garage door material is best?
        desc: |-
          Steel is the most common choice because it is durable, available in insulated options, and comes in many styles. Aluminum and glass suit modern looks. Composite and wood-look doors add warmth. Real wood needs more maintenance.

      - title: What is a torsion spring?
        desc: |-
          A torsion spring is mounted on a shaft above the door opening and helps counterbalance the door weight. It twists under tension as the door moves. It should only be adjusted by a trained technician.

      - title: What is an extension spring?
        desc: |-
          Extension springs stretch along the horizontal tracks on some older or lighter garage doors. They should have safety cables and proper hardware. Many replacements use torsion systems when appropriate.

      - title: What are garage door drums?
        desc: |-
          Cable drums sit on the torsion shaft and guide the lift cables as the door opens and closes. Worn, misaligned, or damaged drums can cause cable problems and uneven door travel.

      - title: What are garage door rollers?
        desc: |-
          Rollers guide the door sections through the tracks. Worn rollers can make the door noisy, shaky, or hard to move. Nylon rollers are often quieter than older steel rollers.

      - title: What are garage door hinges?
        desc: |-
          Hinges connect sectional door panels and allow the door to curve through the track. Loose, cracked, or worn hinges can cause noise, panel flex, or uneven movement.

      - title: What is a garage door safety sensor?
        desc: |-
          Safety sensors are the photo eyes near the bottom of the door tracks. They stop the opener from closing when something blocks the path. They must be aligned, clean, powered, and mounted securely.

      - title: Do you install garage doors in Toronto?
        desc: |-
          Yes. We install and repair garage doors in Toronto, including detached homes, semis, townhomes, laneway garages, attached garages, and finished garages.

      - title: Do you repair garage doors in Vaughan and Woodbridge?
        desc: |-
          Yes. We provide garage door repair, replacement, openers, springs, cables, rollers, and insulated garage door installation in Vaughan, Woodbridge, Maple, and nearby York Region areas.

      - title: Do you service Richmond Hill, Markham, and Aurora?
        desc: |-
          Yes. We service Richmond Hill, Markham, Aurora, King City, Kleinburg, Stouffville, Newmarket, and nearby communities for garage door installation and repair.

      - title: Do you service Mississauga, Oakville, and Burlington?
        desc: |-
          Yes. We provide garage door replacement, repair, insulated doors, openers, weatherstripping, and custom garage doors in Mississauga, Oakville, Burlington, and nearby west GTA areas.

      - title: Do you service Pickering, Ajax, Whitby, and Oshawa?
        desc: |-
          Yes. We service Durham Region, including Pickering, Ajax, Whitby, and Oshawa, for garage door repair, replacement, springs, cables, openers, and insulated garage door upgrades.

