  - type: Faq
    title: Garage door cost, timing, and specs
    content:
      - title: How much does a new garage door cost installed?
        desc: |-
          A single insulated steel door with opener runs $1,800 to $3,500 installed. Full-view aluminum and glass doors start around $4,000. Custom carriage styles run $3,500 to $6,000+.

      - title: Are insulated garage doors worth it in Ontario?
        desc: |-
          Yes - if your garage is attached to the house. An R-16 polyurethane door keeps the garage 10-15 degrees warmer in winter, reducing heat loss through the shared wall and lowering heating bills.

      - title: How long does garage door installation take?
        desc: |-
          Most single-door installs take 3 to 4 hours. A double door with a new opener and track system is typically done in half a day. We remove and dispose of the old door.

      - title: What R-value garage door do I need in Canada?
        desc: |-
          R-12 minimum for attached garages. R-16 or higher is better for Ontario's climate - look for polyurethane-injected cores (Clopay Intellicore or Amarr equivalent), not polystyrene panels.

      - title: Does a new garage door increase home value?
        desc: |-
          Consistently one of the top ROI home improvements. The 2024 Cost vs. Value report shows garage door replacement recouping around 100% of project cost at resale - more than kitchens or bathrooms.

