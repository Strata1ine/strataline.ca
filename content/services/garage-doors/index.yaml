  - type: Benefits
    title: What competitors often leave vague
    content:
      - title: Door balance and spring sizing
        desc: |-
          A garage door can look fine and still operate badly if the springs are not matched to the door weight. We check balance, lift, opener strain, and safety before calling the job complete.

      - title: Track and opening condition
        desc: |-
          Older garages often have crooked framing, worn tracks, tight headroom, or poor weatherseal surfaces. These details affect the final fit more than the door style alone.

      - title: Opener compatibility
        desc: |-
          Heavy insulated doors, tall doors, double doors, and glass garage doors need the right opener, rail length, safety sensor setup, and force settings.

      - title: Exterior finishing
        desc: |-
          Aluminum capping, trim, seals, colour, glass placement, panel profile, and hardware should suit the whole facade, not just the garage opening.

