  - type: Faq
    title: Have any questions?
    content:
      - title: How long does a garage door installation take?
        desc: |-
          Most installations take just a few hours, depending on door size and opener setup.

      - title: Do you offer garage door repair?
        desc: |-
          Yes - we handle garage door repair including panel replacement, spring repair, opener troubleshooting, and track realignment across Vaughan and the GTA.

      - title: Do you offer insulated and custom garage doors?
        desc: |-
          Yes - we provide insulated garage doors in custom sizes, wood-look, glass, modern, and carriage-style options.

