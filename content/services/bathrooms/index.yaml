  - type: Faq
    title: Bathroom renovation questions
    content:
      - title: How much does a tub-to-shower conversion cost?
        desc: |-
          A tub-to-shower conversion runs $9,000-$15,000 in the GTA depending on tile selection and whether you go curbless. Includes Schluter Kerdi waterproofing, new drain, and glass enclosure.
      - title: How long does a bathroom renovation take?
        desc: |-
          Plan for 1-3 weeks once materials arrive. A cosmetic refresh with new fixtures takes 5 days. A full gut with plumbing relocation and custom tile runs 2-3 weeks.
      - title: Is a curbless shower worth the extra cost?
        desc: |-
          Yes - if your floor structure allows it. Curbless showers look seamless, are easier to clean, and add accessibility. They cost $2,000-$4,000 more than a curbed shower due to floor slope requirements and linear drain installation.
      - title: What does a mid-range bathroom renovation include?
        desc: |-
          A mid-range remodel ($15K-$30K) typically covers a walk-in shower or tub-to-shower conversion, Nuheat heated floors, new vanity, Kohler or Grohe fixtures, and porcelain tile.
      - title: Do I need a permit for a bathroom renovation in Ontario?
        desc: |-
          You need a permit if you're moving plumbing, adding electrical circuits, or making structural changes. Cosmetic updates like new tile, fixtures, and vanity replacement don't require permits under Ontario Building Code.

  - type: Services
    exclude:
