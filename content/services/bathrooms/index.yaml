title: Bathroom renovation in Toronto & Vaughan
seo: |-
  Dust-free bathroom renovation in Toronto and Vaughan. From tub to shower conversions to full remodels with premium tiles and fixtures, all customized to your budget.
desc: |-
  Create your personal sanctuary with a dust-free bathroom renovation, beautifully designed and customized to your exact preferences. We handle everything from tub to shower conversions to complete walk-in shower builds.
image:
  src: ./cover.jpg
  alt: |-
    Modern bathroom with glass shower and marble tile.

sections:
  - type: Prices
    title: What's the cost?
    content:
      - title: Basic
        min: 5000
        max: 15000
        materials:
          - Basic tiles
          - Laminate countertops
          - Standard fixtures
        desc: |-
          Cosmetic updates like painting, new fixtures, and minor changes such as replacing the toilet or sink.

      - title: Mid-range
        min: 15000
        max: 30000
        materials:
          - Premium tiles
          - Granite or quartz countertops
          - Modern fixtures
        desc: |-
          Upgraded materials, tub to shower conversion, installing a walk-in shower or new vanity, and adding features like a heated floor.

      - title: High-end
        min: 30000
        max: 60000
        materials:
          - High-end stone or marble tiles
          - Custom cabinetry
          - Designer fixtures
        desc: |-
          Full renovation with structural changes, moving plumbing, adding a steam shower, custom cabinetry, and luxury finishes.

