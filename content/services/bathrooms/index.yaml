  - type: Benefits
    title: Why choose us for your bathroom remodel?
    content:
      - title: Built for comfort and relaxation
        desc: |-
          From warm floors to steam showers and spa-like lighting, we design every detail to enhance comfort and daily enjoyment.
      - title: Premium materials for long life
        desc: |-
          We source tile, fixtures, and vanities from trusted suppliers to ensure durability and long-lasting beauty.
      - title: Expert installation
        desc: |-
          With years of renovation experience, we deliver precision workmanship and efficient project timelines.
      - title: Designed to your lifestyle
        desc: |-
          Whether minimalist, luxury, family-friendly, or space-saving, every design is tailored to your needs.

  - type: TextCarousel
    text:
      - Soak in luxury daily
      - Steam up the relaxation
      - Warm floors for comfort
      - Sleek fixtures that shine
      - Custom vibes for you
      - Elegance in every detail
      - Fresh designs to unwind

  - type: Reviews
    title: What our clients say
    content:
      - title: D. Romano
        location: Vaughan
        stars: 5
        desc: |-
          Our bathroom looks like a spa now. The heated floor and glass shower made a huge difference!
      - title: Lina K.
        location: Richmond Hill
        stars: 5
        desc: |-
          Beautiful work and very clean during the renovation. Everything was done exactly the way we wanted.

  - type: Faq
    title: Have any questions?
    content:
      - title: How long does bathroom renovation take?
        desc: |-
          Once all materials are delivered, the renovation typically takes 1-2 weeks depending on the complexity. We always require materials to be onsite before starting to avoid delays.
      - title: How much does a bathroom renovation cost in Toronto?
        desc: |-
          Bathroom renovation cost in Toronto ranges from $5,000 for cosmetic updates to $60,000+ for a full luxury remodel. We provide transparent pricing so you know what to expect before work begins.
      - title: Will my house remain clean during the renovation?
        desc: |-
          Yes. All dust and debris are contained, and after completion we thoroughly clean the bathroom so it’s ready to use immediately.

  - type: Services
    exclude:
      - bathrooms
