  - type: Benefits
    title: What your bathroom renovation includes
    content:
      - title: Schluter Kerdi waterproofing on every shower
        desc: |-
          Full Schluter Kerdi membrane system behind all tile - shower walls, curbs, and niches. No moisture reaches the framing. 10-year manufacturer warranty.
      - title: Heated floors with Nuheat mats
        desc: |-
          Nuheat radiant mats at 12 watts per square foot, only 1/8" thick. Warm tile underfoot from the moment you step out of the shower.
      - title: Kohler and Grohe fixtures standard
        desc: |-
          Thermostatic shower valves, pressure-balanced trims, and solid brass construction. No builder-grade fixtures on any project.
      - title: Dust-free demolition and tile cutting
        desc: |-
          Festool HEPA extraction during demolition and cutting. Containment barriers keep dust out of the rest of your home.

