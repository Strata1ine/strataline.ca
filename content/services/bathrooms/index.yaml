  - type: Faq
    title: Bathroom renovation questions
    showMoreLabel: View more bathroom questions
    content:
      - title: How long does a bathroom renovation take?
        desc: |-
          Most standard bathroom renovations take two to four weeks after materials are on site. Larger bathrooms, custom glass, layout changes, condo approvals, or specialty tile can add time.
      - title: Do you waterproof showers before tile?
        desc: |-
          Yes. Shower tile and grout are not the waterproofing layer. We plan the membrane, corners, seams, niches, benches, curbs, transitions, and drains before tile installation.
      - title: Can you renovate a bathroom in an occupied home?
        desc: |-
          Yes. We protect floors, contain dust, manage demolition debris, and keep the work area organized so the rest of the home stays usable.
      - title: Do you do condo bathroom renovations?
        desc: |-
          Yes. Condo bathrooms may need board approval, elevator bookings, trade paperwork, plumbing stack coordination, and work-hour planning. We define those requirements before starting.
      - title: Can you convert a bathtub to a walk-in shower?
        desc: |-
          Yes. Tub-to-shower conversions are common when the household wants easier entry, better glass, a bench, a niche, or a larger shower feel.
      - title: Do bathroom renovations need permits?
        desc: |-
          Cosmetic work may not need a permit, but plumbing moves, electrical work, structural changes, new basement bathrooms, and condo rules can require approvals or inspections.
      - title: Can you install heated bathroom floors?
        desc: |-
          Yes. Heated floors need proper substrate prep, thermostat placement, electrical planning, spacing around fixtures, and coordination with tile installation.
      - title: Do you provide written bathroom estimates?
        desc: |-
          Yes. A written estimate should define labour, materials, tile, waterproofing, plumbing, electrical, glass, fixtures, disposal, exclusions, and timing.
      - title: What should I know about bathroom renovation?
        desc: |-
          bathroom renovation should be planned around layout, waterproofing, ventilation, plumbing, electrical work, material lead times, and daily use. We define the scope before work starts so the bathroom renovation does not depend on guesswork.
      - title: How do I plan for bathroom renovation?
        desc: |-
          For bathroom renovation, photos and measurements help with early planning, but the final plan should follow site review, product selection, trade sequencing, waterproofing details, and the finished layout.
      - title: What affects the cost of bathroom renovation?
        desc: |-
          The cost of bathroom renovation can change with demolition, framing, subfloor condition, plumbing moves, electrical upgrades, tile format, waterproofing system, glass, fixtures, and the amount of finishing required.
      - title: When should I choose bathroom renovation?
        desc: |-
          bathroom renovation makes sense when it improves safety, cleaning, storage, comfort, or resale value. The right choice depends on the bathroom size, house age, budget, and how the room is used each day.
      - title: What can go wrong with bathroom renovation?
        desc: |-
          The usual risks with bathroom renovation are weak prep, poor slope, unclear product responsibility, rushed waterproofing, bad sequencing, or finishes ordered too late. We prefer to set the details in writing before demolition.
      - title: How does Strataline handle bathroom renovation?
        desc: |-
          For bathroom renovation, Strataline coordinates the visible finish with the hidden work: substrate, waterproofing, drains, plumbing, electrical, ventilation, tile layout, glass, fixtures, protection, and cleanup.
      - title: What is the best approach to bathroom renovation?
        desc: |-
