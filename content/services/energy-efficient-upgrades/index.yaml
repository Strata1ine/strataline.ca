  - type: Faq
    title: Energy-efficient upgrades FAQ
    showMoreLabel: View more energy upgrade questions
    content:
      - title: What energy-efficient home upgrades do you provide?
        desc: |-
          We help with practical energy-efficient upgrades such as air sealing, insulation planning, window and door replacement, weatherstripping, smart thermostats, lighting updates, ventilation improvements, tankless water heater coordination, and renovation planning that improves comfort.

      - title: What is the best first energy upgrade for an older home?
        desc: |-
          Start with diagnosis. Drafts, attic insulation, air leaks, old windows, leaky doors, weak ventilation, and inefficient mechanical equipment affect homes differently. Air sealing and insulation often deliver strong comfort gains before expensive finish upgrades.

      - title: Should I get a home energy audit first?
        desc: |-
          An energy audit is useful when you want measured results, rebate eligibility, blower-door data, or a whole-home retrofit plan. It helps prioritize air sealing, insulation, windows, doors, HVAC, and ventilation.

      - title: What is a blower door test?
        desc: |-
          A blower door test measures how leaky the building envelope is. It helps identify air leakage around attics, rim joists, windows, doors, outlets, penetrations, and framing gaps.

      - title: What is air sealing?
        desc: |-
          Air sealing closes gaps that let conditioned air escape and outdoor air enter. Common areas include attic hatches, pot lights, plumbing penetrations, rim joists, baseboards, window frames, door frames, vents, and electrical boxes.

      - title: Is insulation or air sealing more important?
        desc: |-
          Both matter. Insulation slows heat transfer, but air leaks can bypass insulation. In many homes, air sealing before or during insulation work makes the insulation perform better.

      - title: What insulation upgrades are common in Toronto homes?
        desc: |-
          Common upgrades include attic insulation, attic hatch sealing, rim joist insulation, basement header insulation, wall insulation during renovations, garage ceiling insulation, and targeted fixes for cold rooms.

      - title: Can new windows improve energy efficiency?
        desc: |-
          Yes, especially if existing windows are drafty, failed, single-pane, poorly sealed, or uncomfortable. The biggest gains come from matching good windows with proper installation, insulation, and air sealing.

      - title: Are ENERGY STAR windows and doors worth it?
        desc: |-
          ENERGY STAR windows and doors can improve comfort, reduce drafts, and support energy goals. The product label matters, but installation quality, flashing, foam, caulking, and trim details also matter.

      - title: Should I replace windows before insulation?
        desc: |-
          It depends on the house. If windows are failing or leaking, replacement may come first. If windows are functional but the attic is under-insulated or the home is leaky, air sealing and insulation may give better first returns.

      - title: What causes drafts around windows and doors?
        desc: |-
          Drafts can come from failed weatherstripping, poor installation, missing insulation, failed caulking, warped frames, bad thresholds, old locks, siding gaps, or air leakage through nearby wall cavities.

      - title: Can weatherstripping make a real difference?
        desc: |-
          Yes. Door sweeps, compression seals, thresholds, and window weatherstripping can reduce drafts quickly when the frame and slab are otherwise sound. Severe frame problems may need replacement.

      - title: What is thermal bridging?
        desc: |-
          Thermal bridging happens when framing, metal, concrete, or other conductive materials carry heat through the building envelope. It can make walls, floors, or window areas feel cold even when insulation exists.

      - title: Why are some rooms colder than others?
        desc: |-
          Cold rooms can be caused by poor insulation, air leaks, duct issues, blocked returns, exterior exposure, attic bypasses, old windows, garage adjacency, basement leakage, or unbalanced heating and cooling.

      - title: Can renovations improve comfort without a full retrofit?
        desc: |-
          Yes. When renovating kitchens, bathrooms, basements, windows, doors, or trim, it is smart to address hidden gaps, insulation, ventilation, and drafts while walls or openings are accessible.

      - title: What is the role of ventilation in an energy-efficient home?
        desc: |-
          As homes get tighter, ventilation becomes more important. Bathroom fans, kitchen exhaust, HRVs or ERVs, fresh air, and humidity control help maintain indoor air quality and reduce condensation.

      - title: Can energy upgrades cause condensation?
        desc: |-
          They can reveal humidity problems. Tighter windows and doors reduce air leakage, so indoor humidity may condense on cold surfaces if ventilation, air movement, and humidity are not managed.

      - title: Are smart thermostats worth it?
        desc: |-
          Smart thermostats can help scheduling, monitoring, and comfort, but they do not fix drafts, weak insulation, poor ducts, or undersized equipment. They work best as part of a broader plan.

      - title: Are tankless water heaters energy efficient?
        desc: |-
          Tankless water heaters can reduce standby losses and save space, but sizing, venting, gas capacity, water hardness, maintenance, and usage patterns matter. They are not the right fit for every home.

      - title: What about LED lighting upgrades?
        desc: |-
          LED lighting reduces electrical use and heat output. During renovations, it is also a chance to improve fixture placement, dimmers, colour temperature, and task lighting.

      - title: Do rebates still exist for energy upgrades?
        desc: |-
          Rebate programs change often. Eligibility may depend on energy audits, product ratings, installation dates, contractor requirements, income rules, and program funding. Always confirm current program details before starting work.

      - title: Can you help plan upgrades around rebate requirements?
        desc: |-
          We can help scope the renovation work and coordinate product information, but rebate eligibility should be confirmed with the program administrator or energy advisor before work starts.

      - title: What should an energy upgrade quote include?
        desc: |-
          It should list the upgrade scope, product ratings where relevant, installation method, air sealing details, insulation R-values, ventilation implications, finish repairs, exclusions, timing, and warranty terms.

      - title: Do you provide energy-efficient upgrades across the GTA?
        desc: |-
          Yes. We provide energy-efficient renovation upgrades in Toronto, Vaughan, Woodbridge, Richmond Hill, Markham, North York, Mississauga, Oakville, Burlington, Pickering, Ajax, Whitby, Oshawa, and nearby GTA communities.

