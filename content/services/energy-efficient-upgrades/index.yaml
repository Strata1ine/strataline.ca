title: Energy efficient home upgrades

seo: |-
  Spray foam insulation, heat pump installation, air sealing, and HRV systems with up to $12,000 in Ontario energy rebates through the Home Renovation Savings Program.

desc: |-
  Cut heating costs 15-30% with insulation, heat pumps, and air sealing. We handle the EnerGuide audit, rebate paperwork, and installation.

image:
  src: ./cover.jpg
  alt: Closed-cell spray foam insulation applied to attic rafters.

sections:
  - type: Benefits
    title: What energy efficient upgrades get you
    content:
      - title: Up to $12,000 back in Ontario rebates
        desc: Heat pumps, insulation, and air sealing qualify under the Home Renovation Savings Program through Enbridge and Save on Energy.

      - title: 15-30% lower heating and cooling bills
        desc: Spray foam insulation and air sealing stop heat loss at the source. Most homeowners see the difference on their first utility bill.

      - title: Warmer winters, cooler summers
        desc: Proper insulation to R-60 and sealed air gaps eliminate cold spots, drafts, and temperature swings between floors.

      - title: 70-80% cost recovery at resale
        desc: Energy upgrades are among the highest-ROI renovations in the Ontario housing market according to cost-vs-value benchmarks.

  - type: ZigZag
    title: Home insulation cost and options
    content:
      - title: Spray foam insulation
        desc: |-
          Closed-cell spray foam delivers R-6.5 per inch and doubles as a moisture barrier - ideal for basements and exterior walls. Open-cell foam at R-3.7 per inch works well for interior walls and sound control. Installed cost runs $1.50-$5.00 per square foot depending on type and area.
        image:
          src: ./photos/insulation.jpg
          alt: Closed-cell spray foam insulation in basement wall cavities.

      - title: Attic insulation to R-60
        desc: |-
          Ontario Building Code (SB-12) requires R-60 in attics - about 24 inches of blown-in cellulose or fibreglass. Most older GTA homes sit at R-20 to R-30. Topping up an attic runs $1,500-$3,500 for a typical 1,000 sq ft space.
        image:
          src: ./photos/windows.jpg
          alt: Blown-in cellulose insulation filling an attic floor.

  - type: ZigZag
    title: Heat pump rebate Ontario 2026
    content:
      - title: Cold-climate heat pump installation
        desc: |-
          Air-source heat pumps on the NRCan approved product list qualify for up to $7,500 back through the Home Renovation Savings Program. Geothermal systems qualify for up to $12,000. No energy audit required for single-upgrade rebates in 2026.
        image:
          src: ./photos/hvac.jpg
          alt: Cold-climate air-source heat pump installed beside a home.

      - title: Tankless water heater installation
        desc: |-
          Navien NPE and Rinnai condensing units heat water on demand and eliminate standby energy loss. Installed cost in Ontario runs $2,500-$4,500 for natural gas models. We handle venting, gas line upgrades, and permit coordination.
        image:
          src: ./photos/tankless.jpg
          alt: Navien tankless water heater mounted on a utility wall.

  - type: ZigZag
    title: Air sealing and weatherization
    content:
      - title: Air sealing and draft-proofing
        desc: |-
          We trace and seal gaps around penetrations, sill plates, attic hatches, and ductwork using caulking and expanding foam. Air sealing is the single highest-ROI energy upgrade - most homes lose 25-40% of heated air through hidden leaks. Enbridge offers up to $1,300 in rebates for draft-proofing.
        image:
          src: ./photos/airsealing.jpg
          alt: Expanding foam applied around plumbing penetrations in a basement.

      - title: Weather-stripping doors and windows
        desc: |-
          Compression and V-strip weather-stripping around doors and operable windows stops drafts immediately. One of the lowest-cost, highest-impact improvements for Ontario's freeze-thaw climate.
        image:
          src: ./photos/weatherstrip.jpg
          alt: Compression weather-stripping installed on an exterior door frame.

  - type: ZigZag
    title: Smart controls and ventilation
    content:
      - title: Ecobee and Nest smart thermostats
        desc: |-
          Learning thermostats adjust heating and cooling based on your schedule and occupancy patterns. Typical energy savings of 10-15% on HVAC costs. Rebates of up to $100 available through Save on Energy.
        image:
          src: ./photos/thermostat.webp
          alt: Ecobee smart thermostat displaying energy usage on a wall.

      - title: HRV and ERV ventilation systems
        desc: |-
          Heat recovery ventilators exchange stale indoor air for fresh outdoor air while recapturing 70-80% of the heat. Required under Ontario Building Code for tightly sealed homes. ERV units also manage humidity - important for GTA summers.
        image:
          src: ./photos/ventilation.jpg
          alt: HRV unit with ducting installed in a basement mechanical room.

      - title: LED lighting conversion
        desc: |-
          LED fixtures use up to 80% less electricity than incandescent bulbs and last 25,000+ hours. We replace outdated pot lights, fixtures, and panels in a single visit.
        image:
          src: ./photos/led.jpg
          alt: Recessed LED pot lights installed in a renovated kitchen ceiling.

