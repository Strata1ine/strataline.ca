title: Energy-efficient home upgrades
position: 10
seo: |-
  Energy-efficient home upgrades in Toronto and the GTA, including air sealing, attic insulation, draft-proofing, ENERGY STAR windows and doors, smart thermostats, LED lighting, HVAC improvements, tankless water heaters, ventilation, and rebate-ready home efficiency work.
desc: |-
  Make your home warmer in winter, cooler in summer, and less expensive to run. We plan and install practical energy-efficient upgrades for Toronto and GTA homes, including air sealing, insulation improvements, high-efficiency windows and doors, smart thermostats, LED lighting, weatherstripping, tankless water heaters, and ventilation upgrades.

image:
  src: ./cover.jpg
  alt: |-
    Energy-efficient home upgrades with improved insulation, air sealing, efficient windows, and smarter mechanical systems for a GTA home.

sections:
  - type: Benefits
    title: Energy upgrades that solve real comfort problems
    content:
      - title: Lower heating and cooling waste
        desc: |-
          Air leaks, weak insulation, poor windows, and old weatherstripping make the HVAC system work harder. We focus on upgrades that reduce wasted energy first.

      - title: Warmer rooms and fewer drafts
        desc: |-
          Draft-proofing, attic insulation, window and door sealing, and proper ventilation help correct cold rooms, hot rooms, and uneven temperatures.

      - title: Rebate-aware planning
        desc: |-
          Many Ontario rebate programs require a pre-upgrade energy assessment, qualified measures, and a final audit. We help homeowners plan the work so the scope is easier to document.

      - title: Better long-term renovation value
        desc: |-
          Efficiency work often pairs naturally with window replacement, door replacement, attic work, basement upgrades, bathroom ventilation, and whole-home renovations.

  - type: ImagePanel
    title: Where most homes lose energy
    content:
      - title: Attic and roofline
        desc: |-
          Poor attic insulation and air leaks at the top of the house can cause heat loss, ice dam risk, cold upper floors, and higher winter bills.
        image:
          src: ./photos/insulation.jpg
          alt: Attic insulation upgrade for better energy efficiency in a Toronto home.

      - title: Windows and exterior doors
        desc: |-
          Old windows, failed seals, leaky frames, and poorly fitted exterior doors can create drafts and heat loss even when the furnace is working properly.
        image:
          src: ./photos/windows.jpg
          alt: ENERGY STAR window and exterior door replacement for a GTA home.

      - title: Mechanical systems
        desc: |-
          Smart controls, duct sealing, ventilation, lighting, and water heating upgrades can reduce waste and make the house easier to manage day to day.
        image:
          src: ./photos/hvac.jpg
          alt: HVAC system optimization for an energy-efficient home renovation.

  - type: ZigZag
    title: High-value efficiency upgrades
    content:
      - title: Air sealing and draft-proofing
        desc: |-
          Air sealing is one of the most important energy upgrades because it addresses hidden gaps around attics, rim joists, windows, doors, basements, plumbing penetrations, pot lights, and utility openings. Less leakage means better comfort and less HVAC strain.
        image:
          src: ./photos/airsealing.jpg
          alt: Air sealing and draft-proofing around common heat loss points.

      - title: Attic, wall, and basement insulation
        desc: |-
          Insulation upgrades help stabilize room temperatures, reduce heat loss, and make the home feel less drafty. We plan insulation around ventilation, access, air sealing, and the existing condition of the house.
        image:
          src: ./photos/insulation.jpg
          alt: Insulation upgrade for attic, wall, and basement energy efficiency.

      - title: Energy-efficient windows and doors
        desc: |-
          ENERGY STAR window and door replacement can improve comfort, reduce drafts, help with condensation issues, and modernize curb appeal. Proper installation and sealing matter as much as the product rating.
        image:
          src: ./photos/windows.jpg
          alt: Energy-efficient window and door replacement for a Toronto home.

  - type: ZigZag
    title: Smart mechanical and electrical upgrades
    content:
      - title: Smart thermostats
        desc: |-
          Smart thermostat installation helps manage heating and cooling schedules, reduce waste, and make temperature control easier for busy households.
        image:
          src: ./photos/thermostat.webp
          alt: Smart thermostat installation for home energy savings.

      - title: Tankless water heaters
        desc: |-
          Tankless water heaters heat water on demand, reducing standby heat loss from a storage tank. Proper sizing, venting, gas supply, and installation details are critical.
        image:
          src: ./photos/tankless.jpg
          alt: Tankless water heater installation for efficient hot water.

      - title: LED lighting and controls
        desc: |-
          LED lighting, dimmers, sensors, and better fixture planning can reduce electrical use while improving daily lighting quality in kitchens, bathrooms, basements, and whole-home renovations.
        image:
          src: ./photos/led.jpg
          alt: LED lighting upgrade for an energy-efficient home.

      - title: HRV, ERV, and ventilation
        desc: |-
          As homes become tighter, ventilation matters more. HRV and ERV systems can improve air exchange while reducing heating and cooling loss compared with uncontrolled drafts.
        image:
          src: ./photos/ventilation.jpg
          alt: HRV and ERV ventilation upgrade for indoor air quality and energy efficiency.

  - type: Benefits
    title: Rebate and audit planning
    content:
      - title: Start with eligibility
        desc: |-
          Rebate rules change. Before starting work, confirm the current program, heating fuel requirements, audit requirements, eligible measures, timelines, and documentation.

      - title: Use the audit as a roadmap
        desc: |-
          A pre-retrofit EnerGuide evaluation can identify the upgrades with the best return for the home, then a post-retrofit audit confirms the completed measures.

      - title: Bundle work when it makes sense
        desc: |-
          Some programs require more than one qualifying upgrade. Windows, doors, insulation, air sealing, heat pumps, and water heating should be planned together when rebate value matters.

      - title: Keep product and installation records
        desc: |-
          Product labels, invoices, model numbers, photos, and installation details are easier to collect during the project than after the walls are closed and materials are gone.

