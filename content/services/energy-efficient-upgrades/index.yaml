  - type: Faq
    title: Energy rebates Ontario 2026 and common questions
    content:
      - title: What energy rebates are available in Ontario in 2026?
        desc: >
          The Home Renovation Savings Program through Enbridge and Save on Energy offers up to $12,000 for bundled upgrades. Heat pumps qualify for $2,000-$7,500, insulation up to $7,700, and air sealing up to $1,300. The HELP loan lets Toronto homeowners borrow up to $125,000 repaid through property taxes.

      - title: How much does spray foam insulation cost?
        desc: >
          Open-cell spray foam runs $1.50-$2.50 per square foot installed. Closed-cell runs $3.00-$5.00 per square foot. A 1,000 sq ft attic typically costs $1,500-$5,000 depending on foam type and target R-value.

      - title: Do I need an energy audit for Ontario rebates?
        desc: >
          For bundled rebates (two or more upgrades), yes - a pre-retrofit EnerGuide evaluation is required. Cost is $500-$700, but most programs reimburse up to $600. Single-upgrade rebates like heat pumps do not require an audit in 2026.

      - title: How much can I save with a heat pump in Ontario?
        desc: >
          Most homeowners switching from electric baseboard heat save 30-50% on heating costs. Switching from natural gas saves 10-20% depending on electricity rates. The $2,000-$7,500 rebate shortens the payback period to 5-8 years.

      - title: How long do energy efficient home upgrades take?
        desc: >
          Air sealing, thermostat install, and weather-stripping take half a day. Attic insulation and tankless water heater installation are one-day jobs. Heat pump installation takes 1-2 days depending on ductwork modifications.

      - title: What is the HELP loan and how does it work?
        desc: >
          The Home Energy Loan Program lets Toronto homeowners borrow up to $125,000 for energy upgrades at low interest, repaid through property taxes over up to 20 years. The loan stays with the property if you sell.

      - title: What R-value does my attic need in Ontario?
        desc: >
          Ontario Building Code (SB-12) requires R-60 for attics - roughly 24 inches of blown-in insulation. Most older homes have R-20 to R-30. Topping up is one of the fastest-payback upgrades available.

      - title: Are tankless water heaters worth the cost?
        desc: >
          Navien and Rinnai condensing units run $2,500-$4,500 installed. They eliminate standby heat loss from a tank, last 20+ years, and cut water heating costs by 20-30%. Gas line and venting upgrades may add $500-$1,000.

      - title: Can I combine multiple rebate programs?
        desc: >
          Yes. The HELP loan, Enbridge Home Efficiency Rebate, and Home Renovation Savings Program can be stacked. Bundling two or more upgrades with an EnerGuide audit unlocks the highest combined rebate amounts.

      - title: What areas of the GTA do you serve?
        desc: >
          We serve the entire Greater Toronto Area including Toronto, Vaughan, Mississauga, Brampton, Richmond Hill, Markham, Oakville, Whitby, and surrounding communities.

