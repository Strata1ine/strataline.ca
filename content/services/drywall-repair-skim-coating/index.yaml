  - type: Faq
    title: Drywall repair FAQ
    content:
      - title: When do walls need skim coating instead of patching?
        desc: |-
          Skim coating is useful when flaws cover a broad area: old texture, many patches, visible drywall seams, torn paper, roller texture, or walls hit by strong side lighting.
      - title: Can you repair drywall and paint the same room?
        desc: |-
          Yes. We often combine drywall repair, skim coating, priming, and interior painting so the repaired areas blend with the rest of the room.
      - title: Do water-damaged walls need primer?
        desc: |-
          Usually yes. Stains, torn paper, and porous repair areas need proper sealing or stain-blocking primer before finish paint.
      - title: Can you repair ceilings after popcorn removal?
        desc: |-
          Yes. Popcorn removal can reveal seams, old tape lines, patched areas, and uneven drywall that may need skim coating before ceiling paint.

