sections:
  - type: Benefits
    title: Drywall problems we fix
    content:
      - title: Cracks, dents, and nail pops
        desc: |-
          We repair common drywall damage before painting, including settlement cracks, screw pops, dents, corner bead damage, gouges, and failed old patches.
      - title: Skim coating and Level 5 finish
        desc: |-
          Skim coating helps correct texture, rough drywall, visible seams, and critical-light walls where ordinary patching still shows after paint.
      - title: Water damage and torn paper
        desc: |-
          Water stains, bubbling paint, loose compound, and torn drywall paper need sealing, repair, sanding, priming, and paint-ready finishing.
      - title: Ceiling repair before painting
        desc: |-
          Smooth ceilings show every flaw. We repair seams, cracks, old texture, popcorn removal marks, and damaged ceiling areas before ceiling paint.

