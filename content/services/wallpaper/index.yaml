  - type: Faq
    title: Wallpaper installation cost, timeline & materials
    content:
      - title: How much does wallpaper installation cost per square foot?
        desc: |-
          Labour runs $3-$8 per square foot depending on material type and pattern complexity. A single accent wall (roughly 80-100 sq ft) typically costs $400-$800 installed, not including the wallpaper itself.

      - title: How long does it take to wallpaper a room?
        desc: |-
          A single accent wall takes 3-4 hours. A full room with 4 walls and pattern matching takes 1 full day. Rooms needing old wallpaper removal first add half a day for stripping, scraping, and re-priming.

      - title: How much does wallpaper removal cost?
        desc: |-
          Removal runs $1-$5 per square foot depending on the number of layers and adhesive type. Vinyl peels cleanly in most cases. Older paper-backed wallpaper with dried paste requires steaming and scraping, which takes longer.

      - title: Can wallpaper go on textured or painted walls?
        desc: |-
          Painted walls work fine after priming with Zinsser Shieldz. Textured walls need skim coating first to create a flat surface - otherwise the texture telegraphs through the wallpaper, especially on thinner non-woven materials.

      - title: What type of wallpaper works in bathrooms and kitchens?
        desc: |-
          Solid vinyl or vinyl-coated wallpaper handles humidity and splashes. Avoid natural grasscloth or untreated paper in wet areas - they absorb moisture and can develop mould in Ontario's humid summers.

