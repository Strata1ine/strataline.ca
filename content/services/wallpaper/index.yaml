  - type: Faq
    title: Have any questions?
    content:
      - title: How long does wallpaper installation take?
        desc: |-
          Most installations take a few hours to a day depending on wall size and complexity.

      - title: Do you offer wallpaper removal?
        desc: |-
          Yes - we handle full wallpaper removal in Toronto, including surface prep, adhesive cleanup, and wall repair so the surface is ready for new wallpaper or paint.

      - title: Can wallpaper be installed on textured walls?
        desc: |-
          Yes - we prepare and smooth the surface first to ensure perfect adhesion and finish.

      - title: Can you create an accent wall with wallpaper?
        desc: |-
          Absolutely. Accent wall wallpaper is one of our most popular requests - it adds texture, colour, and personality to any room without covering every surface.

