  - type: Benefits
    title: What you get with professional wallpaper installation
    content:
      - title: Seam-matched pattern alignment
        desc: |-
          Laser-level layout lines and dry-hung test strips before pasting. Every pattern repeat lands within 1/16" across walls, corners, and obstacles.

      - title: Proper wall priming and sizing
        desc: |-
          Zinsser Shieldz primer on every surface before hanging. This seals the drywall, improves adhesion, and makes future removal clean and damage-free.

      - title: Adhesive matched to your material
        desc: |-
          Roman PRO-880 for standard vinyl and non-woven. Roman GH-34 wheat paste for delicate grasscloth and natural fibre wallcoverings that stain with synthetic adhesives.

      - title: Accent wall to full room coverage
        desc: |-
          Single accent walls finished in 3-4 hours. Full rooms with pattern matching across 4+ walls typically completed in one day.

