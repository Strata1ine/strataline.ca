  - type: Faq
    title: Wallpaper removal FAQ
    content:
      - title: Can wallpaper be painted over instead of removed?
        desc: |-
          Sometimes, but it is risky. Loose seams, trapped adhesive, texture, and moisture can telegraph through paint or fail later.
      - title: Why does drywall tear during wallpaper removal?
        desc: |-
          Drywall tears when the wall was not properly primed, adhesive bonded too strongly, or old layers were installed over weak paint or paper.
      - title: Do walls need skim coating after wallpaper removal?
        desc: |-
          Often yes if there is torn paper, glue residue, dents, seams, texture, or uneven areas that would show under paint.
      - title: Can you remove wallpaper and install new wallpaper?
        desc: |-
          Yes. We remove old paper, correct wall issues, prime where needed, and prepare the wall for new wallpaper installation.

