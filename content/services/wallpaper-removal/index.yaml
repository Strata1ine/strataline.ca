sections:
  - type: Benefits
    title: Removal is only half the job
    content:
      - title: Glue and residue cleanup
        desc: |-
          Old adhesive can cause paint failure, bubbling, stains, and poor wallpaper adhesion if it is not cleaned or sealed properly.
      - title: Drywall paper repair
        desc: |-
          Torn drywall paper may need sealing, skim coating, sanding, and primer before paint or new wallpaper.
      - title: Painted-over wallpaper
        desc: |-
          Painted wallpaper can be slower to remove because moisture may not penetrate evenly and hidden seams can release unpredictably.
      - title: Paint or replacement wallpaper
        desc: |-
          After removal, walls can be finished for paint or prepared for new wallpaper installation.

