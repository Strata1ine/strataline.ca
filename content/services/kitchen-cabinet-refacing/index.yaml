sections:
  - type: Benefits
    title: When refacing makes sense
    content:
      - title: Keep the working layout
        desc: |-
          Refacing is strongest when cabinet boxes are sound and the kitchen layout already works.
      - title: Upgrade visible surfaces
        desc: |-
          New doors, drawer fronts, panels, trim, paint, pulls, hinges, and soft-close hardware can change the kitchen without a full gut renovation.
      - title: Pair with paint or counters
        desc: |-
          Cabinet refacing often works with cabinet painting, backsplash, countertop, lighting, flooring, and wall painting updates.
      - title: Avoid unnecessary demolition
        desc: |-
          A focused kitchen refresh can reduce disruption compared with full cabinet replacement.

  - type: ZigZag
    title: Related kitchen services
    content:
      - title: Cabinet painting
        desc: |-
          If doors and boxes are sound, cabinet painting can be the fastest way to change colour and clean up a dated kitchen.
        image:
          src: ../painting/photos/modern-kitchen-repaint-satin.webp
          alt: Cabinet painting and refinishing for a kitchen refresh.
        link: /services/cabinet-painting
      - title: Kitchen renovations
        desc: |-
          When layout, plumbing, electrical, cabinetry, and flooring all need changes, a full kitchen renovation may be the better path.
        image:
          src: ../kitchens/photos/white-custom-kitchen-cabinets-quartz-backsplash-integrated-range-toronto.webp
          alt: Kitchen renovation with white cabinets, quartz backsplash, and modern finishes.
