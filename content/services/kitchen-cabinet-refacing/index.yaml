  - type: Faq
    title: Cabinet refacing FAQ
    content:
      - title: Is cabinet refacing the same as cabinet painting?
        desc: |-
          No. Painting changes the finish on existing parts. Refacing can include new doors, drawer fronts, panels, hardware, and finish updates.
      - title: When is full kitchen renovation better?
        desc: |-
          Full renovation is better when the layout is poor, cabinets are damaged, plumbing or electrical must move, or storage needs change significantly.
      - title: Can I add soft-close hinges?
        desc: |-
          Often yes, depending on cabinet construction and door style.
      - title: What should I send for a cabinet refacing quote?
        desc: |-
          Send photos of the full kitchen, cabinet interiors, doors, hinges, panels, dimensions, and notes on whether counters or backsplash are staying.

