  - type: Benefits
    title: Why homeowners choose Strataline
    content:
      - title: Walls prepared before paint
        desc: |-
          Good painting starts with the surface. We repair holes, cracked walls, peeling paint, visible seams, uneven drywall, and water damage before primer or finish paint goes on.

      - title: Clean work in finished homes
        desc: |-
          We protect floors, stairs, furniture, built-ins, and nearby rooms. Sanding, patching, and painting are planned for low mess, clear access, and tidy daily cleanup.

      - title: Smooth premium finishes
        desc: |-
          We use premium interior paint, proper primers, fine rollers, spray finishing where needed, and careful sanding between coats for smooth matte, eggshell, or satin finishes.

      - title: Local GTA painting crew
        desc: |-
          We provide house painting services in Toronto, Vaughan, Woodbridge, Richmond Hill, Markham, North York, Thornhill, Etobicoke, Forest Hill, Rosedale, and nearby GTA communities.

