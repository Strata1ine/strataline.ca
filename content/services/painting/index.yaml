  - type: Benefits
    title: Why Interior Painting Projects Succeed Or Fail
    content:
      - title: Rooms and timing
        desc: |-
          We start with the room list, furniture, ceiling height, access, repair needs, trim condition, and deadline. A condo turnover, family-home main floor, and older plaster home should not be quoted the same way.

      - title: Surfaces and finish systems
        desc: |-
          Walls, ceilings, doors, baseboards, casing, built-ins, stair halls, and repaired drywall each need their own product and sequence. That is what makes the quote useful instead of vague.

      - title: Photos that make estimates better
        desc: |-
          Wide room photos, close-ups of wall damage, trim, doors, ceilings, stairwells, furniture, and access constraints help us price the work more accurately before a site visit is needed.

  - type: Benefits
    title: Common Painting Problems We Solve
    content:
      - title: Repairs treated like touch-ups
        desc: |-
          Dents, nail pops, cracks, torn paper, and old patch edges can flash through new paint when they are not repaired, sanded, and primed correctly.

      - title: Wrong sheen for the surface
        desc: |-
          Shiny wall paint can reveal roller texture and old repairs. Trim and doors usually need a tougher finish than walls, while ceilings usually need a flatter product.

      - title: Vague quote scope
        desc: |-
          A low estimate may leave out ceilings, trim, doors, primer, repairs, furniture handling, or cleanup. We separate those items so homeowners can compare quotes fairly.

  - type: ZigZag
    title: What We Paint
    content:
      - title: Walls, rooms & entire homes
        desc: |-
          We paint bedrooms, living rooms, kitchens, dining rooms, hallways, stairwells, basements, condos, and full homes. Every interior painting project starts with surface prep, masking, priming where required, and clean finish coats.
        image:
          src: ./photos/luxury-home-painting-toronto.webp
          alt: Professional interior wall painting in a Toronto home with smooth matte paint and crisp trim.

      - title: Colour matching & paint selection
        desc: |-
          We help match Benjamin Moore, Sherwin Williams, Farrow & Ball, and designer colours. We can guide matte vs satin walls, low VOC paint, washable finishes, and durable paint for busy family spaces.
        image:
          src: ./photos/paint-colour-consultation-toronto.webp
          alt: Premium interior paint colour samples for house painting in Toronto and Vaughan.

  - type: ZigZag
    title: Drywall repair before painting
    content:
      - title: Cracks, dents & peeling paint
        desc: |-
          Paint does not hide bad drywall. We fix cracked walls, nail pops, dents, bad drywall finish, visible seams, paint peeling, and water damage wall repair before applying primer and finish coats.
        image:
          src: ./photos/level-5-skim-coating-finish.webp
          alt: Cracked wall repair, patching, skim coating, and painting preparation.

      - title: Skim coating & Level 5 finish
        desc: |-
          For homes with critical lighting, large smooth walls, stairwells, or modern minimal trim, we offer skim coating and Level 5 drywall finish so the final paint looks even from every angle.
        image:
          src: ./photos/level-5-drywall-finish-painted-wall.webp
          alt: Level 5 drywall finish and skim coating walls before smooth interior painting.

  - type: ZigZag
    title: Ceilings, trim & millwork
    content:
      - title: Ceiling painting
        desc: |-
          We paint flat ceilings, smooth ceilings, repaired ceilings, and ceilings after popcorn removal. Proper prep helps avoid flashing, roller marks, and uneven sheen under natural light.
        image:
          src: ./photos/coffered-ceiling-painting-toronto.webp
          alt: Smooth ceiling painting after popcorn ceiling removal in the GTA.
          link: /services/popcorn-removal

      - title: Trim, doors & baseboards
        desc: |-
          Trim and baseboard painting needs a steady hand and the right finish. We paint casings, doors, crown moulding, wainscoting, railings, built-ins, and millwork with crisp lines and durable satin finishes.
        image:
          src: ./photos/wainscoting-painting-satin-finish.webp
          alt: Wainscoting, doors, trim, and baseboard painting with a sprayed satin finish.

  - type: Benefits
    title: When Skim Coating Is Worth It
    content:
      - title: Strong side lighting
        desc: |-
          Long walls, stairwells, open-concept rooms, and pot lights can reveal seams, patch edges, and old roller texture. Skim coating gives paint a flatter surface to land on.

      - title: Older textured walls
        desc: |-
          Plaster movement, previous repairs, old texture, torn drywall paper, and uneven compound can make fresh paint look worse than expected. We discuss skim coating only where the wall condition justifies it.

      - title: Modern minimal trim
        desc: |-
          Smooth walls with simple casing or minimal baseboards leave fewer details to hide surface defects. In those rooms, the wall finish matters more than in a busy traditional space.

  - type: Benefits
    title: Wall Finish & Sheen Guide
    content:
      - title: Matte
        desc: |-
          Matte wall paint gives a soft look and hides minor texture better than shinier finishes. It suits bedrooms, formal rooms, and low-traffic spaces when washability needs are moderate.

      - title: Eggshell
        desc: |-
          Eggshell is a common choice for living rooms, halls, condos, and family spaces because it balances a low sheen with easier cleaning.

      - title: Satin
        desc: |-
          Satin can work in higher-use rooms, bathrooms, laundry areas, and trim-adjacent spaces, but it can reveal wall defects under side light.

      - title: Semi-gloss
        desc: |-
          Semi-gloss is usually reserved for trim, doors, casing, and high-touch millwork where durability matters more than hiding surface texture.

  - type: Benefits
    title: How To Compare Painting Quotes
    content:
      - title: Scope clarity
        desc: |-
          Compare whether drywall repair, ceilings, trim, doors, primer, number of coats, paint brand, cleanup, and furniture handling are included. A low number often means a smaller scope.

      - title: Surface condition
        desc: |-
          Ask how cracks, nail pops, visible repairs, glossy trim, dark colour transitions, and water stains will be handled before finish coats.

      - title: Project logistics
        desc: |-
          Condos may need elevator and parking planning. Family homes may need room sequencing. Older homes may need plaster and millwork review. Those details should appear in the quote.

  - type: Benefits
    title: What Information Helps Us Provide An Accurate Quote
    content:
      - title: Photos and measurements
        desc: |-
          Send wide room photos, close-ups of wall damage, trim, doors, ceilings, stairwells, rough dimensions, and ceiling height.

      - title: Timing and access
        desc: |-
          Tell us whether the home is furnished, vacant, before move-in, before listing, or subject to condo elevator, parking, or loading rules.

      - title: Finish expectations
        desc: |-
          Share the colours, paint brands, sheen preferences, problem areas, and whether you want walls only or a fuller scope with ceilings, doors, and trim.

