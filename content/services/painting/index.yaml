  - type: Benefits
    title: What goes into a professional paint job
    content:
      - title: Full surface prep before any paint
        desc: |-
          Durabond 90 setting compound for cracks and joints. Zinsser BIN shellac primer on stains and knots. Every surface sanded between coats with 150 and 220 grit.

      - title: Benjamin Moore and Sherwin Williams coatings
        desc: |-
          Benjamin Moore Aura ($90/gal, 45% volume solids) or Sherwin Williams Emerald for walls. Regal Select for ceilings. One-coat coverage on most colours.

      - title: HVLP sprayed trim and cabinetry
        desc: |-
          Graco FinishPro HVLP sprayer on all trim, doors, and cabinets. 85-95% transfer efficiency means a factory-smooth finish with minimal overspray.

      - title: Dust-free, furniture-safe workflow
        desc: |-
          Festool HEPA extraction during sanding. Plastic containment barriers on doorways. All furniture masked with 3M painter's film before prep begins.

  - type: TextCarousel
    text:
      - Goodbye roller texture
      - Benjamin Moore Aura walls
      - Every edge razor-sharp
      - Smooth ceilings, finally
      - Graco FinishPro trim
      - Colour you actually love

  # -------------------------------
  # PAINTING COST PER SQUARE FOOT
  # -------------------------------
  - type: ZigZag
    title: Painting cost per square foot
    content:
      - title: Transparent pricing, no surprises
        desc: >-
          Interior painting runs $2.50 to $4.50 per square foot for walls. Add ceilings, trim, and baseboards and expect $4 to $6 per sq ft. Ontario HST is always included in our quotes.
        image:
          src: ./photos/designer-colour-consultation..jpg
          alt: Paint colour consultation with Benjamin Moore fan decks.
      - title: What drives the final price
        desc: >-
          Wall condition, ceiling height, number of colours, and prep work affect cost. Homes needing drywall repair or skim coating before paint cost more than a straightforward repaint.
        image:
          src: ./photos/luxury-interior-painting-toronto.jpg
          alt: Freshly painted living room walls with smooth eggshell finish.

  # -------------------------------
  # LEVEL 5 WALL FINISHING
  # -------------------------------
  - type: ZigZag
    title: Level 5 wall finishing
    content:
      - title: When smooth walls really matter
        desc: >-
          Rooms with large windows, pot lights, or low-angle light expose every imperfection. A Level 5 skim coat covers the entire surface - not just joints - so nothing shows through flat or eggshell paint.
        image:
          src: ./photos/smooth-wall-finish-level-5.jpg
          alt: Level 5 skim-coated wall under low-angle window light.
      - title: Ceiling painting and texture removal
        desc: >-
          Textured or stippled ceilings get scraped, skim-coated with Durabond, and sanded flat before two coats of ceiling paint. Already have popcorn ceilings? See our popcorn ceiling removal page.
        image:
          src: ./photos/popcorn-ceiling-removal-gta.png
          alt: Smooth ceiling after texture removal and skim coating.

  # -------------------------------
  # TRIM, BASEBOARD & CABINET PAINTING
  # -------------------------------
  - type: ZigZag
    title: Trim, baseboard & cabinet painting
    content:
      - title: Baseboard and casing painting
        desc: >-
          All baseboards, door casings, and crown moulding get lightly sanded, spot-primed with Zinsser BIN, and sprayed with two coats of Benjamin Moore Advance for a hard, smooth shell.
        image:
          src: ./photos/high-end-trim-painting-spray-finish.png
          alt: White baseboard trim with HVLP sprayed semi-gloss finish.
      - title: Cabinet painting with HVLP spray
        desc: >-
          Kitchen and bathroom cabinets sprayed off-site or in a contained area using Graco FinishPro HVLP. Doors get 2-3 coats of waterborne alkyd enamel for a factory-grade result that resists chipping.
        image:
          src: ./photos/high-end-wainscoting-painting-spray-finish.png
          alt: Wainscoting panel with smooth HVLP sprayed satin finish.

  # -------------------------------
  # DRYWALL REPAIR AND PAINTING
  # -------------------------------
  - type: ZigZag
    title: Drywall repair and painting
    content:
      - title: Crack, hole, and dent repair
        desc: >-
          Settlement cracks filled with fibreglass mesh tape and Durabond 90. Nail pops reset and skimmed. Holes patched with California patches - no metal clips that telegraph through paint.
        image:
          src: ./photos/level-5-skim-coating-wall-repair.jpg
          alt: Drywall repair with Durabond setting compound and mesh tape.
      - title: Matched texture and invisible blending
        desc: >-
          Repaired areas get feathered out 12-18 inches beyond the patch, primed with Zinsser BIN, and painted to match the surrounding wall. Under normal lighting, repairs disappear completely.
        image:
          src: ./photos/smooth-wall-finish-level-5.jpg
          alt: Smooth wall surface after invisible drywall repair.

