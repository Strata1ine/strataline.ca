  - type: Benefits
    title: Why choose luxury painting?
    content:
      - title: Architectural-level wall preparation
        desc: |-
          We invest extensive time in sanding, skim coating, patching, and surface correction to create walls that look flawless under any lighting condition.

      - title: Premium designer paints
        desc: |-
          We use elite-grade coatings such as Benjamin Moore Aura, Regal Select, and Sherwin Williams Emerald - ensuring depth, richness, and long-lasting colour fidelity.

      - title: Precision lines & craftsmanship
        desc: |-
          Our skilled painters create crisp edges, smooth trims, and seamless colour transitions that stand out in high-end interiors.

      - title: Luxury-friendly workflow
        desc: |-
          We work clean, quiet, and efficiently. Furniture protection, dust control, and immaculate cleanup are standard - not upgrades.

  - type: TextCarousel
    text:
      - Architectural wall finishing
      - Luxury interior repainting
      - Designer colour consulting
      - Smooth ceilings & refinishing
      - Precision trim & millwork painting

  # -------------------------------
  # PREMIUM INTERIOR PAINTING
  # -------------------------------
  - type: ZigZag
    title: Interior painting (luxury homes)
    content:
      - title: Designer colour selection
        desc: >-
          We help you choose the perfect palette - rich neutrals, soft whites, warm tones, or bold accents - ensuring your home feels cohesive and luxurious.
        image:
          src: ./photos/designer-colour-consultation..jpg
          alt: Designer colour palette selection for a luxury home.
      - title: Flawless wall application
        desc: >-
          Using premium rollers and fine-spray techniques, we achieve buttery-smooth finishes without streaks, patches, or roller texture.
        image:
          src: ./photos/luxury-interior-painting-toronto.jpg
          alt: Smooth wall painting using high-end paint and expert technique.

  # -------------------------------
  # CEILING FINISHES
  # -------------------------------
  - type: ZigZag
    title: Smooth ceilings & refinishing
    content:
      - title: Popcorn ceiling removal
        desc: >-
          We eliminate outdated popcorn texture and apply a perfectly smooth finish - ideal for modern, upscale interiors.
        image:
          src: ./photos/popcorn-ceiling-removal-gta.png
          alt: Popcorn ceiling removal and luxury smoothing treatment.
      - title: Level-5 finishing
        desc: >-
          For high-end homes with critical lighting, we provide a Level 5 skim coat for a perfectly uniform, ultra-smooth surface.
        image:
          src: ./photos/smooth-wall-finish-level-5.jpg
          alt: Level-5 wall finishing in a premium home.

  # -------------------------------
  # TRIM, DOORS & MILLWORK
  # -------------------------------
  - type: ZigZag
    title: Trim, doors & millwork painting
    content:
      - title: Crisp, sharp lines
        desc: >-
          We create razor-sharp edges on baseboards, casings, doors, and crown mouldings using precision taping and fine-finish techniques.
        image:
          src: ./photos/high-end-trim-painting-spray-finish.png
          alt: Perfectly painted trim, doors, and mouldings in an upscale home.
      - title: High-end sprayed finishes
        desc: >-
          For cabinetry, built-ins, railings, and millwork, we offer lacquer-smooth spraying done in controlled conditions for a factory-grade finish.
        image:
          src: ./photos/high-end-wainscoting-painting-spray-finish.png
          alt: Professional spraying on millwork for a smooth, modern luxury finish.

  # -------------------------------
  # DAMAGE REPAIR & RESTORATION
  # -------------------------------
  - type: ZigZag
    title: Wall repair & surface restoration
    content:
      - title: Expert repair work
        desc: >-
          We repair settlement cracks, dents, holes, uneven drywall, and surface imperfections using professional-grade patching and leveling.
        image:
          src: ./photos/level-5-skim-coating-wall-repair.jpg
          alt: Wall repair and repaint in a high-end modern kitchen.
      - title: Invisible results
        desc: >-
          Repairs blend seamlessly into the surrounding surfaces - ensuring nothing distracts from the beauty of the final finish.
        image:
          src: ./photos/smooth-wall-finish-level-5.jpg
          alt: Smooth wall surface with invisible repair work.

  - type: Reviews
    title: What our clients say
    content:
      - title: Marissa L.
        location: Forest Hill
        stars: 5
        desc: |-
          The finish is flawless. Every wall is perfect. This is the best painting work we’ve seen - it completely elevated the home.

      - title: Daniel R.
        location: Vaughan
        stars: 5
        desc: |-
          Their preparation is on another level. The surfaces are immaculate, and the clean-up was impeccable. True luxury service.

  - type: Faq
    title: Have questions about luxury painting?
    content:
      - title: What paints do you use for high-end homes?
        desc: |-
          We primarily use premium lines like Benjamin Moore Aura/Regal Select and Sherwin Williams Emerald - chosen for durability, richness, and refined finish quality.

      - title: How much does interior painting cost in Toronto?
        desc: |-
          Painting cost per sqft varies based on wall condition, prep work, and finish quality. Contact us for a detailed quote tailored to your space.

      - title: How long does a luxury repaint take?
        desc: |-
          A typical repaint takes several days to a week, depending on preparation, room size, and the level of finishing required.

      - title: Do you handle wall repairs?
        desc: |-
          Yes - all holes, dents, scratches, settlement cracks, and imperfections are professionally repaired before painting.

      - title: Can you match designer colours?
        desc: |-
          Absolutely. We match Farrow & Ball, Benjamin Moore, Sherwin Williams, and other curated palettes with perfect accuracy.

  - type: Services
    exclude:
      - painting
