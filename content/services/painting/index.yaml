  - type: Faq
    title: Interior painting cost & timeline
    content:
      - title: How much does interior painting cost per square foot?
        desc: |-
          Walls only run $2.50 to $4.50 per sq ft. Walls plus ceilings, trim, and baseboards run $4 to $6 per sq ft. A typical 1,500 sq ft home costs $6,000 to $10,000 including prep, materials, and HST.

      - title: How long does it take to paint a house interior?
        desc: |-
          A single room takes 1 to 2 days. A full home - 3 to 4 bedrooms with trim and ceilings - takes 5 to 8 days depending on wall condition, drywall repair, and how many colours are involved.

      - title: What is a Level 5 drywall finish and do I need one?
        desc: |-
          Level 5 means a full skim coat over the entire wall surface, not just joints and screw holes. You need it in rooms with flat paint, large windows, or recessed pot lights where low-angle light shows every imperfection.

      - title: Should I spray or roll kitchen cabinets?
        desc: |-
          Spraying with an HVLP system like Graco FinishPro gives a smoother, harder finish than brush or roller. We spray all cabinet doors with 2-3 coats of waterborne alkyd enamel - Benjamin Moore Advance or Sherwin Williams Emerald Urethane.

      - title: Do painters fix drywall before painting?
        desc: |-
          We do. Cracks, nail pops, dents, and holes get patched with Durabond 90, sanded smooth, and spot-primed with Zinsser BIN before any paint goes on. Drywall repair is included in every painting quote.

