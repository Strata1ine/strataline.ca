  - type: Reviews
    title: What our customers have to say
    id: reviews
    content:
      - title: Lani Selick
        location: Toronto
        stars: 5
        desc: |-
          WOW! Just WOW! Max removed all the popcorn from our 1800 sq ft town home, repainted from top to bottom plus did some carpentry repairs on our floors…and the final result is spectacular! But just as important, he made the entire renovation painless for us: not only was the process completely dust free and mess free, but Max also moved ALL the furniture and pictures himself (no help from us at all) then put EVERYTHING back together the way it was. We literally walked out of our home before he started and then walked back in a couple of weeks later to a beautiful brand new home with everything in the exact same place as it was beforehand. Renovating doesn’t not get better than this!!!

      - title: MikeKK
        location: Burlington
        stars: 5
        desc: |-
          We initially contacted Max to remove the popcorn finish on our vaulted great room ceiling & to refinish/modernize our curved 'blonde-oak' finished stairway leading downstairs. Not only did he do an impeccable job making the ceiling look brand 'new', and with no detectable dust left anywhere, but he also re-located some potlights & installed new crown moulding that required meticulous precision due to several odd corner angles that other contactors insisted couldn't be done. It looked so good we ended up having our main hallway, front foyer, & sunroom ceilings re-done as well. The stairway & railing were re-finished in a darker oak stain that matched our dark hardwood flooring & the new modern metal spindles, and new trimwork have made it look better than ever & despite the hours of sanding off the old finish, there was no dust...!! In the end, we also had his team re-paint all of the above areas, which turned out perfectly as well... Our level of confidence with Max's professionalism & skilled expertise, not to mention being easy to deal with, is such that we would recommend his services to anyone, and should we need assistance from a contractor in the future, he'll be the first person we call, as it's clear he can handle just about anything...

      - title: John Seigel
        location: Richmond Hill
        stars: 5
        desc: |-
          The Popcorn removal was excellent and a very clean process. They also transformed our stairs from boring oak to a much more modern look. They handled repainting of the whole house and replacement of old tile floors with a beautiful new one. There were many additional small tasks which they handled very well. They have design skills if you need them. The house looks great. Very talented and reliable people. I should also say they are very professional providing detailed quotations and billing.

      - title: Virginia Coppola
        location: Newmarket
        stars: 5
        desc: |-
          Maxim at Strataline did a very professional job in removing our hallway popcorn/stucco ceiling. The end result was a completely smooth surface and not only that, they totally sealed off the area so absolutely not dust penetrated other areas of the house.
          Maxim also installed wainscoting and trim work throughout the hallway, stairwell and landing. We would highly recommend their workmanship with very little disruption to the home.

  - type: Faq
    title: Interior painting FAQ
    showMoreLabel: View more painting questions
    content:
      - title: What should be included in an interior painting quote?
        desc: |-
          A useful quote should list rooms, walls, ceilings, trim, doors, repairs, primer, number of coats, paint products, furniture handling, access limits, cleanup, and timing. That makes it possible to compare more than just the final price.

      - title: How much does interior painting cost?
        desc: |-
          Cost depends on room count, ceiling height, wall condition, trim detail, door count, colour changes, paint product, access, furniture, and whether drywall repair or skim coating is included. A bedroom repaint, condo repaint, stair hall, and whole-home repaint are different scopes.

      - title: Can you provide a painting quote from photos?
        desc: |-
          Often, yes. Send wide room photos, close-ups of damage, trim, doors, ceilings, stairwells, closets, furniture, and rough dimensions. Condo projects should also include elevator, parking, and building-rule notes.

      - title: Do you repair drywall before painting?
        desc: |-
          Yes. We repair dents, cracks, nail pops, torn paper, visible seams, old patches, water stains, and rough drywall before finish coats. Larger problem areas may need skim coating or a Level 5 finish.

      - title: When is skim coating worth it?
        desc: |-
          Skim coating is worth considering when walls show texture, old repair edges, torn drywall paper, plaster movement, visible seams, or strong side light from windows and pot lights.

      - title: What paint finish is best for walls?
        desc: |-
          Many walls suit a washable low-sheen finish. Busy areas may need more durability, while formal rooms often look better with a calmer sheen. Lighting and wall condition matter as much as room type.

      - title: Do you paint trim, doors and baseboards?
        desc: |-
          Yes. Trim and doors are handled as separate surfaces because they usually need cleaning, sanding, caulking, spot primer, and a harder-wearing coating than wall paint.

      - title: Should ceilings be painted with the walls?
        desc: |-
          Often, yes. Fresh wall colour can make older ceilings, patches, stains, popcorn texture, or roller marks more visible. We quote ceilings clearly so you can decide what belongs in the scope.

      - title: Can you paint furnished homes?
        desc: |-
          Yes. We plan room order, furniture movement, access paths, drying areas, and daily cleanup before work starts. For condos, we also ask about elevators, parking, service hours, and building rules.

      - title: Do you use low VOC paint?
        desc: |-
          Yes. Low VOC paint can be specified for bedrooms, condos, nurseries, and homes where odour matters. Product choice still depends on the surface and durability needs.

      - title: Which paint brands do you use?
        desc: |-
          We commonly discuss professional lines from Benjamin Moore and Sherwin-Williams, then choose the product by surface, sheen, colour coverage, washability, and room use.

      - title: Why do painting quotes vary so much?
        desc: |-
          Quotes vary because contractors include different levels of repair, sanding, primer, trim, doors, ceilings, paint quality, access planning, cleanup, insurance, and finish expectations.

      - title: Can you paint over dark colours?
        desc: |-
          Yes. Dark-to-light changes usually need primer or extra coats so the previous colour does not shadow through the new finish.

      - title: Can you paint after wallpaper removal?
        desc: |-
          Yes. Wallpaper removal can leave adhesive, torn paper, seams, and rough areas. Those surfaces usually need cleaning, repair, sealing, skim coating, primer, or a combination before paint.

      - title: Do you paint condos in Toronto?
        desc: |-
          Yes. Condo painting can include elevator booking, parking planning, hallway rules, loading access, compact furniture staging, feature walls, and photo-based estimates.

      - title: Do you paint family homes in Vaughan and York Region?
        desc: |-
          Yes. Vaughan-area work often includes main floors, stair halls, builder paint upgrades, trim, doors, bedrooms, move-in refreshes, and repainting around kids, pets, and furniture.

      - title: Do you paint older homes in Forest Hill, Rosedale and Leaside?
        desc: |-
          Yes. Older homes may need plaster repair, careful work around built-ins, detailed casing, older trim, hardwood floors, formal rooms, and higher finish expectations.

      - title: Where do you provide interior painting services?
        desc: |-
          We provide interior painting, drywall repair, skim coating, ceiling painting, and trim painting in Toronto, Vaughan, Woodbridge, Richmond Hill, Markham, North York, Etobicoke, Forest Hill, Rosedale, Leaside, and nearby GTA areas.
