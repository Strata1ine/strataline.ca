  - type: Benefits
    title: "Painting older Forest Hill homes"
    content:
      - title: "Older detached homes"
        desc: |-
          Forest Hill interiors often combine plaster, formal rooms, detailed casing, hardwood floors, and trim that has been painted many times. The work needs a finish plan, not a quick colour swap.
      - title: "Renovated luxury homes"
        desc: |-
          Renovated homes may have newer drywall beside older plaster, custom built-ins, smooth ceilings, and high expectations for wall sheen and trim lines.
      - title: "High-value interiors"
        desc: |-
          Furniture, artwork, floors, stairs, built-ins, and millwork are considered before sanding, repairs, or finish coats begin.

  - type: ZigZag
    title: "Plaster repair before painting"
    content:
      - title: "Cracks, movement and old patches"
        desc: |-
          Plaster cracks, settlement lines, rough old repairs, and raised patch edges can show through fresh paint. We identify what needs repair, what needs primer, and where [skim coating before painting](/services/drywall-repair-skim-coating) may be worth discussing.
        image:
          src: ../photos/level-5-drywall-finish-painted-wall.webp
          alt: "Forest Hill plaster repair and smooth wall finish before painting."

      - title: "Side light and formal rooms"
        desc: |-
          Formal living and dining rooms can reveal wall texture more than bedrooms. Sheen, sanding, patch edges, and primer all matter when natural light crosses the wall.
        image:
          src: ../photos/dining-room-painting-toronto.webp
          alt: "Forest Hill formal room painting with smooth walls."

  - type: Benefits
    title: "Formal rooms, built-ins and detailed trim"
    content:
      - title: "Formal living and dining rooms"
        desc: |-
          These rooms need calm wall finishes, crisp casing lines, careful furniture staging, and colour choices that hold up in changing light.
      - title: "Built-ins and shelving"
        desc: |-
          Built-ins are reviewed as their own surface. Masking, sanding, primer, and coating choices affect whether they blend cleanly with adjacent walls and trim. Where the scope is millwork-heavy, we connect it with [trim and millwork painting](/services/trim-and-millwork-painting).
      - title: "Detailed casing and baseboards"
        desc: |-
          Older casing, crown, baseboards, and doors can have paint buildup, gaps, gloss, and chips that need separate attention.

  - type: ZigZag
    title: "Protecting hardwood, stairs and millwork"
    content:
      - title: "Finished floors and stairs"
        desc: |-
          Hardwood floors, stair treads, rail-adjacent walls, and landings are mapped before repair dust or paint tools enter the room. Stair-adjacent wall work can be coordinated with [stairs](/services/stairs) when refinishing is part of the broader project.
        image:
          src: ../photos/luxury-home-painting-toronto.webp
          alt: "Forest Hill luxury home painting with hardwood floors."

      - title: "Millwork and furniture"
        desc: |-
          Built-ins, casing, furniture, art, and access paths are staged carefully so the home stays orderly through a detailed repaint.
        image:
          src: ../photos/wainscoting-painting-satin-finish.webp
          alt: "Forest Hill millwork and wainscoting painting finish."

  - type: ZigZag
    title: "Why Paint Jobs Fail"
    content:
      - title: "Rushing plaster repair"
        desc: |-
          Rushing plaster repair leads to visible patch marks, flashing, rough caulking lines, weak coverage, or trim that chips too quickly. We avoid that by reviewing plaster cracks, settlement lines, and older glossy trim paint, primer needs, sheen, sanding, and the room sequence before finish coats.
        image:
          src: ../photos/dining-room-painting-toronto.webp
          alt: "Forest Hill painting prep and finish planning example."

      - title: "Glossy trim painted without sanding"
        desc: |-
          Glossy trim painted without sanding leads to visible patch marks, flashing, rough caulking lines, weak coverage, or trim that chips too quickly. We avoid that by reviewing plaster cracks, settlement lines, and older glossy trim paint, primer needs, sheen, sanding, and the room sequence before finish coats.
        image:
          src: ../photos/toronto-dining-room-interior-painting.webp
          alt: "Forest Hill painting prep and finish planning example."

