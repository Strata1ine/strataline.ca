  - type: Faq
    title: "Forest Hill older-home painting FAQ"
    showMoreLabel: View more interior painting questions
    content:
      - title: "How much does interior painting cost in Forest Hill?"
        desc: |-
          Cost varies with plaster condition, room size, trim detail, built-ins, stair halls, ceiling work, furniture, colour changes, and the level of finish expected.
      - title: "Do older Forest Hill homes need plaster repair first?"
        desc: |-
          Often, yes. Hairline cracks, movement, old patch edges, and uneven plaster can show through fresh paint if they are not addressed first.
      - title: "Can you paint plaster walls?"
        desc: |-
          Yes. Plaster walls can paint beautifully when cracks, loose areas, old repairs, primer needs, and side light are reviewed before colour goes on.
      - title: "Can you paint formal living rooms and dining rooms?"
        desc: |-
          Yes. Formal rooms need calm wall sheen, clean casing lines, furniture staging, and close attention to how daylight crosses the walls.
      - title: "Can you paint around built-ins?"
        desc: |-
          Yes. Built-ins, shelving, casing, and adjacent walls are reviewed as separate surfaces so the work does not look like a quick wall repaint.
      - title: "How do you protect hardwood floors and stairs?"
        desc: |-
          We plan floor covering, stair access, furniture movement, and masking before sanding or painting begins.
      - title: "Can you paint detailed casing and older trim?"
        desc: |-
          Yes. Older trim may need cleaning, sanding, caulking, spot primer, and a durable finish that suits the existing paint history.
      - title: "Can you help with colour selection?"
        desc: |-
          Yes. We can discuss samples, undertones, trim contrast, room light, sheen, and how colours behave in formal rooms.
      - title: "Is skim coating worth it in older homes?"
        desc: |-
          It can be when walls show texture, rough old patches, plaster movement, or strong side light. Not every room needs it.
      - title: "Do you paint stair halls and high walls?"
        desc: |-
          Yes. Stair halls need careful access, railing coverage, clean ceiling lines, and a plan for tall or highly visible walls.
      - title: "Can you paint while the home is furnished?"
        desc: |-
          Yes. Furniture, floors, built-ins, stairs, and daily access are planned before work starts.
      - title: "Do you paint after popcorn ceiling removal?"
        desc: |-
          Yes. Ceiling smoothing, primer, and wall painting can be sequenced so the room is finished once rather than reopened twice.
      - title: "Why do Forest Hill painting quotes vary so much?"
        desc: |-
          Quotes vary because plaster repair, trim detail, built-ins, floors, furniture, ceilings, primer, and finish expectations can change the labour significantly.
      - title: "Can you match existing older trim colour?"
        desc: |-
          Often, yes. We review yellowing, sheen, paint buildup, and whether touch-ups or a full trim repaint will look better.
      - title: "What paint finish works best in formal rooms?"
        desc: |-
          Lower-sheen washable wall finishes often look calmer, while trim and doors need more durability. Light and wall condition drive the final choice.
      - title: "Can you quote from photos?"
        desc: |-
          Often, yes. Send wide room photos, plaster cracks, trim detail, built-ins, stair halls, ceiling height, and any areas that worry you.
      - title: "Do you service nearby areas from Forest Hill?"
        desc: |-
          Yes. We also handle painting in Toronto, Rosedale, Leaside, Etobicoke when the scope fits our interior painting work.

