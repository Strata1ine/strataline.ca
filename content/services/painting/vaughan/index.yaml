          alt: "Vaughan main-floor interior painting with bright walls and trim."

      - title: "Move-in and pre-sale refreshes"
        desc: |-
          Before moving in or listing, the work usually focuses on visible walls, stair marks, tired baseboards, bedroom colours, and doors that make the home feel worn.
