  - type: Benefits
    title: "Builder paint upgrades and colour changes"
    content:
      - title: "Thin builder paint"
        desc: |-
          Builder-grade walls often show scuffs, roller marks, weak washability, and patchy touch-ups. A proper upgrade means repairs, primer decisions, and a better finish paint.
      - title: "Neutralizing strong colours"
        desc: |-
          Dark bedrooms, accent walls, and dated colours may need primer or extra coats so the new colour covers evenly.
      - title: "Nail pops and settlement marks"
        desc: |-
          Newer homes can show nail pops, corner cracks, and small drywall movement. Those defects should be handled before the repaint is judged.

  - type: Benefits
    title: "Stair halls, trim and doors"
    content:
      - title: "Stair halls and high walls"
        desc: |-
          Stair walls collect hand marks and are highly visible from the main floor. Safe access, rail coverage, patching, and clean ceiling lines matter here.
      - title: "Trim, doors and baseboards"
        desc: |-
          Doors, casing, and baseboards need a harder coating than walls. They are reviewed separately because sanding, caulking, and drying time can change the schedule. Detailed rooms can link naturally into [trim and millwork painting](/services/trim-and-millwork-painting).
      - title: "Open sightlines"
        desc: |-
          Large family rooms and open layouts make colour transitions, sheen, and long wall quality more obvious.

