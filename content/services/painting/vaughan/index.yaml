  - type: ZigZag
    title: "Main-floor repainting for Vaughan homes"
    content:
      - title: "Main floors, kitchens and family rooms"
        desc: |-
          Vaughan repaint requests often start with the rooms everyone sees: open main floors, kitchen-adjacent walls, family rooms, entries, and stair walls. We scope those areas together so colour, sheen, and trim lines feel consistent, especially when nearby [stairs](/services/stairs) or railing updates affect the walls.
        image:
