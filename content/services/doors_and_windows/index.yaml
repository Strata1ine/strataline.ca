  - type: Benefits
    title: What window and door replacement gets you
    content:
      - title: 40% less heat loss with triple-pane glass
        desc: |-
          Triple-pane Low-E glass with argon gas fill reaches R-values of 7-8 - more than double the insulation of older single-pane windows.
      - title: $100 back per window through Ontario rebates
        desc: |-
          ENERGY STAR certified units qualify for the Home Renovation Savings Program through Save on Energy. Up to $12,000 in combined rebates on eligible upgrades.
      - title: Casement, slider, awning, and bay configurations
        desc: |-
          Casement windows seal tighter and ventilate better. Sliders work for wide openings. Bay and awning styles for kitchens and basements.
      - title: Outdoor noise cut by up to 50%
        desc: |-
          Triple-pane glass with laminated interlayers blocks traffic, construction, and neighbourhood noise - noticeable from day one on busy streets.
      - title: Fusion-welded vinyl that never needs painting
        desc: |-
          Heat-fused corners instead of screws or glue. Vinyl frames resist warping, peeling, and moisture damage for 25+ years with zero maintenance.
      - title: 70-80% return on investment at resale
        desc: |-
          Window and door replacement is one of the highest-ROI renovations in the GTA housing market according to industry cost-vs-value benchmarks.

