      - title: What should I know about screens?
        desc: |-
          Should be specified because screen type and coverage vary by operating window or patio door.
      - title: What should I know about window locks?
        desc: |-
          Depend on style and product line, and security goals should be discussed early.
      - title: What should I know about vinyl window maintenance?
