  - type: Benefits
    title: Common window and door options
    content:
      - title: Vinyl replacement windows
        desc: |-
          A popular choice for durability, low maintenance, and strong value. Modern vinyl systems can offer excellent thermal performance when paired with good installation.
      - title: Double-pane windows
        desc: |-
          A solid standard for many homes, offering improved insulation and better comfort than older single-pane units.
      - title: Triple-pane windows
        desc: |-
          Often worth considering in Ontario for better insulation, improved sound reduction, and stronger comfort near large openings or exposed elevations.
      - title: Front entry doors
        desc: |-
          Entry doors affect first impressions, security, air sealing, and daily use. A well-fitted door should feel solid, close properly, and look right from both sides.
      - title: Sliding and patio doors
        desc: |-
          Large glazed openings need careful installation to operate smoothly, seal properly, and avoid a bulky or poorly integrated appearance.
      - title: Custom sizing and retrofit replacements
        desc: |-
          Many homes are not perfectly standard. Replacement work often requires solutions that suit the actual opening and the finished condition of the home.

  - type: ImagePanel
    title: Vinyl window styles we can source and install
    content:
      - title: Casement windows
        desc: |-
          Casement windows are common for bedrooms, living areas, and upper floors where a tight seal, full ventilation, and clean modern sightlines matter.
        image:
          src: ./photos/supplier/ontario-vinyl-casement-window.png
          alt: Casement vinyl replacement window option for door and window replacement in Toronto, Vaughan, Woodbridge, and the GTA.

      - title: Awning windows
        desc: |-
          Awning windows work well where ventilation is needed with better rain protection, including bathrooms, basements, kitchens, and smaller openings.
        image:
          src: ./photos/supplier/ontario-vinyl-awning-window.png
          alt: Awning vinyl replacement window option for clean window replacement and ventilation in finished homes.

      - title: Fixed casement windows
        desc: |-
          Fixed casement windows provide clean glass area and strong thermal performance where the opening does not need to operate.
        image:
          src: ./photos/supplier/ontario-vinyl-fixed-casement-window.png
          alt: Fixed casement vinyl replacement window for energy efficient replacement windows in Ontario homes.

      - title: Picture windows
        desc: |-
          Picture windows are a good fit for larger views, front elevations, and rooms where natural light matters more than ventilation.
        image:
          src: ./photos/supplier/ontario-vinyl-picture-window.png
          alt: Picture vinyl replacement window for large window replacement and brighter finished interiors.

      - title: Single and double hung windows
        desc: |-
          Hung windows suit traditional elevations, bedrooms, and homes where a classic look and simple ventilation pattern are preferred.
        image:
          src: ./photos/supplier/ontario-vinyl-single-hung-window.png
          alt: Single hung vinyl replacement window for classic window installation in Vaughan and the GTA.

      - title: Slider windows
        desc: |-
          Slider windows are practical for basements, bedrooms, and wider openings where smooth operation and simple maintenance matter.
        image:
          src: ./photos/supplier/ontario-vinyl-single-slider-window.png
          alt: Single slider vinyl replacement window for basement, bedroom, and retrofit window installation.

  - type: Benefits
    title: Supplier-backed product details
    content:
      - title: Ontario-ready vinyl systems
        desc: |-
          Our sourced vinyl window systems are designed for Canadian weather, with low-maintenance vinyl frames, insulated glazing options, and configurations suited to retrofit or brick-to-brick replacement.

      - title: Double or triple pane glass
        desc: |-
          Depending on the room, budget, and exposure, homeowners can choose double-pane or triple-pane glass with Low-E and argon options for better comfort.

      - title: Clean frame and colour choices
        desc: |-
          White remains common, but modern black windows, custom colours, painted frames, brickmoulds, grilles, and glass options can change the look of the whole exterior.

      - title: Better sealing at the opening
        desc: |-
          Product performance depends on the install. Shimming, insulation, flashing, caulking, trim, and exterior sealing decide whether the new window actually performs.

      - title: Retrofit or brick-to-brick
        desc: |-
          Some homes suit retrofit replacement, while others need a fuller brick-to-brick approach. We review the opening, frame condition, trim, exterior finish, and water path before recommending a method.

      - title: Installed with warranty clarity
        desc: |-
          Supplier warranty and workmanship details should be clear before work starts, including glass, frame, hardware, painted finish, installation scope, and what is excluded.

  - type: ImagePanel
    title: Operating window configurations
    content:
      - title: Casement ventilation
        desc: |-
          Casement windows open outward for strong ventilation and a tight compression seal when closed.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-casement-window-open.png
          alt: Open casement vinyl replacement window showing ventilation, hardware, and full-height glass.

      - title: Awning ventilation
        desc: |-
          Awning windows hinge from the top and work well for bathrooms, basements, kitchens, and smaller openings.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-awning-window-open.png
          alt: Open awning vinyl replacement window for bathrooms, basements, kitchens, and ventilation.

      - title: Double hung operation
        desc: |-
          Hung windows suit traditional homes and give familiar vertical operation with a classic exterior look.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-double-hung-window-open.png
          alt: Open double hung vinyl replacement window with classic vertical operation.

      - title: Slider operation
        desc: |-
          Slider windows are practical for wider openings, basement windows, bedrooms, and rooms where simple operation matters.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-double-slider-window-open.png
          alt: Open double slider vinyl replacement window for wider openings and basement window replacement.

      - title: End vent sliders
        desc: |-
          End vent sliders are useful for wide window openings where side ventilation and a fixed centre section make sense.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-end-vent-slider-window-open.png
          alt: Open end vent slider vinyl replacement window with side operating sections.

      - title: Single slider windows
        desc: |-
          Single slider windows can be a clean, low-maintenance option for bedrooms, basements, and secondary rooms.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-single-slider-window-open.png
          alt: Open single slider vinyl replacement window for clean retrofit window installation.

  - type: ImagePanel
    title: Fixed, picture, hung, and deeper-frame options
    content:
      - title: Fixed casement windows
        desc: |-
          Fixed casement windows keep a consistent frame profile beside operating units while giving more glass and less hardware.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-fixed-casement-window.png
          alt: Fixed casement vinyl replacement window for larger glass area and clean exterior sightlines.

      - title: Picture windows
        desc: |-
          Picture windows work well for views, front elevations, stair landings, living rooms, and places where ventilation is not required.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-picture-window.png
          alt: Picture vinyl replacement window for large views and bright finished interiors.

      - title: Deep-frame fixed units
        desc: |-
          Some openings need a deeper frame or fixed configuration to suit the wall, trim, and exterior finish.
        image:
          src: ./photos/supplier/window-renders/deep-frame-high-fixed-window.png
          alt: Deep frame fixed vinyl replacement window option for custom openings and clean exterior trim.

      - title: Smaller fixed windows
        desc: |-
          Smaller fixed units can suit bathrooms, basements, stair areas, and tight exterior elevations.
        image:
          src: ./photos/supplier/window-renders/deep-frame-small-fixed-window.png
          alt: Small fixed vinyl replacement window option for basements, bathrooms, and compact openings.

      - title: Single hung windows
        desc: |-
          Single hung windows can suit bedrooms, secondary rooms, and classic exterior elevations where simple vertical operation is preferred.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-single-hung-window-open.png
          alt: Open single hung vinyl replacement window for classic bedrooms and finished home window replacement.

      - title: Wider slider combinations
        desc: |-
          Wider slider combinations can help where the opening is horizontal and the homeowner wants simple operation with more glass.
        image:
          src: ./photos/supplier/window-renders/large-vinyl-end-vent-slider-window-open.png
          alt: Wide end vent slider vinyl replacement window for horizontal openings and added ventilation.

  - type: ImagePanel
    title: Entry doors, glass inserts, and exterior door options
    content:
      - title: Front entry door replacement
        desc: |-
          Entry doors affect curb appeal, daily use, security, weather sealing, and the feel of the whole front elevation.
        image:
          src: ./photos/supplier/entry-doors/exterior-entry-door-installation-showcase-1.jpg
          alt: Exterior entry door replacement option with decorative glass insert for front door installation in Vaughan, Toronto, Woodbridge, and the GTA.

      - title: Decorative glass inserts
        desc: |-
          Glass inserts can add light, privacy, and a more finished exterior look without sending the customer to a separate door supplier.
        image:
          src: ./photos/supplier/entry-doors/decorative-exterior-door-glass-insert-privacy.png
          alt: Decorative exterior door glass insert option for front door replacement and entry door installation.

      - title: Modern door styles
        desc: |-
          Smooth, panelled, full-lite, half-lite, sidelite, and transom layouts can be matched to the home instead of forcing a generic door into the opening.
        image:
          src: ./photos/supplier/entry-doors/exterior-entry-door-installation-showcase-2.jpg
          alt: Modern exterior door replacement style with glass for clean front entry upgrade.

      - title: Privacy and daylight
        desc: |-
          Door glass can be selected for privacy, daylight, grille pattern, texture, and the look of the surrounding windows.
        image:
          src: ./photos/supplier/entry-doors/exterior-entry-door-installation-showcase-5.jpg
          alt: Bright front entry door with glass insert and sidelites showing privacy, daylight, and curb appeal options.

      - title: Sidelites and transoms
        desc: |-
          Entry systems with sidelites or transoms need careful measuring, levelling, insulation, and trim work so the final result looks built in.
        image:
          src: ./photos/supplier/entry-doors/exterior-entry-door-installation-showcase-3.jpg
          alt: Front entry door with glass and sidelite design for exterior door replacement in the GTA.

      - title: Door installation details
        desc: |-
          A good door project includes plumb installation, clean reveals, proper shimming, insulation, threshold support, weatherstripping, caulking, and finished casing.
        image:
          src: ./photos/supplier/entry-doors/exterior-entry-door-installation-showcase-4.jpg
          alt: Exterior door installation detail for finished home door replacement with clean trim and sealing.

  - type: Benefits
    title: What competitors often leave vague
    content:
      - title: Real installation method
        desc: |-
          The quote should say whether the work is retrofit, full frame, brick-to-brick, door slab only, complete entry system, or patio door replacement.

      - title: Product package
        desc: |-
          Glass, Low-E, argon, double or triple pane, spacer, frame depth, colour, grilles, hardware, screens, locks, brickmoulds, and door glass should be clear.

      - title: Interior finish
        desc: |-
          Customers care about drywall, casing, stool, jamb extension, paint-ready trim, caulking lines, and whether the room looks finished after installation.

      - title: Exterior water management
        desc: |-
          Caulking alone is not the whole story. Flashing, sill condition, slopes, brickmoulds, drainage, and exterior cladding details affect long-term reliability.

      - title: Warranty path
        desc: |-
          Product warranty and installation workmanship should be separated clearly so the homeowner knows who handles glass, hardware, leaks, finish, and service.

      - title: Supplier access without supplier leakage
        desc: |-
          We can use strong supplier product lines while keeping the homeowner's experience with Strataline: product selection, ordering, installation, finishing, and support stay coordinated through one contractor.

  - type: ImagePanel
    title: More door glass, entry systems, and finished installation details
    content:
      - title: Bright entry systems
        desc: |-
          Sidelites, glass inserts, and transoms can bring daylight into the foyer while keeping the entry sealed, aligned, and finished.
        image:
          src: ./photos/supplier/entry-doors/exterior-entry-door-installation-showcase-5.jpg
          alt: Bright entry door system with sidelite glass for front door replacement and foyer daylight.

      - title: Modern black entry doors
        desc: |-
          Black doors, black windows, and coordinated hardware can modernize the front elevation when the style suits the home.
        image:
          src: ./photos/supplier/entry-doors/exterior-entry-door-installation-showcase-4.jpg
          alt: Modern black exterior door with decorative privacy glass and clean exterior trim.

      - title: Full glass and privacy glass
        desc: |-
          Door glass can be clear, obscure, textured, decorative, full-lite, half-lite, or paired with sidelites for the right mix of privacy and light.
        image:
          src: ./photos/supplier/entry-doors/exterior-entry-door-installation-showcase-3.jpg
          alt: Front entry door with decorative glass, sidelite, and transom options.

      - title: Panel and hardware choices
        desc: |-
          Door panels, locksets, handlesets, hinges, sweeps, thresholds, and weatherstripping all affect how the door looks and performs.
        image:
          src: ./photos/supplier/entry-doors/insulated-exterior-door-performance-details.png
          alt: Insulated exterior door panel detail showing entry door hardware, threshold, and weather sealing.

      - title: Real project photos
        desc: |-
          The best entry door project is not just a product photo. It is a door that fits the opening, seals well, and looks finished after installation.
        image:
          src: ./photos/dw21.jpg
          alt: Installed front door replacement in a finished home with clean casing and aligned hardware.

      - title: Patio and side entries
        desc: |-
          Patio doors, garden doors, side doors, and rear entries need the same attention to sill support, water control, locks, screens, and trim.
        image:
          src: ./patio-door.jpg
          alt: Patio door replacement with clean finished interior trim and smooth operation.

  - type: Benefits
    title: Door and window decision guide
    content:
      - title: Replace glass, sash, or full unit
        desc: |-
          Foggy glass, broken hardware, rotten frames, drafts, and poor insulation point to different fixes. We separate simple repairs from full window replacement before quoting.

      - title: Retrofit, brick-to-brick, or full frame
        desc: |-
          Competitors often use these terms loosely. The right method depends on the old frame, rot, water staining, interior casing, exterior cladding, masonry, and the finish you expect.

      - title: Door slab or complete prehung system
        desc: |-
          A slab swap can work only when the existing frame is square and sound. A prehung entry system is usually better when sealing, alignment, threshold, or frame condition is the issue.

      - title: Energy package selection
        desc: |-
          Low-E coatings, argon gas, warm-edge spacers, double or triple pane glass, frame depth, and weather seals should match the exposure and room use.

      - title: Cost drivers that matter
        desc: |-
          Price changes with size, style, glass, colour, installation method, trim work, access, second-storey work, structural changes, and old-unit disposal.

      - title: The finish after installation
        desc: |-
          A clean project includes casing, jamb extensions, caulking, paint-ready trim, exterior capping or brickmould, cleanup, and a final operation check.

  - type: Benefits
    title: Topics this page covers that many competitors split across pages
    content:
      - title: Window styles and room fit
        desc: |-
          Casement, awning, picture, fixed, hung, slider, end vent, bay, bow, basement, bathroom, kitchen, bedroom, and living room window choices are covered here in one place.

      - title: Door types and entry details
        desc: |-
          Front doors, side doors, rear doors, garage man doors, patio doors, garden doors, French doors, sidelites, transoms, glass inserts, and locks are all addressed.

      - title: Installation method questions
        desc: |-
          Brick-to-brick, retrofit, full frame, stud-to-stud, slab-only, prehung, casing, jamb extensions, brickmoulds, flashing, capping, and caulking are explained in plain language.

      - title: Performance and comfort
        desc: |-
          Drafts, cold rooms, outside noise, UV, condensation, fogging, failed seals, Low-E, argon, triple pane, laminated glass, and weatherstripping are covered for Ontario homes.

      - title: Planning and approvals
        desc: |-
          Permits, egress, structural changes, condo approvals, rental properties, commercial spaces, property managers, lead times, and phased replacement are included.

      - title: Ownership after installation
        desc: |-
          Warranty, service, adjustment, maintenance, screen care, caulking inspection, hardware, and what to do after installation are included so the homeowner is not left guessing.

