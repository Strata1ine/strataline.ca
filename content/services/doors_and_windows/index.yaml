          Must meet emergency escape requirements where code requires them.
      - title: What should I know about bathroom windows?
        desc: |-
          Often need privacy glass, ventilation, moisture-aware trim, and clean sealing.
      - title: What should I know about bedroom windows?
        desc: |-
          Need comfort, ventilation, safety, egress review, and noise control where needed.
      - title: What should I know about kitchen windows?
        desc: |-
          Should consider counter height, sink location, ventilation, and easy operation.
      - title: What should I know about living room windows?
        desc: |-
          Often prioritize glass area, curb appeal, views, and comfort near seating areas.
      - title: What should I know about black vinyl windows?
        desc: |-
          Can modernize the exterior, but heat exposure, warranty, and colour strategy should be reviewed.
      - title: What should I know about white vinyl windows?
        desc: |-
          Remain a clean, low-maintenance option for many homes.
      - title: What should I know about custom colour windows?
