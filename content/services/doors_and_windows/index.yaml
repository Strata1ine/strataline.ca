      - title: What should I know about accurate measurements?
        desc: |-
          Affect fit, sealing, lead time, operation, trim, and final appearance.
      - title: What should I know about owner-supplied windows?
        desc: |-
          Can create fit, warranty, missing part, and responsibility issues compared with supply-and-install.
      - title: What should I know about owner-supplied doors?
        desc: |-
          Can be reviewed, but supply-and-install usually gives cleaner accountability.
      - title: What should I know about interior casing?
        desc: |-
          Can be reused or replaced depending on installation method and condition.
      - title: What should I know about jamb extensions?
        desc: |-
          May be needed to bridge the window or door frame to the interior wall finish.
      - title: What should I know about exterior brickmould?
        desc: |-
          Finishes the outside edge and affects both appearance and weather sealing.
      - title: What should I know about aluminum capping?
        desc: |-
          Can reduce maintenance but must be detailed carefully around drainage and water paths.
      - title: What should I know about paint-ready trim?
        desc: |-
          Can be installed when a clean finished interior is part of the scope.
      - title: What should I know about matching casing profiles?
        desc: |-
          Is often possible, though older or custom trim may need special sourcing.
      - title: What should I know about phased replacement?
        desc: |-
          Can prioritize the worst rooms, front elevation, bedrooms, basement, patio doors, or entry doors first.
      - title: What should I know about lead times?
        desc: |-
          Depend on product, custom size, colour, glass, season, and supplier schedule.
      - title: What should I know about rush replacement?
        desc: |-
          Is sometimes possible for simple or standard scopes, but custom products have lead times.
      - title: What should I know about installation preparation?
        desc: |-
          Includes clearing access, removing fragile items, moving blinds, and making space around each opening.
      - title: What should I know about landscaping protection?
        desc: |-
          Is planned where possible, though shrubs or branches may need trimming for safe access.
      - title: What should I know about second-storey windows?
        desc: |-
          Need safe ladder access, exterior protection, and weather-aware scheduling.
      - title: What should I know about high foyer windows?
        desc: |-
          Need access planning, interior protection, and sometimes staging.
      - title: What should I know about windows over stairs?
        desc: |-
          Need special access planning and protection.
      - title: What should I know about windows above roofs?
        desc: |-
          Can be replaced when roof access is safe and protected.
      - title: What should I know about condo window replacement?
        desc: |-
          Depends on board rules, approved products, exterior ownership, insurance, and property management.
      - title: What should I know about condo door replacement?
        desc: |-
          May require approval, fire rating, colour rules, hardware rules, and property management coordination.
      - title: What should I know about property manager projects?
        desc: |-
          Need written scope, insurance details, scheduling, tenant notice, and cleanup expectations.
      - title: What should I know about rental property replacement?
        desc: |-
          Can be phased around tenants and access windows.
      - title: What should I know about commercial doors and windows?
        desc: |-
          Can be reviewed for offices, small storefronts, property-managed buildings, and light commercial scopes.
      - title: What should I know about storefront doors?
        desc: |-
          May be reviewed for door, frame, hardware, and trim work, while larger aluminum storefront systems may need specialty coordination.
      - title: What should I know about permits for window replacement?
        desc: |-
          Are usually not needed for same-size replacement, but structural changes, egress, condos, or commercial work may require review.
      - title: What should I know about permits for door replacement?
        desc: |-
          Are usually not needed for same-size replacement, but widening, new openings, or structural work may require review.
      - title: What should I know about window enlargement?
        desc: |-
          Is a larger renovation involving structure, masonry, permits, lintels, wells, drainage, and finishing.
      - title: What should I know about new door openings?
        desc: |-
          Require structural, exterior, weatherproofing, and permit review.
      - title: What should I know about turning a window into a door?
        desc: |-
          May be possible but is a larger renovation scope.
      - title: What should I know about patio door from a window opening?
        desc: |-
          Requires review of structure, grade, exterior access, permits, and interior layout.
      - title: What should I know about resale value?
        desc: |-
          Can improve when old windows or doors are visibly dated, fogged, drafty, or hard to operate.
      - title: What should I know about front door curb appeal?
        desc: |-
          Is one of the fastest exterior upgrades because it changes the first impression immediately.
      - title: What should I know about rebates?
        desc: |-
          Change over time, so eligibility should be verified before assuming a window or door project qualifies.
      - title: What should I know about energy audits?
        desc: |-
          May be required for some rebate programs and should happen before ordering if rebates matter.
      - title: What should I know about warranty coverage?
        desc: |-
          Should separate product warranty from installation workmanship.
      - title: What should I know about warranty service?
        desc: |-
          Is easier when product sourcing and installation are coordinated through one contractor.
      - title: What should I know about brand choice?
        desc: |-
          Matters less than choosing a suitable product and installing it correctly.
      - title: What should I know about installation quality?
        desc: |-
          Matters because a good product can still fail if measured, shimmed, insulated, sealed, or finished badly.
      - title: What should I know about window inspection?
        desc: |-
          Can review drafts, fogging, operation, rot, water stains, locks, and exterior condition.
      - title: What should I know about door inspection?
        desc: |-
          Can review swing, alignment, threshold, weatherstripping, frame condition, water entry, and security.
      - title: What should I know about combining with painting?
        desc: |-
          Is often smart when trim, casing, doors, or exterior details need a finished look.
      - title: What should I know about combining with siding?
        desc: |-
          Requires careful flashing, trim, and water management planning.
      - title: What should I know about combining with flooring?
        desc: |-
          Should consider thresholds and transitions.
      - title: What should I know about combining with deck work?
        desc: |-
          Should consider patio door sill height, drainage, flashing, and exterior trim.
      - title: What should I know about replacing before interior painting?
        desc: |-
          Usually makes sense if casing, drywall, or trim will be disturbed.
      - title: What should I know about replacing before exterior painting?
        desc: |-
          Often makes sense so new doors, windows, trim, and caulking can be finished together.
      - title: What should I know about modern exterior upgrades?
        desc: |-
          Can include black windows, updated doors, cleaner trim, larger glass, and coordinated colours.
      - title: What should I know about traditional exterior upgrades?
        desc: |-
          Can use hung windows, grilles, classic panels, sidelites, and proportioned trim.
      - title: What should I know about front-facing windows?
        desc: |-
          Are often prioritized for curb appeal and consistent street-facing style.
      - title: What should I know about bedroom windows first?
        desc: |-
          Can improve sleep comfort, noise control, ventilation, and safety.
      - title: What should I know about basement windows first?
        desc: |-
          Can improve security, drafts, ventilation, and egress where needed.
      - title: What should I know about patio door first?
        desc: |-
          Can improve operation, drafts, daylight, and access to outdoor spaces.
      - title: What should I know about front door first?
        desc: |-
          Can improve curb appeal, security, comfort, and daily use.
      - title: What should I know about door glass replacement?
        desc: |-
          May be possible if the slab is compatible and in good condition.
      - title: What should I know about adding glass to a solid door?
        desc: |-
          Depends on door material, slab structure, insert compatibility, and warranty.
      - title: What should I know about widening a front door?
        desc: |-
          Is structural and may involve framing, masonry, permits, flooring, trim, and exterior finishing.
      - title: What should I know about changing door swing?
        desc: |-
          Depends on layout, stairs, railings, weather exposure, hardware, and clearance.
      - title: What should I know about door handing?
        desc: |-
          Must be confirmed before ordering because it affects hinges, swing, lock side, and use.
      - title: What should I know about window handing?
        desc: |-
          Must be confirmed where operation direction matters.
      - title: What should I know about increasing ventilation?
        desc: |-
          May be possible by changing fixed units to operating units or choosing a different style.
      - title: What should I know about increasing glass area?
        desc: |-
          Depends on frame style, opening size, installation method, and structural limits.
      - title: What should I know about matching windows across the house?
        desc: |-
          Requires planning style, colour, grilles, frame proportions, and elevation balance.
      - title: What should I know about mixing window styles?
        desc: |-
          Can work when each room has different needs and the exterior still looks intentional.
      - title: What should I know about mixing black and white windows?
        desc: |-
          Should be done carefully so the exterior does not look pieced together.
      - title: What should I know about matching door and window colours?
        desc: |-
          Can create a more intentional exterior palette.
      - title: What should I know about cleaning after installation?
        desc: |-
          Includes old unit removal, work-area cleanup, label removal, and final check.
      - title: What should I know about hauling away old units?
        desc: |-
          Can be included in the scope.
      - title: What should I know about keeping old hardware?
        desc: |-
          Is possible if requested before removal and if the hardware can be removed cleanly.
      - title: What should I know about first step?
        desc: |-
          Is to send photos, rough measurements, location, opening count, and notes about comfort, style, or operation problems.

  - type: Faq
    title: Extra door and window replacement questions
    showMoreLabel: View more door and window questions
    content:
      - title: What is the difference between brick-to-brick and full-frame window replacement?
        desc: |-
          Brick-to-brick usually means removing the old window and frame back to the masonry or exterior opening. Full-frame can mean a deeper removal that also deals with frame, trim, insulation, and surrounding conditions. The exact scope should be written clearly.

      - title: What is stud-to-stud door replacement?
        desc: |-
          Stud-to-stud door replacement removes the old door system back to the rough framed opening. It is often used when the old frame, threshold, or alignment is no longer reliable.

      - title: Is retrofit window replacement bad?
        desc: |-
          Not automatically. Retrofit can be a good option when the existing frame is sound and the homeowner wants less disruption. It is a poor choice when rot, water damage, or frame failure is hidden underneath.

      - title: How do I know if my window frame is rotten?
        desc: |-
          Soft wood, staining, peeling paint, swollen trim, musty smell, loose caulking, and recurring leaks can point to rot. The final call often happens once trim or exterior covering is opened.

      - title: Can you replace only the glass in a window?
        desc: |-
          Sometimes. If the frame, sash, and hardware are good, a sealed glass unit may be replaceable. If the window is drafty, warped, rotten, or hard to operate, full replacement may be smarter.

      - title: Can you replace only the window sash?
        desc: |-
          Sometimes, but sash-only work depends on the window system, part availability, frame condition, and whether the replacement will solve the actual problem.

      - title: What causes a window to feel drafty?
        desc: |-
          Drafts can come from failed weatherstripping, poor installation, old frames, weak locks, missing insulation, bad caulking, or air leaks around the opening.

      - title: Why do new windows still get condensation?
        desc: |-
          Interior condensation often comes from humidity, ventilation, blinds, curtains, and room airflow. Better windows can reduce the problem, but they do not remove moisture from the house.

      - title: Is condensation between panes repairable?
        desc: |-
          Condensation between panes means the sealed glass unit failed. The usual fix is sealed unit replacement or full window replacement depending on the frame and product condition.

      - title: What is a warm-edge spacer?
        desc: |-
          A warm-edge spacer separates glass panes while reducing heat transfer at the edge of the sealed unit. It can help thermal performance and edge condensation resistance.

      - title: What is the difference between Low-E 180, Low-E 272, and Low-E 366?
        desc: |-
          These refer to different Low-E coating performance profiles. The right choice depends on climate, sun exposure, room comfort, and whether winter heat retention or summer heat control matters more.

      - title: Should north-facing windows be different from south-facing windows?
        desc: |-
          Sometimes. Exposure affects heat gain, glare, condensation risk, and comfort. Large sunny windows may need a different glass package than shaded or north-facing windows.

      - title: Are black windows more expensive?
        desc: |-
          Often, yes. Black or custom colour frames can cost more and may have different lead times, warranty details, and heat-exposure considerations.

      - title: Can black windows warp?
        desc: |-
          Quality product selection matters because dark colours absorb more heat. Exposure, product type, finish, and warranty should be reviewed before ordering black vinyl windows.

      - title: Do replacement windows need exterior capping?
        desc: |-
          Not always. Exterior capping can create a clean low-maintenance finish, but it must be detailed around water paths so it does not trap moisture.

      - title: What is aluminum capping?
        desc: |-
          Aluminum capping is bent metal installed over exterior trim or wood. It can reduce painting and maintenance when installed with proper drainage and sealing.

      - title: Should old caulking be removed before new caulking?
        desc: |-
          Failed, loose, dirty, or cracked caulking should be removed or cut back so new sealant can bond properly. Caulking over bad caulking is not a long-term fix.

      - title: What is backer rod used for?
        desc: |-
          Backer rod helps control sealant depth in wider gaps so caulking can stretch and perform instead of tearing or bonding poorly.

      - title: Can you install windows in winter?
        desc: |-
          Yes, when weather and site conditions allow. Openings are usually handled one at a time to limit heat loss and keep the home manageable.

      - title: Can exterior doors be replaced in winter?
        desc: |-
          Often, yes. Winter door replacement needs careful staging, fast opening control, and suitable products for sealant and weather conditions.

      - title: How long does it take to order custom windows?
        desc: |-
          Lead times vary by season, product, size, colour, glass, and supplier schedule. Custom colours and specialty glass usually take longer than standard white units.

      - title: How long does it take to order a custom front door?
        desc: |-
          It depends on slab style, colour, glass, sidelites, transoms, hardware prep, size, and supplier schedule. A written quote should include expected timing.

      - title: How should I prepare before window installation?
        desc: |-
          Clear access to each opening, remove fragile items, move furniture back, remove blinds if requested, and protect items that are close to the work area.

      - title: How should I prepare before door installation?
        desc: |-
          Clear the entry inside and outside, remove rugs and fragile items, make room for tools, and confirm hardware, lock, colour, swing, and access before installation day.

      - title: Do I need to remove blinds before replacing windows?
        desc: |-
          Usually yes, or at least the installer needs clear access. Some blinds can be reinstalled, but fit may change if the trim or frame depth changes.

      - title: Can shutters be reused after window replacement?
        desc: |-
          Sometimes. Reuse depends on the new frame, casing, jamb depth, mounting style, and whether the shutters were custom fit to the old opening.

      - title: Will window replacement damage stucco?
        desc: |-
          Stucco openings require careful planning. Damage risk depends on installation method, existing stucco condition, trim details, and how the old window is removed.

      - title: Will door replacement damage brick?
        desc: |-
          Same-size replacement usually avoids major brick work, but old caulking, brickmoulds, thresholds, and uneven openings may need repair or adjustment.

      - title: Can you replace windows in brick homes?
        desc: |-
          Yes. Brick homes need accurate measuring, exterior seal planning, sill review, and careful work around masonry edges.

      - title: Can you replace windows in stucco homes?
        desc: |-
          Yes, but stucco requires more caution around cuts, flashing, trims, and exterior sealing.

      - title: Can you replace windows in siding homes?
        desc: |-
          Yes. Siding projects require attention to flashing, trim, J-channel, water paths, and how the new unit integrates with the exterior cladding.

      - title: What is a brick sill?
        desc: |-
          A brick sill is the masonry sill below a window. If it is cracked, sloped poorly, or absorbing water, it should be reviewed before replacement is finished.

      - title: Can a bad brick sill cause window leaks?
        desc: |-
          Yes. Water can enter through cracked masonry, poor slope, failed mortar, or bad exterior sealing around the sill.

      - title: What is flashing around a window?
        desc: |-
          Flashing directs water away from the opening. It matters most where windows meet siding, stucco, decks, roofs, and other water-prone details.

      - title: Do all replacement windows need flashing?
        desc: |-
          The right detail depends on the opening and exterior finish. Some retrofit conditions rely more on trim and sealant, while full-frame work may need deeper flashing integration.

      - title: What is a sill pan?
        desc: |-
          A sill pan helps collect and direct water away beneath a window or door. It is especially important where water exposure is high.

      - title: Do patio doors need a sill pan?
        desc: |-
          Often, yes, or an equivalent water-management detail. Patio doors are large openings and need good sill support and drainage planning.

      - title: Why is my patio door hard to slide?
        desc: |-
          Common causes include dirty tracks, worn rollers, poor alignment, frame movement, weak sill support, or an old door system that no longer adjusts properly.

      - title: Can you replace only patio door rollers?
        desc: |-
          Sometimes. If the frame, track, glass, lock, and sill are still sound, hardware repair may be possible before full replacement.

      - title: What is a garden door?
        desc: |-
          A garden door is a hinged patio-style door system, often with one operating door and one fixed panel. It needs swing clearance and good threshold detailing.

      - title: Are French doors better than sliding patio doors?
        desc: |-
          Neither is always better. French doors offer a hinged look and wider opening feel, while sliding doors save space and often suit tighter layouts.

      - title: Are fiberglass doors better than steel doors?
        desc: |-
          Fiberglass doors often offer strong insulation and dent resistance. Steel doors can be durable and cost-effective. The better choice depends on exposure, style, budget, and use.

      - title: Do fiberglass doors need painting?
        desc: |-
          Many can be painted or stained depending on product and finish. Factory finish, field painting, colour warranty, and sun exposure should be reviewed.

      - title: Can steel doors rust?
        desc: |-
          Steel doors can rust if the finish is damaged or water sits at exposed edges. Good installation, finish care, and threshold drainage help.

      - title: What is a door sweep?
        desc: |-
          A door sweep seals the bottom of the door against drafts, bugs, and light. It should contact properly without dragging too hard.

      - title: What is an adjustable threshold?
        desc: |-
          An adjustable threshold lets the seal height be tuned after installation or as weatherstripping compresses over time.

      - title: Why can I see daylight under my door?
        desc: |-
          The sweep, threshold, weatherstripping, slab alignment, or frame may be out of adjustment. Sometimes the door system is simply worn out.

      - title: Why does my front door stick?
        desc: |-
          Sticking can come from humidity, settlement, loose hinges, frame movement, worn weatherstripping, or an old door that no longer sits square.

      - title: Can you change a door from inswing to outswing?
        desc: |-
          Sometimes, but it must be reviewed for code, weather exposure, landing, security, hinges, threshold, and daily use.

      - title: Can I add a smart lock to a new exterior door?
        desc: |-
          Usually, yes, if the door thickness, bore, backset, latch, and hardware prep match the smart lock requirements.

      - title: What is a multi-point lock?
        desc: |-
          A multi-point lock secures the door at more than one point. It can improve sealing and security on compatible door systems.

      - title: Can you reuse my existing lockset?
        desc: |-
          Sometimes. Reuse depends on condition, bore size, backset, door thickness, handing, and whether keys or hardware finish need to match.

      - title: Should I choose clear or privacy glass for a front door?
        desc: |-
          Clear glass gives more view and light. Privacy glass keeps the entry brighter while limiting visibility from outside.

      - title: Can door glass be replaced without changing the whole door?
        desc: |-
          Sometimes. The door slab must be compatible and in good condition, and the glass insert size must match or be planned carefully.

      - title: What are sidelites?
        desc: |-
          Sidelites are narrow glass panels beside an entry door. They add daylight and style but need privacy, security, and sealing review.

      - title: What is a transom?
        desc: |-
          A transom is glass above a door or window. It can add height and daylight, but it must be measured and sealed as part of the full opening.

      - title: Can you replace just a sidelite?
        desc: |-
          Sometimes. It depends on the existing frame, glass, product availability, and whether the entry system should be replaced as a whole.

      - title: Do front doors need permits?
        desc: |-
          Same-size replacement usually does not need a permit. Widening, structural changes, new openings, or condo rules may require approval.

      - title: Do window replacements need permits?
        desc: |-
          Same-size replacement usually does not need a permit. Egress changes, enlargements, structural changes, and some condo or commercial work may need review.

      - title: What is an egress window?
        desc: |-
          An egress window is an emergency escape opening required in certain bedrooms or basement living spaces. Size, height, opening area, and window well details matter.

      - title: Can a basement window be enlarged for egress?
        desc: |-
          Often, but it becomes a larger renovation involving concrete or masonry cutting, structure, window well, drainage, permits, and interior finishing.

      - title: Can a window be converted to a patio door?
        desc: |-
          Sometimes. It requires structural review, exterior grade planning, drainage, permits, and interior layout review.

      - title: Can you make a window opening smaller?
        desc: |-
          It may be possible, but exterior finish, structure, insulation, water control, and interior repair all need planning.

      - title: Can you make a window opening larger?
        desc: |-
          It may be possible, but lintels, framing, exterior finish, permits, and waterproofing make it more complex than same-size replacement.

      - title: What should a written quote include?
        desc: |-
          It should list product type, size, glass package, colour, hardware, screens, installation method, trim, exterior finish, disposal, warranty, exclusions, and taxes.

      - title: Why do quotes for windows vary so much?
        desc: |-
          Quotes vary because products, glass, installation method, trim scope, access, warranty, cleanup, and contractor accountability are not always the same.

      - title: Should I choose the cheapest window quote?
        desc: |-
          Not without checking scope. A cheap quote may exclude trim, capping, disposal, warranty support, full-frame work, or repairs needed for a lasting result.

      - title: Should I replace all windows at once?
        desc: |-
          Whole-home replacement gives consistency, but phased work can make sense when budget, urgency, or room priorities matter.

      - title: Which windows should be replaced first?
        desc: |-
          Start with fogged, leaking, rotten, unsafe, drafty, hard-to-operate, bedroom, basement, or front-facing windows.

      - title: Which doors should be replaced first?
        desc: |-
          Start with doors that leak, stick, fail to lock, show rot, have poor thresholds, or affect curb appeal and security.

      - title: Can replacement windows improve resale value?
        desc: |-
          They can help when old windows are visibly dated, fogged, drafty, hard to use, or hurting curb appeal.

      - title: Can a front door improve resale value?
        desc: |-
          A clean front entry can improve first impressions quickly, especially when the old door looks worn or does not match the home.

      - title: Are rebates available for windows and doors?
        desc: |-
          Rebate programs change. Eligibility should be checked before ordering, especially if an energy audit or specific product rating is required.

      - title: What is a U-factor?
        desc: |-
          U-factor measures heat transfer. Lower numbers generally mean better insulation.

      - title: What is solar heat gain coefficient?
        desc: |-
          Solar heat gain coefficient measures how much solar heat passes through glass. The right number depends on room exposure and comfort goals.

      - title: What is air leakage rating?
        desc: |-
          Air leakage rating relates to how much air passes through a window or door assembly. Installation quality also affects real-world air leakage.

      - title: Do Energy Star windows guarantee lower bills?
        desc: |-
          They can help, but bills also depend on insulation, HVAC, air leaks, thermostat use, sun exposure, and house size.

      - title: Can new windows make rooms quieter?
        desc: |-
          Yes, especially when old units leak air. Glass type, pane spacing, laminated glass, and installation quality all affect noise reduction.

      - title: Can new doors make the home quieter?
        desc: |-
          Better seals, insulated slabs, tighter thresholds, and proper frame installation can reduce noise through entry openings.

      - title: What maintenance do new windows need?
        desc: |-
          Keep tracks clean, inspect caulking, check locks, clean glass gently, avoid blocking weep holes, and report hardware problems early.

      - title: What maintenance do new exterior doors need?
        desc: |-
          Check weatherstripping, threshold adjustment, hinges, lock operation, caulking, paint or finish condition, and drainage near the sill.

      - title: How long should replacement windows last?
        desc: |-
          Lifespan depends on product quality, exposure, installation, maintenance, and whether the opening manages water properly.

      - title: How long should an exterior door last?
        desc: |-
          Lifespan depends on material, exposure, storm door use, paint or finish care, threshold drainage, and installation quality.

      - title: Can storm doors damage entry doors?
        desc: |-
          In some sun exposures, storm doors can trap heat against the entry door. Product warranty and exposure should be reviewed before adding one.

      - title: Can you replace doors and windows for commercial spaces?
        desc: |-
          Yes, selected commercial and property-managed scopes can be reviewed, including offices, rental properties, small commercial entries, and light exterior door or window work.

      - title: Can you work with property managers?
        desc: |-
          Yes. Property-managed work should include written scope, insurance details, access windows, tenant communication, cleanup expectations, and documentation.

      - title: Can you install customer-supplied windows?
        desc: |-
          It can be reviewed, but customer-supplied products can create fit, warranty, missing-part, and responsibility issues.

      - title: Can you install customer-supplied doors?
        desc: |-
          It can be reviewed, but supply-and-install usually gives cleaner accountability for fit, hardware prep, warranty, and service.

      - title: What photos should I send for a quote?
        desc: |-
          Send inside and outside photos of each opening, closeups of damage, rough sizes, location, desired style, and notes about drafts, leaks, noise, or operation problems.

      - title: What measurements should I send first?
        desc: |-
          Rough width and height are enough for early discussion. Final ordering needs professional measurement because small mistakes can be expensive.

      - title: Can you match existing window styles?
        desc: |-
          Often, yes. Matching depends on frame colour, grille pattern, casing, exterior trim, operating style, and product availability.

      - title: Can you modernize the whole exterior with windows and doors?
        desc: |-
          Yes. Coordinated black windows, updated entry doors, glass inserts, trim, capping, and exterior paint can change the whole elevation.

      - title: What is the first step with Strataline?
        desc: |-
          Send photos, rough dimensions, location, and the problems you want solved. We can then advise on scope, product direction, and next steps.


