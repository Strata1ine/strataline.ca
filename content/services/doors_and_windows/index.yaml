  - type: Faq
    title: Window replacement cost and common questions
    content:
      - title: How much does window replacement cost per window in Ontario?
        desc: |-
          Vinyl triple-pane windows run $600-$1,200 per unit installed. Fiberglass starts at $800-$1,500. Full-home projects with 10-15 windows typically land between $8,000 and $18,000 depending on size and configuration.
      - title: Are triple-pane windows worth the extra cost in Ontario?
        desc: |-
          Yes - triple-pane adds 10-15% to the price over double-pane but delivers R-values of 7-8 versus 3-4. Most Ontario homeowners recover the difference in 5-7 years through lower heating bills.
      - title: How long does it take to replace all the windows in a house?
        desc: |-
          Each window swap takes 30-45 minutes. A home with 10-12 windows is typically finished in 1-2 days. Custom shapes or structural modifications add time.
      - title: Do vinyl windows qualify for Ontario rebates in 2026?
        desc: |-
          Yes. ENERGY STAR certified windows qualify for $100 per rough opening through Ontario's Home Renovation Savings Program, delivered by Save on Energy. The program runs through November 2026.
      - title: Should I choose casement or slider windows?
        desc: |-
          Casement windows seal tighter, ventilate fully, and have higher ENERGY STAR ratings. Sliders cost less, suit wide openings, and work where outward-opening sashes would block walkways.
      - title: How much does a new entry door cost installed?
        desc: |-
          Steel entry doors run $1,500-$3,000 installed. Fiberglass doors with sidelites and premium hardware range from $2,500 to $6,000+. Both qualify for the same $100 rebate per rough opening.

