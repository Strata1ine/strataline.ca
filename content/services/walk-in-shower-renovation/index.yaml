sections:
  - type: Benefits
    title: Shower renovation details that matter
    content:
      - title: Waterproofing before tile
        desc: |-
          A shower is only as good as the waterproofing behind it. Substrate, slope, corners, seams, niche details, and penetrations matter.
      - title: Glass and layout planning
        desc: |-
          Door swing, fixed panels, curb height, entry width, towel access, vanity clearance, and toilet clearance should be planned before tile starts.
      - title: Tile, niche, and fixture placement
        desc: |-
          Tile layout, drain location, valve height, shower head height, niche position, bench size, and grout lines affect the finished look.
      - title: Tub to shower conversions
        desc: |-
          Removing a bathtub can make a bathroom feel cleaner and more usable when the home does not need that tub for resale or family use.

