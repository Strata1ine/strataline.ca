  - type: Faq
    title: Walk-in shower FAQ
    content:
      - title: Can you convert a bathtub to a walk-in shower?
        desc: |-
          Yes, when plumbing, drainage, layout, waterproofing, and glass clearance support the conversion.
      - title: Do walk-in showers need waterproofing behind tile?
        desc: |-
          Yes. Tile and grout are not the waterproofing system. Proper membranes, seams, drains, and penetrations are critical.
      - title: What affects shower renovation cost?
        desc: |-
          Size, demolition, plumbing changes, tile, waterproofing, glass, niches, benches, fixtures, and structural/site conditions all affect price.
      - title: Can a shower be curbless?
        desc: |-
          Sometimes. Curbless showers need slope, drain planning, floor height, waterproofing, and splash control reviewed before committing.

