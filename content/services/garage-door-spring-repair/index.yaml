  - type: Faq
    title: Garage door spring FAQ
    content:
      - title: Can I open a garage door with a broken spring?
        desc: |-
          It is not recommended. The door can be very heavy and unsafe, and using the opener may damage the opener or door hardware.
      - title: How do I know if the spring is broken?
        desc: |-
          Signs include a visible gap in the torsion spring, a loud snap, a door that will not lift, crooked movement, loose cables, or an opener that strains.
      - title: Do both springs need replacement?
        desc: |-
          On two-spring systems, replacing both may be recommended when they are the same age so the door remains balanced.
      - title: Why does spring sizing matter?
        desc: |-
          The wrong spring can make the door too heavy, too light, uneven, noisy, or hard on the opener.

