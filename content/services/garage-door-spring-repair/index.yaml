sections:
  - type: Benefits
    title: Broken springs are a safety issue
    content:
      - title: Heavy door symptoms
        desc: |-
          A broken spring can make the garage door feel extremely heavy, stop halfway, slam down, or refuse to open even when the opener runs.
      - title: Matched spring sizing
        desc: |-
          Springs must match door weight, height, drum setup, and hardware condition. Guesswork can shorten opener life or create unsafe movement.
      - title: Cable and roller review
        desc: |-
          Spring problems often appear with frayed cables, worn rollers, bent tracks, loose brackets, or opener strain.
      - title: Balance and safety testing
        desc: |-
          After repair, the door should lift smoothly, hold position, close evenly, and trigger safety systems properly.

