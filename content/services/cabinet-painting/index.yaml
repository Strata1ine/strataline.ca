  - type: Faq
    title: Cabinet painting FAQ
    content:
      - title: Is cabinet painting cheaper than replacing cabinets?
        desc: |-
          Usually yes when the boxes and layout are in good condition. Replacement makes more sense when cabinets are damaged, poorly built, or the layout no longer works.
      - title: Can oak cabinets be painted?
        desc: |-
          Yes, but oak grain can remain visible unless extra grain filling and prep are included. We review expectations before quoting.
      - title: Do you remove cabinet doors for painting?
        desc: |-
          Doors and drawers are usually removed for better prep and finish. Cabinet boxes, panels, and trim are protected and painted on site.
      - title: What finish is best for cabinets?
        desc: |-
          Durable satin or low-sheen cabinet coatings are common because they clean more easily than wall paint and resist everyday handling better.

