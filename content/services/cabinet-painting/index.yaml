sections:
  - type: Benefits
    title: Cabinet painting that holds up
    content:
      - title: Degreasing and sanding
        desc: |-
          Kitchen cabinets collect oil, cleaners, wax, and hand contact. Good cabinet painting starts with cleaning, sanding, and adhesion prep.
      - title: Proper primer
        desc: |-
          Primer choice matters for laminate, maple, oak, MDF, stained wood, old paint, and glossy factory finishes.
      - title: Sprayed finish options
        desc: |-
          Doors, drawers, panels, vanities, built-ins, and millwork can be sprayed for a smoother finish than brush-only painting.
      - title: Colour and sheen planning
        desc: |-
          Whites, warm neutrals, dark colours, satin finishes, and durable cabinet coatings all behave differently in busy kitchens.

