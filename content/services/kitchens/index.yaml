  - type: Prices
    title: What's the cost?
    content:
      - title: Cosmetic
        min: 15000
        max: 30000
        materials:
          - Cabinet refacing or repainting
          - New hardware
          - Laminate or entry quartz countertops
          - Basic backsplash and lighting updates
        desc: |-
          Best for kitchens with a working layout and solid cabinet boxes. Scope may include new doors, drawers, hardware, lighting, faucet, sink, backsplash, and counters.
      - title: Mid-range
        min: 30000
        max: 75000
        materials:
          - Semi-custom or custom cabinets
          - Quartz countertops
          - Tile backsplash
          - Updated lighting, plumbing, and appliances
        desc: |-
          Best for replacing cabinets, improving storage, adding or rebuilding an island, updating electrical and plumbing, and creating a clean finished kitchen without major structural work.
      - title: Full custom
        min: 75000
        max: 175000
        materials:
          - Custom cabinetry
          - Premium quartz, porcelain, stone, or slab backsplash
          - Built-in or panel-ready appliances
          - Structural, electrical, plumbing, flooring, and lighting work
        desc: |-
          Best for full redesigns, open concept kitchens, wall removal, large islands, built-in appliances, luxury finishes, and high-detail project coordination.

