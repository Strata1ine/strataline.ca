  - type: Prices
    title: Kitchen renovation cost breakdown
    content:
      - title: Basic
        min: 15000
        max: 25000
        materials:
          - Laminate countertops
          - Stock cabinetry
          - Standard appliances
        desc: |-
          Cosmetic refresh - repaint existing cabinets, swap hardware, upgrade light fixtures, and install new laminate countertops. Keeps existing layout intact.
      - title: Mid-range
        min: 25000
        max: 50000
        materials:
          - Quartz or granite countertops
          - Semi-custom cabinets with Blum hardware
          - Energy-efficient appliances
        desc: |-
          New semi-custom cabinetry with Blum soft-close hardware, quartz countertops, island or peninsula build, updated backsplash, and pot light installation.
      - title: High-end
        min: 50000
        max: 100000
        materials:
          - Caesarstone or Cambria quartz
          - Fully custom cabinetry
          - Premium hardwood or large-format tile flooring
          - Designer fixtures
        desc: |-
          Full redesign with structural changes - open up walls, custom cabinetry, waterfall island, luxury appliances, and smart home integration.

  - type: Benefits
    title: What you get with a kitchen renovation
    content:
      - title: Open concept layouts that work
        desc: |-
          Remove walls to connect kitchen, dining, and living areas. Structural beam installation included where needed per Ontario Building Code.

      - title: Custom cabinetry with Blum hardware
        desc: |-
          Shaker, flat-panel, or slab door styles. Blum Tandem soft-close drawer slides and Blumotion hinges on every door and drawer.

      - title: Quartz countertops by Caesarstone & Silestone
        desc: |-
          Non-porous, heat-resistant surfaces in 50+ colours. Templated on-site, fabricated to 1/16" tolerance, installed with colour-matched seams.

      - title: Dust-free demolition
        desc: |-
          Festool HEPA extraction during cutting and sanding. Containment barriers seal the work area so dust stays out of the rest of your home.

      - title: Backsplash & tile installation
        desc: |-
          Subway, herringbone, large-format, or natural stone backsplash. Schluter DITRA underlayment on all tile installations for crack prevention.

      - title: Stronger resale value
        desc: |-
          Kitchen renovations return 75-100% of cost at resale in the GTA market. The single highest-ROI renovation you can make.

