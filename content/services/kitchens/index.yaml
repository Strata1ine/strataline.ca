  - type: Faq
    title: Kitchen renovation questions
    content:
      - title: How much does a kitchen renovation cost per square foot in Ontario?
        desc: |-
          Expect $75-$150 per square foot for a mid-range kitchen renovation and $150-$300+ for high-end custom work. Countertop material, cabinetry type, and structural changes are the biggest cost drivers.

      - title: How long does a kitchen renovation take from start to finish?
        desc: |-
          Plan for 3-6 weeks once materials arrive on-site. A cosmetic refresh takes 1-2 weeks. Full gut renovations with structural changes and custom cabinetry run 5-8 weeks including inspections.

      - title: Is cabinet refacing worth it compared to full replacement?
        desc: |-
          Refacing saves 40-50% over new cabinets and takes about a week. It works well when your cabinet boxes are solid but the doors and finish look dated. Full replacement makes sense for layout changes.

      - title: Can a kitchen renovation increase my home's value?
        desc: |-
          Yes - kitchen renovations consistently deliver 75-100% return on investment in the GTA. Even a mid-range renovation ($25K-$50K) can add significant resale value according to industry data.

      - title: Do you handle plumbing and electrical during the renovation?
        desc: |-
          Yes. Licensed plumbing and electrical work is included - island rough-ins, pot light wiring, dedicated appliance circuits, and sink relocation. All work is ESA-inspected where required.

