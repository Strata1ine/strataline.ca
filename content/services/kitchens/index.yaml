  - type: ImagePanel
    title: Kitchen details we plan
    content:
      - title: White shaker cabinets
        desc: |-
          White shaker cabinets work for modern, transitional, and classic kitchen renovations because they pair well with quartz, stone-look porcelain, black hardware, stainless appliances, and warm wood floors.
        image:
          src: ./photos/white-shaker-kitchen-large-black-island-pendant-lights-quartz-vaughan.webp
          alt: White shaker kitchen cabinets with black island, pendant lights, quartz counters, and stainless appliances.

      - title: Quartz counters and slab backsplash
        desc: |-
          Quartz counters and full-height slab backsplash reduce grout lines, simplify cleaning, and create a more custom look around the range and prep zones.
        image:
          src: ./photos/white-custom-kitchen-cabinets-quartz-backsplash-integrated-range-toronto.webp
          alt: White custom kitchen with quartz counters, quartz backsplash, integrated range hood, and bright cabinetry.

      - title: Two-tone kitchen islands
        desc: |-
          A contrasting island can add seating, storage, outlets, prep space, and visual weight without making the whole kitchen feel dark.
        image:
          src: ./photos/two-tone-kitchen-island-pendant-lighting-black-base-quartz-countertop-vaughan.webp
          alt: Two-tone kitchen island with black base, white cabinets, pendant lighting, and quartz countertop.

      - title: Herringbone backsplash details
        desc: |-
          Herringbone tile gives texture behind the range, sink, and prep zones while keeping the kitchen bright and easy to style.
        image:
          src: ./photos/white-shaker-kitchen-herringbone-backsplash-black-faucet-range-hood-woodbridge.webp
          alt: White shaker kitchen with herringbone backsplash, black faucet, range hood, and quartz counters.

      - title: Built-in appliance planning
        desc: |-
          Wall ovens, counter-depth fridges, panel-ready appliances, and custom range hoods must be planned before cabinet production, not forced in later.
        image:
          src: ./photos/built-in-wall-oven-white-shaker-kitchen-cabinetry-vaughan.webp
          alt: Built-in wall oven installed in white shaker kitchen cabinetry with black hardware.

      - title: Coffee bars and landing zones
        desc: |-
          Coffee bars, appliance garages, landing zones, and open shelves make daily use easier without crowding the main cooking path.
        image:
          src: ./photos/kitchen-coffee-bar-floating-shelves-herringbone-backsplash-toronto.webp
          alt: Kitchen coffee bar with floating shelves, white cabinets, and herringbone backsplash.

  - type: Benefits
    title: What competitors often leave vague
    content:
      - title: Cabinet lead times
        desc: |-
          Cabinet timelines drive the whole kitchen schedule. Door style, colour, custom sizes, fillers, panels, and appliance specs should be finalized early.
      - title: Countertop templating
        desc: |-
          Quartz or stone counters are usually templated after cabinets are installed. Sink, faucet, cooktop, seams, overhangs, and edge profiles must be confirmed.
      - title: Electrical and lighting
        desc: |-
          Kitchens need proper outlet spacing, GFCI protection, appliance circuits, island outlets, under-cabinet lighting, pendants, switches, and dimmers.
      - title: Plumbing and ventilation
        desc: |-
          Sink moves, dishwasher placement, fridge water lines, pot fillers, gas ranges, range hoods, and exterior venting affect cost and sequencing.
      - title: Permits and inspections
        desc: |-
          Cosmetic work may be simple, but structural changes, electrical, plumbing, gas, condo rules, and wall removal can require review or permits.
      - title: Finish after installation
        desc: |-
          The kitchen is not finished when cabinets are hung. Trim, caulking, paint, tile edges, panel alignment, hardware, appliance fit, and cleanup decide the final impression.

