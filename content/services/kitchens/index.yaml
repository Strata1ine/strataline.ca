  - type: Faq
    title: Kitchen renovation questions
    showMoreLabel: View more kitchen renovation questions
    content:
      - title: How much does a kitchen renovation cost in Toronto?
        desc: |-
          Kitchen renovation cost depends on cabinet scope, countertop material, backsplash, flooring, plumbing, electrical, appliances, layout changes, demolition, permits, and finishing. A cosmetic refresh can be far less than a full custom kitchen with structural work.
      - title: How long does a kitchen renovation take?
        desc: |-
          Once materials are on site, many kitchen renovations take several weeks. Custom cabinets, countertop templating, tile, inspections, and appliance delivery can extend the timeline.
      - title: Do I need a permit for a kitchen renovation?
        desc: |-
          A same-location cosmetic kitchen update often does not need a permit, but structural changes, plumbing relocation, electrical changes, new openings, and condo work may require review.
      - title: Can you renovate a kitchen while we live in the house?
        desc: |-
          Yes. The work needs dust control, floor protection, clear staging, temporary cooking planning, and good sequencing so the home stays manageable.
      - title: Should I reface or replace my kitchen cabinets?
        desc: |-
          Refacing can work when cabinet boxes are solid and the layout is good. Replacement is better when the layout, storage, box condition, or appliance plan needs real change.
      - title: Are quartz countertops better than granite?
        desc: |-
          Quartz is consistent, low maintenance, and available in many patterns. Granite is natural stone and each slab is unique. The right choice depends on use, look, budget, and maintenance expectations.
      - title: What is the best backsplash for a kitchen?
        desc: |-
          Porcelain, ceramic, glass, stone, and quartz slab can all work. The best backsplash depends on cleaning, grout lines, heat exposure, design, and countertop choice.
      - title: Can you remove a wall for an open concept kitchen?
        desc: |-
          Possibly. Load-bearing walls need structural review, beams, permits, electrical or HVAC relocation, and careful finishing.
      - title: What should be planned before ordering cabinets?
        desc: |-
          Appliance sizes, sink location, range hood, pantry needs, island size, ceiling height, flooring, lighting, outlets, plumbing, trim, and countertop overhang should be decided before ordering.
      - title: Why do kitchen renovations get delayed?
        desc: |-
          Common delays include cabinet lead times, missing appliance specs, countertop templating, permits, inspections, hidden plumbing or electrical issues, damaged materials, and late design changes.
      - title: What should I know about kitchen renovation cost?
        desc: |-
          kitchen renovation cost can affect cabinet measurements, countertop details, electrical or plumbing work, lead times, and the order of installation. It should be confirmed before materials are ordered so the renovation does not stall later.
      - title: How do I plan for kitchen renovation cost?
        desc: |-
          For kitchen renovation cost, photos and measurements help with early planning, but final decisions should be made after site review, product selection, and coordination with cabinets, counters, lighting, and appliances.
      - title: What affects the cost of kitchen renovation cost?
        desc: |-
          For kitchen renovation cost, photos and measurements help with early planning, but final decisions should be made after site review, product selection, and coordination with cabinets, counters, lighting, and appliances.
