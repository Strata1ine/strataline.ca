  - type: Faq
    title: Carpet to hardwood stairs FAQ
    content:
      - title: Can every carpeted stair be converted to hardwood?
        desc: |-
          Most can, but the best method depends on the existing treads, risers, structure, stair shape, railing, and finish goals.
      - title: Are tread caps better than replacing treads?
        desc: |-
          Tread caps are often faster and cleaner when the base stairs are sound. Full replacement may be needed for damaged, uneven, or poorly built stairs.
      - title: Can you fix squeaky stairs during conversion?
        desc: |-
          Often yes. Squeaks are easier to address once carpet is removed and the stair structure is visible.
      - title: Can railings be updated at the same time?
        desc: |-
          Yes. Many projects combine hardwood stair conversion with new railings, iron balusters, refinishing, or painted risers.

