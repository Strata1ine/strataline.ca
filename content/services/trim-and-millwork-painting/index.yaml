sections:
  - type: Benefits
    title: Details that change the room
    content:
      - title: Crisp lines and clean prep
        desc: |-
          Trim painting needs caulking, sanding, nail-hole filling, masking, priming, and clean cut lines where walls meet millwork.
      - title: Durable satin finishes
        desc: |-
          Doors, baseboards, and hand-contact surfaces need tougher paint than standard wall finishes.
      - title: Sprayed or brushed as needed
        desc: |-
          Some millwork benefits from sprayed finishing, while installed trim may need careful brushing and rolling depending on access.
      - title: Works with full repaint projects
        desc: |-
          Trim painting often pairs with wall painting, ceiling painting, stair refinishing, cabinet painting, and drywall repair.

