  - type: Faq
    title: Trim painting FAQ
    content:
      - title: Do you caulk trim before painting?
        desc: |-
          Yes where appropriate. Open gaps at trim, casing, crown, and baseboards are caulked before finish paint for a cleaner line.
      - title: Can old stained trim be painted white?
        desc: |-
          Yes, but stained wood usually needs sanding, bonding primer, stain-blocking where needed, and durable trim paint.
      - title: Do you paint interior doors?
        desc: |-
          Yes. We paint slab doors, paneled doors, closet doors, casings, jambs, and related trim.
      - title: Can you paint stair railings?
        desc: |-
          Yes. Painted railings need careful prep because handrails receive heavy contact. Stain-grade refinishing may be better for some stair projects.

