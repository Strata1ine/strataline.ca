  - type: Faq
    title: Stair railing installation FAQ
    showMoreLabel: View more stair railing questions
    content:
      - title: What railing installation services do you provide?
        desc: |-
          We install and update stair railings, handrails, posts, balusters, pickets, guards, wall rails, iron spindles, wood railings, glass railings, stainless details, modern railing systems, and related stair trim.

      - title: When should stair railings be replaced?
        desc: |-
          Replace railings when they are loose, dated, damaged, unsafe, too low, poorly spaced, hard to grasp, mismatched to the home, or when tread refinishing and staircase renovation are already planned.

      - title: Can you replace railings without replacing stairs?
        desc: |-
          Yes. Railings can often be replaced while keeping existing treads, though holes, post locations, stringer condition, and finish touch-ups must be planned.

      - title: Can you install black metal spindles?
        desc: |-
          Yes. Black metal spindles are a common upgrade with stained handrails, white posts, and modern or transitional stair finishes. Spacing, drilling, alignment, and code openings matter.

      - title: Can you install glass railings on stairs?
        desc: |-
          Sometimes. Glass railings need structural support, templates, hardware planning, code review, cleaning expectations, and careful coordination with posts, treads, and landings.

      - title: What is the difference between a handrail and guard?
        desc: |-
          A handrail is grasped while using stairs. A guard prevents falls at open sides or landings. Some systems combine both, but the code requirements and hardware are not the same.

      - title: Do stair railings need to meet code?
        desc: |-
          Yes. Height, openings, graspability, continuity, load, returns, post strength, and landing guards matter. A railing should look good and feel solid.

      - title: Can you make a railing less wobbly?
        desc: |-
          Often. Wobbly railings can come from loose posts, weak anchoring, damaged treads, poor fasteners, or old joinery. Sometimes repair is enough; other times replacement is safer.

      - title: Can railing work be done with stair refinishing?
        desc: |-
          Yes. Coordinating railing installation with stair refinishing creates a cleaner result because posts, holes, stain, paint, and tread finish can be sequenced together.

      - title: What railing style should I choose?
        desc: |-
          Choose based on the home style, flooring, tread stain, wall colour, natural light, safety needs, cleaning, and budget. Transitional wood with black metal is popular because it suits many interiors.

      - title: Do you install wall-mounted handrails?
        desc: |-
          Yes. Wall rails need proper brackets, blocking or anchors, height, returns, finish selection, and secure fastening into suitable structure.

      - title: What affects railing installation cost?
        desc: |-
          Cost depends on linear footage, number of posts, baluster count, material, curved sections, landings, removal, patching, staining, painting, glass, stainless hardware, and code complexity.

      - title: What should a railing quote include?
        desc: |-
          It should include material, post count, baluster count, handrail profile, wall rail details, removal, patching, staining or painting, code assumptions, timeline, cleanup, and exclusions.

      - title: Do you install railings across the GTA?
        desc: |-
          Yes. We install stair railings in Toronto, Vaughan, Woodbridge, Richmond Hill, Markham, North York, Mississauga, Oakville, Burlington, Pickering, Ajax, Whitby, Oshawa, and nearby GTA communities.

