  - type: ZigZag
    title: Where stair railing upgrades make the biggest difference
    content:
      - title: Open foyers and front-entry staircases
        desc: |-
          In open foyers and highly visible entrances, the railing becomes a major design feature instead of just a safety component. Updating it can change how the entire main floor feels.
        image:
          src: ./railing-installation-gallery/stair-railing-newmarket-curved-staircase-29.jpg
          alt: Curved staircase railing installation in Newmarket.

      - title: Upper landings and guard sections
        desc: |-
          Matching upper landing sections matter just as much as the stair run itself because they complete the visual impression from above and below.
        image:
          src: ./railing-installation-gallery/stair-railing-north-york-modern-34.jpg
          alt: Upper landing stair railing installation in North York.

      - title: Homes being updated in stages
        desc: |-
          Many renovations are completed one floor at a time. We plan ahead by adjusting stair nosing and railing details so future flooring work on upper levels integrates cleanly without rework.
        image:
          src: ./railing-installation-gallery/stair-railing-markham-custom-02.jpg
          alt: Stair railing upgrade project in Markham.

      - title: Hardwood stairs with dated builder-grade balusters
        desc: |-
          Updating builder-grade balusters is one of the fastest ways to modernize a wood staircase. Black metal is the most requested option, but a range of styles, finishes, and materials are available to suit the space.
        image:
          src: ./railing-installation-gallery/stair-railing-oakville-modern-05.jpg
          alt: Hardwood staircase with upgraded railing in Oakville.

