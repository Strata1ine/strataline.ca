  - type: ZigZag
    title: What stair railing installation includes
    content:
      - title: Remove dated balusters and outdated railing details
        desc: |-
          Existing builder-grade railing parts are removed so the new system fits cleanly and feels intentional instead of patched together. This is often the difference between a staircase that looks original and one that looks properly updated.
        image:
          src: ./railing-installation-gallery/stair-railing-richmond-hill-modern-08.jpg
          alt: Existing staircase being upgraded with a new railing system in Richmond Hill.

      - title: Install black balusters, updated posts, and cleaner profiles
        desc: |-
          New balusters and coordinated post details give the staircase a sharper, more architectural look. This is one of the fastest ways to modernize an older interior staircase.
        image:
          src: ./railing-installation-gallery/stair-railing-vaughan-black-balusters-46.jpg
          alt: Black balusters installed on a staircase in Vaughan.

      - title: Fit new wood handrails and coordinated transitions
        desc: |-
          Handrails and transitions are adjusted so the railing feels integrated with the staircase and surrounding finishes. The goal is not just replacement, but a finished result that looks correct from every angle.
        image:
          src: ./railing-installation-gallery/stair-railing-richmond-hill-wood-handrail-41.jpg
          alt: Wood handrail installed with updated stair railing in Richmond Hill.

      - title: Complete matching landings and upper-floor guardrails
        desc: |-
          Matching landing rails and upper-floor guard sections keep the installation visually consistent. Without this, even a good stair run can still feel incomplete.
        image:
          src: ./railing-installation-gallery/stair-railing-toronto-upper-landing-45.jpg
          alt: Matching upper landing railing installation in Toronto.

