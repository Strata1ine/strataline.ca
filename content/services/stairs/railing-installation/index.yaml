sections:
  - type: Benefits
    title: Why upgrade your stair railing?
    content:
      - title: Major visual change without rebuilding the whole staircase
        desc: |-
          A new railing system can completely change how the staircase looks without tearing apart the stair structure itself. In many homes, replacing dated balusters, posts, and handrails delivers the biggest visual improvement for the least disruption.

      - title: Black balusters and wood handrails remain the most requested look
        desc: |-
          This combination gives older staircases a cleaner, brighter, more current appearance while still feeling warm and residential. It works well in both traditional and more modern interiors.

      - title: Strong fit for finished, occupied homes
        desc: |-
          Railing upgrades are much less disruptive than full staircase replacement. They are a strong option when homeowners want a meaningful update without turning the home into a construction zone.

      - title: Easy to pair with tread caps or refinishing later
        desc: |-
          Many homeowners start with the railing, then continue with tread caps or staircase refinishing once the overall direction of the staircase is established.

