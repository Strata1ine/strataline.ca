  - type: ZigZag
    title: How stair tread caps installation works
    content:
      - title: Existing stairs are prepared
        desc: |-
          Carpet, staples, and debris are removed. The staircase is cleaned, leveled, and prepared so the new tread caps fit securely and cleanly.
        image:
          src: ./stair-tread-caps-gallery/stair-tread-caps-installation-toronto-1.jpg
          alt: Preparing existing stairs before installing tread caps.

      - title: Hardwood tread caps are installed
        desc: |-
          Solid oak tread caps are installed over the existing staircase structure, creating the appearance of a fully rebuilt hardwood staircase.
        image:
          src: ./stair-tread-caps-gallery/stair-tread-caps-installation-toronto-2.jpg
          alt: Installing hardwood stair tread caps over existing stairs.

      - title: Risers, trims, and details are finished
        desc: |-
          Once the caps are in place, risers, skirt details, and transitions are completed so the staircase feels intentional, cohesive, and professionally finished.
        image:
          src: ./stair-tread-caps-gallery/oak-stair-tread-caps-toronto-finished-2.jpg
          alt: Finished stair tread caps with clean trim and riser details.

      - title: Railings can be upgraded at the same time
        desc: |-
          Tread caps are often paired with black iron balusters, updated posts, or new handrails for a complete staircase transformation.
        image:
          src: ./stair-tread-caps-gallery/modern-stair-tread-caps-black-iron-toronto-3.jpg
          alt: Stair tread caps paired with modern black iron railing.

  - type: ZigZag
    title: Best uses for stair tread caps
    content:
      - title: Carpet-to-hardwood stair conversion
        desc: |-
          Tread caps are the ideal solution when you want to remove carpet from stairs and get the look of hardwood without rebuilding the entire staircase.
        image:
          src: ./stair-tread-caps-gallery/stair-tread-caps-installation-toronto-4.jpg
          alt: Carpet stair conversion to hardwood with tread caps.

      - title: Worn or damaged stairs
        desc: |-
          If the staircase structure is still sound but the visible surfaces are worn, dated, or inconsistent, tread caps give you a fresh finished surface.
        image:
          src: ./stair-tread-caps-gallery/oak-stair-tread-caps-toronto-finished-3.jpg
          alt: Worn stairs upgraded with oak stair tread caps.

      - title: Modern staircase upgrades
        desc: |-
          Tread caps work especially well in homes moving toward white risers, natural oak, darker stains, and black iron railing systems.
        image:
          src: ./stair-tread-caps-gallery/modern-stair-tread-caps-black-iron-toronto-4.jpg
          alt: Modern staircase upgrade with tread caps and black iron railing.

  - type: Prices
    title: Typical stair tread caps cost
    content:
      - title: Straight staircase
        min: 4000
        max: 7000
        materials:
          - Hardwood tread caps
          - Installation
          - Standard finishing
        desc: |-
          Best for straight or simpler stair layouts with standard installation requirements.

      - title: L-shaped or larger staircase
        min: 7000
        max: 11000
        materials:
          - Hardwood tread caps
          - Custom fitting
          - Trim and finishing
        desc: |-
          Includes more complex stairs, turns, landings, and larger visual transformation scope.

      - title: With railing upgrades
        min: 9000
        max: 16000
        materials:
          - Tread caps
          - New railings or balusters
          - Full finishing
        desc: |-
          Best for homeowners doing the staircase properly in one stage with tread, riser, and railing improvements together.

  - type: ZigZag
    title: Stair tread caps vs staircase refinishing
    content:
      - title: Choose tread caps if
        desc: |-
          Your stairs are carpeted, heavily worn, or visually outdated, and you want the look of a brand-new hardwood staircase without full replacement.
        image:
          src: ./stair-tread-caps-gallery/stair-tread-caps-installation-toronto-6.jpg
          alt: Stair tread caps installation detail on oak surface.

      - title: Choose refinishing if
        link: /services/stairs/refinishing
        desc: |-
          Your staircase is already hardwood and in good enough condition to sand, stain, and restore rather than cover with new tread caps.
        image:
          src: ../refinishing/staircase-refinishing-gallery/staircase-refinishing-wood-stairs-dark-stain-classic.jpg
          alt: Hardwood staircase refinishing example for comparison.

