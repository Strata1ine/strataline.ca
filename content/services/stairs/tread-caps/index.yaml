  - type: Faq
    title: Stair tread caps FAQ
    content:
      - title: Can stair tread caps be installed over carpet stairs?
        desc: |-
          Yes. Carpet is removed, the structure is prepared, and the tread caps are installed over the existing staircase base.

      - title: Are stair tread caps real wood?
        desc: |-
          Yes. We typically use solid oak so the finished staircase looks and feels like hardwood, not a cheap overlay.

      - title: How long does stair tread caps installation take?
        desc: |-
          Most projects take 2 to 4 days depending on staircase size, layout, and whether railing work is included.

      - title: Will the new stairs match my floors?
        desc: |-
          Yes. Stain and finish can be adjusted so the new staircase works with your existing floors and the style of the home.

      - title: Is stair capping better than replacing the whole staircase?
        desc: |-
          In many cases, yes. It delivers most of the visual impact of a new staircase without the cost and mess of full reconstruction.

      - title: Do you also upgrade railings?
        desc: |-
          Yes. Many tread caps projects are completed together with black iron balusters, updated handrails, and post refinishing or replacement.

  - type: ZigZag
    title: Explore our stair services
    content:
      - title: Stair Renovation — Full staircase upgrades
        link: /services/stairs
        desc: |-
          Explore complete staircase renovation options, from structural updates and layout improvements to full visual modernization. This is the best fit when the staircase needs more than a surface-level change.
        image:
          src: ../staircase-renovation-gallery/staircase-refinishing-vaughan-dark-treads-white-risers-modern.jpg
          alt: Staircase in North York suitable for full stair renovation or railing upgrade.

      - title: Stair Refinishing — Restore existing wood stairs
        link: /services/stairs/refinishing
        desc: |-
          If the staircase is solid but worn, refinishing can restore the wood and completely update the look without full replacement. This is a strong option for stained stairs, natural wood treads, and dated finishes.
        image:
          src: ../refinishing/staircase-refinishing-gallery/staircase-refinishing-dustless-sanding-festool.jpg
          alt: Staircase in Toronto suitable for stair refinishing and railing updates.

      - title: Railing Installation — Upgrade balusters, posts, and handrails
        link: /services/stairs/railing-installation
        desc: |-
          Replace dated balusters, handrails, and posts with a cleaner, more modern railing system. This is often the fastest way to transform the appearance of a staircase without rebuilding it.
        image:
          src: ../railing-installation/railing-installation-gallery/stair-railing-etobicoke-modern-17.jpg
          alt: Black baluster stair railing installation in Vaughan.

