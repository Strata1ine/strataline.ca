title: Stair capping, refinishing & railing installation

seo: |-
  Solid oak stair capping and refinishing with Festool dust-free sanding, Bona Traffic HD finish, and custom railings in wrought iron, stainless steel, or frameless glass.

desc: |-
  Remove carpet from stairs and cap with solid oak treads, custom stair nosing, and your choice of wrought iron spindles, stainless steel, or glass railings.

image:
  src: ./cover.jpg
  alt: Curved staircase with red oak treads and wrought iron railings.

sections:
  - type: Benefits
    title: What you get with a stair capping project
    content:
      - title: Solid oak treads and risers
        desc: |-
          3/4-inch red or white oak treads with bull-nose stair nosing. Each tread is precision-cut on site for a tight fit against your stringers.

      - title: Dust-free sanding process
        desc: |-
          Festool RO 150 and DX 93 sanders with HEPA extraction. No dust migrating through your home during stair sanding and staining.

      - title: Durable, slip-resistant finish
        desc: |-
          Three coats of Bona Traffic HD in satin or semi-gloss. Anti-slip grit additive available for homes with kids or pets.

      - title: OBC-compliant railing installation
        desc: |-
          Every newel post and baluster meets Ontario Building Code handrail height requirements of 34 to 42 inches. No surprises at resale inspections.

