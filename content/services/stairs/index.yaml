  - type: ZigZag
    title: Stair repair & restoration
    content:
      - title: Structural repairs & squeak fixes
        desc: |-
          We fix loose treads, squeaky risers, damaged stringers, and unstable posts before refinishing. Structural issues addressed first — cosmetic finish applied on top of a solid base.
        image:
          src: ./staircase-renovation-gallery/stair-railing-repair-richmond-hill-wood-iron.jpg
          alt: Stair railing repair in Richmond Hill with wood and iron components.

      - title: Full staircase restoration
        desc: |-
          Worn, damaged, or heavily used staircases restored to like-new condition. We strip, repair, and refinish all components — treads, risers, handrails, newel posts, and balusters — for a cohesive, premium result.
        image:
          src: ./staircase-renovation-gallery/staircase-restoration-vaughan-wrought-iron-hardwood.jpg
          alt: Full staircase restoration in Vaughan with wrought iron railing and hardwood treads.

      - title: Surface damage repair
        desc: |-
          Deep scratches, dents, gouges, and worn finish areas repaired and blended before staining. The result looks uniform — no patching lines, no colour mismatches.
        image:
          src: ./staircase-renovation-gallery/restored-hardwood-stairs-dark-stain-black-iron-balusters.jpg
          alt: Restored hardwood stairs with dark stain and black iron balusters.

      - title: Outdated staircase modernization
        desc: |-
          80s oak and brass? Carpeted treads with painted spindles? We update the look completely — new stain direction, new railing style, new risers — without rebuilding the structure.
        image:
          src: ./staircase-renovation-gallery/staircase-renovation-vaughan-modern-wood-black-railing.jpg
          alt: Modernized staircase renovation in Vaughan with dark wood finish and black railing.

