  - type: ZigZag
    title: What we do
    content:
      - title: Staircase refinishing
        link: /services/stairs/refinishing
        desc: |-
          Sand, stain, and seal your existing hardwood stairs with a dust-free process that produces a smooth, durable finish. We strip old coatings down to bare wood, repair surface damage, and apply premium stains and polyurethane topcoats — custom matched to your floors. Most refinishing projects are completed in 3–5 days.

        image:
          src: ./staircase-renovation-gallery/staircase-refinishing-vaughan-wood-treads-iron-balusters.jpg
          alt: Staircase refinishing in Vaughan with wood treads and iron balusters.

      - title: Hardwood stair capping
        link: /services/stairs/tread-caps
        desc: |-
          Replace carpet or damaged treads with solid oak stair caps installed directly over your existing structure. No demolition required. Clean edges, tight fit, and a finish that matches your new or existing hardwood floors. A cost-effective way to get the look of a brand-new staircase.
        image:
          src: ./staircase-renovation-gallery/stair-tread-caps-installation-toronto-oak-modern.jpg
          alt: Hardwood stair tread cap installation in Toronto with oak and modern finish.

      - title: Custom railing installation
        link: /services/stairs/railing-installation
        desc: |-
          Upgrade to wrought iron, stainless steel, glass, or hardwood railing systems. We replace balusters, newel posts, and handrails — or install a complete custom railing from scratch. Iron and glass railings are consistently the highest-impact visual upgrade on any staircase.
        image:
          src: ./staircase-renovation-gallery/stair-railing-installation-vaughan-stainless-steel-modern.jpg
          alt: Custom stainless steel railing installation in Vaughan by Strataline.

      - title: Curved & open-riser staircases
        desc: |-
          We work on complex curved staircases, open-riser designs, and grand double-flight entries. If your staircase is a design feature, we treat it like one — with precision fitting, custom components, and finishes that complement the architecture.
        image:
          src: ./staircase-renovation-gallery/grand-staircase-renovation-toronto-curved-iron-railing.jpg
          alt: Grand curved staircase renovation in Toronto with iron railing by Strataline.

      - title: Custom stain matching
        desc: |-
          We mix stain on site to match your floors, trim, or millwork. Whether you're going lighter, darker, or matching an existing finish exactly, we test and confirm the colour before committing to the full staircase.
        image:
          src: ./staircase-renovation-gallery/staircase-renovation-stainless-steel-balusters-oak-treads.jpg
          alt: Staircase renovation with custom stain-matched oak treads and stainless steel balusters.

      - title: Modern & classic finishes
        desc: |-
          From dark espresso with white risers and black iron spindles to natural oak with warm stain and wood railings — we've done them all. We help you choose a direction that works with your home's architecture, lighting, and existing floors.
        image:
          src: ./staircase-renovation-gallery/staircase-renovation-vaughan-oak-treads-modern.jpg
          alt: Modern staircase renovation in Vaughan with oak treads and updated finishes.

