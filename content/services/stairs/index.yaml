  - type: Faq
    title: Frequently asked questions
    content:
      - title: How long does staircase refinishing take?
        desc: |-
          Most refinishing projects are completed in 3–5 days. Stair capping with new treads typically takes 4–7 days. Projects that include custom railing fabrication and installation may take up to two weeks depending on materials and scope. We confirm timelines at the estimate stage.

      - title: Will it be messy? What about dust?
        desc: |-
          No. We use professional Festool dust extraction equipment — the same system featured on CityTV — that captures dust at the source. Your home stays clean and livable throughout the project. We mask and protect adjacent floors, walls, and trim before starting.

      - title: Do you do carpet-to-hardwood stair conversions?
        desc: |-
          Yes. We remove existing carpet, assess the underlying structure, make any necessary repairs, and install solid oak tread caps over the existing stair frame. It's one of our most requested services and one of the most dramatic visual upgrades a home can have.

      - title: Can you match my existing hardwood floors?
        desc: |-
          Yes. We custom-mix stain on site and test it on the actual wood before full application. We can match virtually any existing floor colour, and we'll advise if a slight adjustment would look better given lighting conditions and wood grain.

      - title: Do you service my area?
        desc: |-
          We serve Vaughan, Woodbridge, Toronto, Richmond Hill, King City, Kleinburg, Aurora, Markham, Thornhill, Mississauga, Etobicoke, and surrounding GTA communities. Contact us to confirm your location.

      - title: Can you handle curved staircases or complex designs?
        desc: |-
          Yes. We regularly work on curved staircases, open-riser designs, double-flight entries, and grand foyer staircases. Complex projects are welcome — we'll assess and quote at the in-home estimate.

      - title: What railing options are available?
        desc: |-
          We install wrought iron, stainless steel, glass, and wood railing systems. We can replace just the balusters, just the handrail, or do a complete railing replacement including newel posts. Iron and glass are the most requested upgrades right now.

