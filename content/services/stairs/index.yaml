  - type: ZigZag
    title: Our expertise applies to every aspect
    content:
      - title: Dust-free stair sanding
        desc: |-
          We use professional stair sanding to protect your home and create a smooth surface for a clean, durable finish.
        image:
          src: ./photos/carpeted-stairs-black-metal-balusters-hardwood-handrail.jpg
          alt: Dust-free stair sanding with hardwood handrail.

      - title: Custom stain matching & colour finishes
        desc: |-
          From natural tones to deep espresso, we match your flooring colour using premium stains and topcoats for durability and a refined look.
        image:
          src: ./photos/staircase-renovation-stainless-steel-balusters-oak-treads.jpg
          alt: Stainless steel railing with oak treads.
      - title: Carpet to hardwood stair conversion
        desc: |-
          Replace outdated carpet with hardwood stair capping. We install solid oak treads, risers, and stair nosing for a clean, modern upgrade.
        image:
          src: ./photos/staircase-renovation-dark-hardwood-treads-white-risers-stainless-steel-balusters.jpg
          alt: Hardwood stair capping with new treads and risers.

      - title: Modern & classic stair finishes
        desc: |-
          Choose from curated stair colours and finishes, or request a custom match that blends seamlessly with your home's floors and trim. We create custom staircases.
        image:
          src: ./photos/curved-staircase-renovation-dark-hardwood-wrought-iron-balusters.jpg
          alt: Dark hardwood staircase with wrought iron railings.

  - type: TextCarousel
    text:
      - Custom staircase renovation
      - Dust-free stair refinishing
      - Premium custom railings
      - Hardwood capping & restoration
      - Designer iron & glass railings
      - Expert handrail installation

  - type: ZigZag
    title: Stair repair & restoration
    content:
      - title: Stair repair before refinishing
        desc: |-
          We handle staircase repair including scratches, dents, water damage, squeaks, and loose components. We provide railing replacement when needed.
        image:
          src: ./photos/frameless-glass-railings-stainless-steel-handrail-modern-stairwell.jpg
          alt: Frameless glass railings with stainless steel handrail.

      - title: Restored like-new finish
        desc: |-
          After repair and refinishing, your staircase looks new again with an updated colour, smooth finish, and crisp detailing.
        image:
          src: ./photos/restored-hardwood-stairs-dark-stain-black-iron-balusters.jpg
          alt: Restored hardwood stairs with iron balusters.

  - type: Reviews
    title: What our clients say
    content:
      - title: Violet
        location: Markham
        stars: 5
        desc: |-
          Our staircase looks absolutely stunning. It feels like a high-end custom installation you'd see in a luxury model home.

      - title: H. Archibald
        location: Toronto
        stars: 5
        desc: |-
          Impeccable attention to detail. The craftsmanship is on another level, truly transformative work.

  - type: Faq
    title: Have any questions?
    content:
      - title: How long does a staircase renovation take?
        desc: |-
          Most projects are completed in about one week, depending on stair condition, scope, and material selections. Custom railings may add fabrication time. We work within your budgets and timelines.

      - title: Can you help with staircase design ideas?
        desc: |-
          Yes. We guide you through staircase design, stain colours, stair finishes, and railing styles so the renovation suits your home.

      - title: Do you work with luxury homes and custom builds?
        desc: |-
          Yes, we work with homeowners, designers, builders, and architects on high-end staircase projects. Our staircase contractors handle house builds, commercial development, and properties with competitive prices and timelines that work with your budgets.

      - title: What railing materials do you offer?
        desc: |-
          We build and install railings in hardwood, wrought iron, stainless steel, and frameless glass. We offer modern railing systems with handrail configurations.

  - type: Services
    exclude:
      - stairs
