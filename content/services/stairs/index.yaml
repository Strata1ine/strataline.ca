        desc: |-
          We refinish staircases using a dust-controlled process designed for lived-in homes. Cleaner work, less disruption.

      - title: Premium materials that last
        desc: |-
          Solid oak treads, durable finishes, and high-end railing systems built to last.

      - title: Design that matches your interior
        desc: |-
          We match stain, railing style, and layout to your floors and trim.

      - title: Stronger resale appeal
