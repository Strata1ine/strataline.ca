  - type: Faq
    title: Staircase renovation FAQ
    showMoreLabel: View more staircase renovation questions
    content:
      - title: What staircase renovation services do you provide?
        desc: |-
          We handle staircase renovation, stair refinishing, hardwood tread caps, stair capping, carpet removal, riser updates, stringer finishing, railing installation, handrail installation, balusters, posts, staining, painting, repairs, squeak reduction, and cleanup.

      - title: How much does staircase renovation cost in Toronto and the GTA?
        desc: |-
          Cost depends on the number of treads, straight or curved layout, open or closed sides, carpet removal, sanding, stain work, tread caps, landings, railing style, baluster count, post changes, repairs, and finish level.

      - title: Should I refinish stairs or install tread caps?
        desc: |-
          Refinishing works when the existing wood is sound and worth saving. Tread caps make sense when stairs are carpet-grade, badly worn, mismatched, or when you want new hardwood treads without rebuilding the whole staircase.

      - title: Can carpeted stairs be converted to hardwood?
        desc: |-
          Often yes. Some carpeted stairs have refinishable wood underneath, while others need hardwood tread caps or new treads. We check tread material, nosing, risers, stringers, staples, damage, and railing details.

      - title: Can you match stairs to existing hardwood floors?
        desc: |-
          Usually. Exact matches depend on wood species, age, stain, finish, lighting, and existing floor wear. We can prepare stain samples and explain where perfect matching is unrealistic.

      - title: How long does stair refinishing take?
        desc: |-
          A standard staircase can take several days depending on sanding, stain samples, drying time, finish coats, railing work, riser painting, and whether the stairs must remain partly usable.

      - title: Can we use the stairs during renovation?
        desc: |-
          Access depends on the stage. Sanding, staining, and finish coats may require blocked access or careful timing. We plan the sequence before starting so the household knows what to expect.

      - title: Is stair sanding dusty?
        desc: |-
          Stair sanding creates fine dust, but containment, extraction, careful tools, and cleanup reduce spread. Occupied homes need floor protection and dust control along nearby halls and rooms.

      - title: What finish is best for stair treads?
        desc: |-
          Stairs need durable floor-grade finish because they take foot traffic, grit, and cleaning. Sheen, colour, dry time, odour, and durability should be chosen together.

      - title: Can you paint risers and stringers white?
        desc: |-
          Yes. White risers and stringers are common with stained treads. They need sanding, filling, caulking where appropriate, primer, and durable paint because stairs take scuffs.

      - title: Can you fix squeaky stairs?
        desc: |-
          Often. Squeaks can come from loose treads, gaps, nails, framing movement, stringers, or subfloor issues. Some squeaks can be reduced during refinishing or capping, but access affects repair options.

      - title: Can you replace railings at the same time?
        desc: |-
          Yes. Stair renovation is a good time to install new posts, handrails, iron balusters, wood pickets, glass railings, stainless railings, or updated guards. Railing work should be planned with tread work.

      - title: What railing styles are popular?
        desc: |-
          Popular options include stained wood handrails, white posts with black metal pickets, wrought iron, modern square spindles, glass panels, stainless steel, and clean transitional railing profiles.

      - title: Do stair railings need to meet code?
        desc: |-
          Yes. Guard height, handrail height, graspability, baluster spacing, openings, load, continuity, and post strength matter. Decorative ideas still need to be safe and compliant.

      - title: Can horizontal railings be installed?
        desc: |-
          Horizontal railing designs need careful code and safety review. Many homeowners like the look, but child safety, climbability, guard requirements, and local interpretation should be considered before committing.

      - title: Can you renovate curved stairs?
        desc: |-
          Yes. Curved stairs are more detailed because treads, nosing, railing parts, baluster spacing, stain work, and templates are less standard. They usually cost more than straight stairs.

      - title: Can you renovate open-stringer stairs?
        desc: |-
          Yes. Open-stringer stairs need return nosing, exposed edges, finished stringers, baluster details, and more precise carpentry than closed stairs.

      - title: What should I send for a staircase quote?
        desc: |-
          Send photos from top, bottom, side, landings, railings, posts, damaged areas, and the floor you want to match. Include tread count, whether carpet is present, and whether railings are changing.

      - title: What should a staircase renovation quote include?
        desc: |-
          It should include tread count, landings, sanding or capping, risers, stringers, railing parts, posts, balusters, stain, paint, finish coats, protection, cleanup, exclusions, timeline, and warranty.

      - title: Do you renovate stairs across the GTA?
        desc: |-
          Yes. We renovate stairs in Toronto, Vaughan, Woodbridge, Richmond Hill, Markham, North York, Mississauga, Oakville, Burlington, Pickering, Ajax, Whitby, Oshawa, and nearby GTA communities.

