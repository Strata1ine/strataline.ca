  - type: Faq
    title: Stair capping and renovation FAQ
    content:
      - title: How much does stair capping cost per step?
        desc: |-
          Stair capping with solid oak treads and risers typically runs $75 to $200 per step, depending on wood species and nosing profile. A full 12-14 step straight staircase usually falls between $2,500 and $5,000 before railings.

      - title: How long does it take to remove carpet from stairs and refinish?
        desc: |-
          A standard straight staircase takes 5 to 7 days - carpet removal and prep on day one, tread installation over 2-3 days, then sanding, staining, and three coats of finish with 24 hours of dry time between coats.

      - title: Should I cap my stairs or replace them entirely?
        desc: |-
          If your subfloor and stringers are structurally sound, capping is the better option. It costs roughly 40% less than a full rebuild and takes about half the time. We inspect during carpet removal and advise before any work starts.

      - title: What railing styles work with hardwood stairs?
        desc: |-
          Wrought iron spindles suit traditional and transitional homes. Frameless glass panels open up sightlines in modern layouts. Stainless steel balusters split the difference. All options include a solid hardwood or metal handrail.

      - title: Is Bona Traffic HD worth the cost for stairs?
        desc: |-
          Bona Traffic HD is a commercial-grade, two-component waterborne polyurethane. It cures harder than standard poly, resists scuffing on high-traffic stair treads, and does not yellow over time like oil-based finishes.

