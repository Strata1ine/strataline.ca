  - type: ZigZag
    title: How carpet to hardwood stairs works
    content:
      - title: Carpet removal and subfloor prep
        desc: |-
          Old carpet, underpad, and staples come out. We inspect the subfloor for squeaks, rot, or uneven spots and fix them before any capping goes on.
        image:
          src: ./photos/carpeted-stairs-black-metal-balusters-hardwood-handrail.jpg
          alt: Stair subfloor exposed after carpet removal.

      - title: Stair sanding and staining to match your floors
        desc: |-
          Festool orbital sanders take treads to 120-grit - smooth enough for stain adhesion, rough enough for grip. We colour-match to your existing floors using General Finishes or Bona stains.
        image:
          src: ./photos/staircase-renovation-stainless-steel-balusters-oak-treads.jpg
          alt: Oak stair treads sanded and stained to match adjacent flooring.

      - title: Oak tread and riser installation
        desc: |-
          Solid oak treads are scribed and cut to fit each step. Bull-nose nosing overhangs the riser by 1 inch for a finished look and a comfortable foot strike.
        image:
          src: ./photos/staircase-renovation-dark-hardwood-treads-white-risers-stainless-steel-balusters.jpg
          alt: New oak treads and white risers installed during stair capping.

      - title: Wrought iron, glass, or hardwood railings
        desc: |-
          Wrought iron spindles, frameless glass panels, or hardwood balusters - each option gets a secure newel post installation anchored through the subfloor, not just surface-mounted.
        image:
          src: ./photos/curved-staircase-renovation-dark-hardwood-wrought-iron-balusters.jpg
          alt: Wrought iron spindles installed on dark-stained oak staircase.

  - type: TextCarousel
    text:
      - Goodbye carpet, hello hardwood
      - Solid oak treads and risers
      - Every step feels solid
      - Bona Traffic HD finish
      - Wrought iron or glass
      - No dust, no mess

  - type: ZigZag
    title: Stair tread replacement and repair
    content:
      - title: Fix what is underneath before finishing
        desc: |-
          Squeaky treads get shimmed or re-screwed. Water-damaged stringers are sistered. Loose newel posts are re-anchored into the subfloor before any staining or finishing.
        image:
          src: ./photos/frameless-glass-railings-stainless-steel-handrail-modern-stairwell.jpg
          alt: Frameless glass railing installed after stair tread replacement.

      - title: Full refinishing on existing hardwood stairs
        desc: |-
          If you already have hardwood under the carpet, we sand down to bare wood at 80-grit and work up to 120. Three coats of Bona Traffic HD bring them back without replacing a single tread.
        image:
          src: ./photos/restored-hardwood-stairs-dark-stain-black-iron-balusters.jpg
          alt: Restored hardwood stairs after sanding and Bona finish application.

