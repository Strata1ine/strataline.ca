  - type: Faq
    title: Staircase refinishing FAQ
    content:
      - title: How long does staircase refinishing take?
        desc: |-
          Most projects are completed in 3 to 5 days depending on staircase size, condition, and drying time between coats.

      - title: Is the process messy?
        desc: |-
          No. We use dust-controlled sanding systems and protect surrounding finishes so the project is suitable for lived-in homes.

      - title: Can you match my floors?
        desc: |-
          Yes. Stain is adjusted on site so the staircase works with your existing flooring and interior finish direction.

      - title: When is refinishing not the best option?
        desc: |-
          If the stairs are carpeted, heavily damaged, or need a more complete rebuild in appearance, stair caps or broader upgrades may be the better solution.

      - title: Do you work on curved staircases?
        desc: |-
          Yes. Curved staircases, feature foyers, and more complex layouts are part of the work we do regularly.

  - type: ZigZag
    title: Explore our stair services
    content:
      - title: Stair Renovation — Full staircase upgrades
        link: /services/stairs
        desc: |-
          Explore complete staircase renovation options, from structural updates and layout improvements to full visual modernization. This is the best fit when the staircase needs more than a surface-level change.
        image:
          src: ../staircase-renovation-gallery/staircase-refinishing-vaughan-dark-treads-white-risers-modern.jpg
          alt: Staircase in North York suitable for full stair renovation or railing upgrade.

      - title: Tread Caps — Cover outdated or carpeted stairs
        link: /services/stairs/tread-caps
        desc: |-
          Tread caps are a practical solution when the stair structure is sound but the surfaces are outdated, carpeted, or difficult to refinish. They pair especially well with new railings for a more complete transformation.
        image:
          src: ../tread-caps/stair-tread-caps-gallery/oak-stair-tread-caps-toronto-finished-1-closeup.jpg
          alt: Stair upgrade in Vaughan combining railing work with improved stair surfaces.

      - title: Railing Installation — Upgrade balusters, posts, and handrails
        link: /services/stairs/railing-installation
        desc: |-
          Replace dated balusters, handrails, and posts with a cleaner, more modern railing system. This is often the fastest way to transform the appearance of a staircase without rebuilding it.
        image:
