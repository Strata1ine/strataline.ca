  - type: ZigZag
    title: Our staircase refinishing process
    content:
      - title: Protection and containment
        desc: |-
          Floors, walls, and surrounding finishes are protected before work begins. We set the project up to work cleanly in occupied homes.
        image:
          src: ./staircase-refinishing-gallery/staircase-refinishing-prep-containment-stairs.jpg
          alt: Staircase refinishing preparation with containment and protection.
        videoSrc: /videos/staircase-refinishing-prep-containment-stairs.mp4

      - title: Sanding to a clean base
        desc: |-
          We remove old finish and surface wear to expose clean wood so the new stain and topcoats bond properly and look consistent.
        image:
          src: ./staircase-refinishing-gallery/staircase-refinishing-dustless-sanding-festool.jpg
          alt: Dust-free staircase sanding with Festool equipment.

      - title: Repairs and detail correction
        desc: |-
          Worn areas, imperfections, and damaged spots are corrected before staining so the final finish looks smooth and uniform rather than patched.
        image:
          src: ./staircase-refinishing-gallery/staircase-refinishing-wood-repair-detail.jpg
          alt: Staircase wood repair detail before refinishing.

      - title: Stain and protective finish
        desc: |-
          Once preparation is complete, stain is adjusted to the right tone and protected with durable finish coats built for daily stair traffic.
        image:
          src: ./staircase-refinishing-gallery/staircase-refinishing-wood-stairs-dark-stain-classic.jpg
          alt: Finished staircase with dark stain after refinishing.

  - type: ZigZag
    title: Real work in real homes
    content:
      - title: Process matters
        desc: |-
          Careful preparation and detail work are what make the finished result look clean and consistent.
        image:
          src: ./staircase-refinishing-gallery/staircase-refinishing-railing-installation-process.jpg
          alt: Stair railing installation process during staircase refinishing.

      - title: Mid-project quality control
        desc: |-
          From structure and fitting to finishing details, we treat the staircase like a focal point rather than a quick cosmetic touch-up.
        image:
          src: ./staircase-refinishing-gallery/staircase-refinishing-mid-project-structure.jpg
          alt: Mid-project staircase refinishing structure and fitting.

      - title: Before-and-after impact
        desc: |-
          The difference between worn stairs and a properly refinished staircase is immediate. Better colour, cleaner lines, and a stronger overall impression.
        image:
          src: ./staircase-refinishing-gallery/staircase-refinishing-vaughan-oak-stairs-traditional.jpg
          alt: Woodbridge staircase refinishing before and after on stair treads.

