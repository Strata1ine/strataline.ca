  - type: Faq
    title: Stair refinishing FAQ
    showMoreLabel: View more stair refinishing questions
    content:
      - title: What stair refinishing services do you provide?
        desc: |-
          We sand, stain, refinish, repair, and paint stair components including treads, risers, stringers, handrails, posts, and related trim. We also coordinate carpet removal, squeak reduction, railing updates, and colour matching.

      - title: When can stairs be refinished instead of replaced?
        desc: |-
          Stairs can often be refinished when the existing treads are solid hardwood, thick enough to sand, structurally sound, and not too damaged by carpet staples, deep stains, pet damage, water, or previous sanding.

      - title: Can carpeted stairs be refinished?
        desc: |-
          Sometimes. After carpet removal, we inspect the wood underneath. Some carpeted stairs have good hardwood treads; others are construction-grade and need tread caps or replacement instead.

      - title: How much does stair refinishing cost?
        desc: |-
          Cost depends on tread count, landings, carpet removal, staple removal, stain change, railing work, riser painting, repairs, dust control, finish system, and whether stairs must stay usable during the project.

      - title: How long does stair refinishing take?
        desc: |-
          A typical staircase can take several days because sanding, stain approval, drying, finish coats, riser painting, and cleanup all need time. Dark stains and detailed railings can extend the schedule.

      - title: Can you match the stair stain to my floors?
        desc: |-
          Usually close. Matching depends on wood species, age, previous finish, floor colour, lighting, and wear. We prefer sample testing before final stain decisions.

      - title: Can stairs be stained darker?
        desc: |-
          Usually yes, if the wood accepts stain evenly after sanding. Very dark stains can show dust, scratches, and uneven sanding, so prep quality matters.

      - title: Can orange oak stairs be modernized?
        desc: |-
          Yes. Orange oak can often be sanded and restained, paired with white risers, black balusters, updated handrails, or refinished to better match modern floors.

      - title: Is stair refinishing dusty?
        desc: |-
          Sanding creates dust, but containment, extraction, protection, and cleanup reduce spread. Stairs connect floors, so dust control around halls and nearby rooms is important.

      - title: Will stair refinishing smell?
        desc: |-
          Some stains and finishes have odour. Product choice, ventilation, drying time, and household sensitivity should be discussed before work starts.

      - title: Can we walk on stairs during refinishing?
        desc: |-
          Access may be limited during sanding, staining, and finish coats. Sometimes work can be staged, but fresh finish needs protected drying and curing time.

      - title: What finish is best for stairs?
        desc: |-
          A durable floor-grade finish is best. Sheen, ambering, odour, dry time, traffic level, and maintenance expectations all affect the right choice.

      - title: Can you paint risers during refinishing?
        desc: |-
          Yes. Painted risers need filling, sanding, caulking where appropriate, primer, and durable paint. Riser work should be sequenced with tread staining and finish coats.

      - title: Can you refinish handrails too?
        desc: |-
          Yes. Handrails and posts can be sanded and stained or painted to coordinate with the treads. Detailed profiles and old coatings take extra time.

      - title: Can you fix damaged treads before refinishing?
        desc: |-
          Often. Dents, staple holes, cracks, chips, gaps, stains, and loose treads can be repaired to a point, but severe damage may make tread caps or replacement the better choice.

      - title: What should a stair refinishing quote include?
        desc: |-
          It should include tread count, landings, sanding, stain samples, finish coats, riser painting, railing work, repairs, carpet removal, protection, dust control, drying time, exclusions, and warranty.

      - title: Do you refinish stairs across the GTA?
        desc: |-
          Yes. We refinish stairs in Toronto, Vaughan, Woodbridge, Richmond Hill, Markham, North York, Mississauga, Oakville, Burlington, Pickering, Ajax, Whitby, Oshawa, and nearby GTA communities.

