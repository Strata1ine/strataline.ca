  - type: Benefits
    title: Common flooring scopes
    content:
      - title: Main floor replacement
        desc: |-
          Continuous flooring through living rooms, dining rooms, kitchens, halls, and entries needs careful demolition, floor height planning, baseboard work, transitions, and furniture coordination.
      - title: Kitchen flooring
        desc: |-
          Kitchen floors must work with cabinets, islands, appliances, toe kicks, dishwasher access, water exposure, and adjacent rooms. Flooring timing should be coordinated with the full kitchen scope.
      - title: Basement flooring
        desc: |-
          Basements need moisture-aware products, proper underlayment where required, flat concrete, transition planning, and realistic expectations around slab conditions.
      - title: Condo flooring
        desc: |-
          Condo work may require board approval, sound-rated underlayment, elevator booking, delivery windows, disposal rules, insurance documents, and work-hour restrictions.
      - title: Stair and floor packages
        desc: |-
          Flooring replacement often looks best when stairs are refinished, capped, or stain-matched at the same time. This prevents the old staircase from fighting the new floor.
      - title: Commercial and office flooring
        desc: |-
          Luxury vinyl, carpet tile, and durable laminate can suit offices, showrooms, retail rooms, and workspaces that need fast turnaround and replaceable surfaces.

  - type: Prices
    title: What's the cost?
    content:
      - title: Practical
        min: 4500
        max: 12000
        materials:
          - Laminate flooring
          - Entry luxury vinyl plank
          - Basic trim and transitions
          - Minor subfloor preparation
        desc: |-
          Best for smaller rooms, rentals, basements, offices, and straightforward flooring replacement where the existing subfloor is in good condition.
      - title: Premium
        min: 12000
        max: 35000
        materials:
          - Engineered hardwood or premium luxury vinyl
          - Wider planks
          - New baseboards or shoe moulding
          - Levelling, transitions, and stair tie-ins
        desc: |-
          Best for main floors, kitchens, open layouts, occupied homes, and projects where the floor needs to connect cleanly with stairs, trim, doors, and adjacent finishes.
      - title: Custom
        min: 35000
        max: 95000
        materials:
          - Herringbone or chevron hardwood
          - Wide plank engineered hardwood
          - Specialty trims and vents
          - Stair refinishing or tread coordination
        desc: |-
          Best for high-detail installations, patterned floors, full main-floor replacement, premium Fuzion Flooring selections, custom transitions, and flooring paired with stair renovation or millwork.

  - type: Faq
    title: Flooring installation FAQ
    showMoreLabel: View more flooring questions
    content:
      - title: What flooring services do you provide?
        desc: |-
          We handle flooring installation, flooring replacement, engineered hardwood, luxury vinyl plank, hybrid resilient flooring, laminate, carpet tile, herringbone and patterned layouts, subfloor preparation, levelling, transitions, trims, baseboards, stair coordination, and cleanup.

      - title: Do you install Fuzion Flooring products?
        desc: |-
          Yes. Fuzion Flooring carries engineered hardwood, luxury vinyl, hybrid resilient, laminate, carpet tile, and accessories. We install based on the specific product instructions, subfloor requirements, room conditions, and warranty expectations.

      - title: Is engineered hardwood better than solid hardwood?
        desc: |-
          Engineered hardwood is often more stable than solid hardwood because of its layered construction. It is a strong choice for many GTA homes, especially where wider planks, changing humidity, and open main floors are part of the plan.

      - title: Where does luxury vinyl plank make sense?
        desc: |-
          Luxury vinyl plank can be a good fit for basements, kitchens, laundry-adjacent areas, rentals, busy family spaces, and commercial rooms where water resistance, durability, and easier maintenance matter.

      - title: What is SmartDrop flooring?
        desc: |-
          SmartDrop is a Fuzion luxury vinyl line designed around faster loose-lay installation. Suitability still depends on product selection, subfloor condition, room size, traffic, perimeter details, and whether glue-down is better for the space.

      - title: Can new flooring go over old flooring?
        desc: |-
          Sometimes, but it depends on the old flooring type, bond, height, flatness, moisture, movement, manufacturer instructions, and transitions. Removing old flooring is often the cleaner long-term choice.

      - title: Do floors need to acclimate before installation?
        desc: |-
          Many flooring products need jobsite conditioning or acclimation. Requirements depend on the material, packaging, humidity, temperature, subfloor, and manufacturer instructions. We confirm before scheduling installation.

      - title: How important is subfloor levelling?
        desc: |-
          Very important. Uneven subfloors can create movement, noise, gaps, broken locking joints, and visible imperfections. Levelling or patching should be handled before the finished flooring is installed.

      - title: Can you install herringbone flooring?
        desc: |-
          Yes. Herringbone flooring needs careful layout, extra waste allowance, accurate cuts, strong reference lines, and attention to room geometry. It costs more than straight plank installation because it is more detailed.

      - title: Can flooring be installed in kitchens before cabinets?
        desc: |-
          It depends on the flooring type, cabinet plan, appliance access, island fastening, and renovation sequence. Some floors run under cabinets, while floating floors usually need expansion space and should follow manufacturer rules.

      - title: Can you match new flooring to existing stairs?
        desc: |-
          Usually we can get close, but exact matching depends on species, stain, age, sun exposure, finish, and product availability. When stairs matter visually, refinishing or capping them with the flooring project often gives the cleanest result.

      - title: Do you replace baseboards during flooring installation?
        desc: |-
          Yes. We can remove and reinstall existing baseboards where practical, install new baseboards, or use shoe moulding depending on the floor height, wall condition, budget, and finish level.

      - title: What flooring is best for pets?
        desc: |-
          Pets need scratch-resistant surfaces, good traction, easy cleaning, and realistic expectations around claws and spills. Luxury vinyl, durable laminate, and harder engineered hardwood finishes can all work depending on the home.

      - title: What flooring is best for basements?
        desc: |-
          Basement flooring should be moisture-aware. Luxury vinyl plank, hybrid resilient flooring, and some laminate systems can work well when the slab is flat, dry enough, and prepared correctly.

      - title: Do condos need special flooring underlayment?
        desc: |-
          Often yes. Condo boards may require acoustic ratings, underlayment documentation, product specs, contractor insurance, elevator booking, and approval before installation. We review requirements before work starts.

      - title: How long does flooring installation take?
        desc: |-
          A room can take a day or two. A main floor can take several days or longer depending on demolition, levelling, layout, stairs, baseboards, transitions, furniture, and product type.

      - title: What should I send for a flooring quote?
        desc: |-
          Send room photos, measurements, existing floor type, stairs or transitions, basement or condo details, product preference, floor plan if available, and photos of problem areas like humps, dips, squeaks, or water damage.

      - title: What should a flooring quote include?
        desc: |-
          A clear quote should include demolition, disposal, subfloor preparation, levelling assumptions, product installation, underlayment, trims, transitions, baseboards, stair details, furniture handling, exclusions, timeline, and warranty notes.

      - title: Do you provide flooring installation across the GTA?
        desc: |-
          Yes. We install flooring in Toronto, Vaughan, Woodbridge, Richmond Hill, Markham, North York, Mississauga, Oakville, Burlington, Pickering, Ajax, Whitby, Oshawa, and nearby GTA communities.

