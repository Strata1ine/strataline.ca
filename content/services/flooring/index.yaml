  - type: Benefits
    title: Flooring that fits the house
    content:
      - title: Material matched to the room
        desc: |-
          Engineered hardwood, luxury vinyl plank, hybrid resilient flooring, laminate, and carpet tile each solve different problems. We help choose the right floor for kitchens, main floors, basements, stairs, offices, rentals, and high-traffic family spaces.
      - title: Prep before planks
        desc: |-
          Flatness, subfloor condition, moisture, old adhesive, squeaks, height transitions, door clearances, and stair tie-ins matter before flooring is opened. Good installation starts below the finished surface.
      - title: Clean work in occupied homes
        desc: |-
          We protect adjacent rooms, manage demolition, cut carefully, control dust, and keep access routes clear wherever possible. Flooring changes the whole house, so the process has to be orderly.
      - title: Supplier-aware installation
        desc: |-
          Fuzion Flooring offers engineered hardwood, luxury vinyl, hybrid resilient, laminate, carpet tile, and accessories. We build the scope around the chosen product, installation method, subfloor, warranty requirements, and room conditions.
      - title: Transitions that look planned
        desc: |-
          Floor replacement often meets stairs, tile, railings, baseboards, casing, doors, and kitchen cabinets. We plan trims, nosing, reducers, thresholds, vents, and colour matching so the work does not look patched.
      - title: Built for daily wear
        desc: |-
          Pets, kids, chairs, winter grit, sunlight, humidity, and cleaning habits all affect flooring performance. We explain what each product handles well before the final decision is made.

