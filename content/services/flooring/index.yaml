  - type: ZigZag
    title: Flooring material options
    content:
      - title: Engineered hardwood
        desc: |-
          Engineered hardwood gives the look and feel of real wood with a more stable construction than solid hardwood. It is a strong choice for main floors, dining rooms, bedrooms, open layouts, and stair-adjacent spaces where natural grain, wide planks, low-luster finishes, and long-term value matter.
        image:
          src: ./photos/light-oak-engineered-hardwood-staircase-main-floor.jpg
          alt: Engineered hardwood flooring installed through a main floor and coordinated with a curved staircase.
        link: https://www.fuzionflooring.com/engineered-hardwood-collections/

      - title: Luxury vinyl plank
        desc: |-
          Luxury vinyl plank is useful where water resistance, fast installation, high traffic, and low-maintenance care matter. It can work well in basements, kitchens, rentals, commercial rooms, and family spaces when the subfloor is prepared correctly.
        image:
          src: ./photos/dark-wide-plank-hardwood-condo-living-room.jpg
          alt: Wide plank flooring in a finished condo living room with bright windows and clean trim.
        link: https://www.fuzionflooring.com/luxury-vinyl-collections/

      - title: Herringbone and patterned floors
        desc: |-
          Herringbone, chevron, and specialty layouts need more planning than standard plank installation. Layout lines, border cuts, room squareness, waste factor, transitions, and focal points are decided before the first row is installed.
        image:
          src: ./photos/herringbone-hardwood-border-marble-tile-transition.jpg
          alt: Herringbone hardwood flooring with a border detail and marble tile transition.

      - title: Laminate, hybrid, and carpet tile
        desc: |-
          Laminate and hybrid resilient floors can offer strong performance at a practical budget, while carpet tile is useful for offices, basements, and commercial spaces where sections may need replacement later. The right choice depends on use, subfloor, moisture, acoustics, and design goals.
        image:
          src: ./photos/dark-hardwood-hallway-flooring.jpg
          alt: Dark hardwood hallway flooring with clean baseboards and doorway transitions.
        link: https://www.fuzionflooring.com/

  - type: ImagePanel
    title: Details we plan before installation
    content:
      - title: Subfloor flatness
        desc: |-
          Uneven subfloors can cause hollow spots, movement, open seams, click-joint stress, and visible waves. We check flatness, fastening, patching, levelling, and old flooring layers before installation.
        image:
          src: ./photos/herringbone-hardwood-floor-border-installation.jpg
          alt: Herringbone hardwood border installation showing careful layout and edge planning.

      - title: Moisture and room use
        desc: |-
          Kitchens, basements, entries, laundry areas, and condos need different flooring decisions. Product selection should match moisture exposure, traffic, temperature swings, cleaning habits, and warranty rules.
        image:
          src: ./photos/light-oak-flooring-open-concept-kitchen.jpg
          alt: Kitchen flooring selected for daily use, traffic, and easy cleaning in a renovated open-concept home.

      - title: Stairs and transitions
        desc: |-
          Flooring rarely stops cleanly on its own. We coordinate stair nosing, reducers, thresholds, vents, baseboards, casing, railings, and colour matching so the floor belongs to the whole interior.
        image:
          src: ./photos/light-oak-hardwood-floor-stair-railing.jpg
          alt: Light oak hardwood flooring coordinated with stair railings and finished hallway trim.

      - title: Plank layout
        desc: |-
          Direction, starting line, board width, feature walls, hallway runs, kitchen islands, and room transitions affect the final look. A good layout avoids skinny cuts in obvious places.
        image:
          src: ./photos/flush-floor-register-hardwood-detail.jpg
          alt: Flush floor register detail installed into patterned hardwood flooring.

