sections:
  - type: Benefits
    title: Front doors affect more than curb appeal
    content:
      - title: Fit and weatherseal
        desc: |-
          A new entry door should close cleanly, seal properly, resist drafts, and protect the threshold from water.
      - title: Glass, privacy, and light
        desc: |-
          Decorative glass, clear glass, privacy glass, sidelites, and transoms change both the exterior look and interior light.
      - title: Security and hardware
        desc: |-
          Locksets, deadbolts, hinges, reinforced strike areas, and door material all affect everyday security.
      - title: Exterior finishing
        desc: |-
          Capping, trim, caulking, paint colour, brick mould, and threshold details should match windows, garage doors, and exterior paint.

  - type: ZigZag
    title: Related door and window services
