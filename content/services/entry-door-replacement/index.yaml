  - type: Faq
    title: Entry door FAQ
    content:
      - title: Should I choose steel or fiberglass?
        desc: |-
          Steel doors are durable and cost-effective. Fiberglass doors can offer better dent resistance, wood-look styling, and strong insulation depending on the model.
      - title: Can a front door improve drafts?
        desc: |-
          Yes, if the slab, frame, threshold, sweep, weatherstripping, and installation are properly fitted.
      - title: Can I add glass to a front door?
        desc: |-
          Yes. Glass inserts, sidelites, and transoms can add light and style, with privacy options available.
      - title: What affects entry door cost?
        desc: |-
          Door size, material, glass, sidelites, colour, hardware, capping, threshold work, trim, and site conditions all affect price.

