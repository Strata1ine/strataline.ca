sections:
  - type: Benefits
    title: Brick painting needs the right prep
    content:
      - title: Moisture review
        desc: |-
          Brick, mortar, flashing, grade, and previous coatings should be reviewed before painting because trapped moisture can damage masonry.
      - title: Cleaning and repair
        desc: |-
          Loose paint, dirt, efflorescence, cracked mortar, and failed caulking need attention before primer or masonry coating.
      - title: Breathable coating choices
        desc: |-
          The right exterior paint or masonry coating depends on brick condition, exposure, colour, and whether the surface was previously painted.
      - title: Whole facade planning
        desc: |-
          Brick colour should work with garage doors, windows, trim, soffits, eaves, railings, stone, and landscaping.

