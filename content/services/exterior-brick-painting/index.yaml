  - type: Faq
    title: Exterior brick painting FAQ
    content:
      - title: Is painting brick a good idea?
        desc: |-
          It can be when the brick is suitable and moisture issues are addressed. Poor prep or the wrong coating can create peeling, trapped moisture, or maintenance problems.
      - title: Do you repair mortar before painting?
        desc: |-
          Minor cracks and gaps may need repair before painting. Larger masonry problems should be handled before any coating is applied.
      - title: What colours work best for painted brick?
        desc: |-
          Warm whites, soft greys, taupes, charcoal, and muted earthy colours are common, but the best choice depends on roof, windows, trim, stone, and neighbourhood context.
      - title: Can you paint previously painted brick?
        desc: |-
          Yes, if the existing coating is sound. Peeling, chalking, moisture staining, or loose areas need prep before repainting.

